<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StrikeBench</title>
  <script>
    // Theme must be decided BEFORE first paint or dark-mode users get a white flash.
    // Modes: system (follow OS), light, dark. Stored under strikebench.theme.
    (function () {
      try {
        var mode = localStorage.getItem('strikebench.theme') || localStorage.getItem('optionslab.theme') || 'system';
        var dark = mode === 'dark' || (mode === 'system'
          && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      } catch (e) { document.documentElement.setAttribute('data-theme', 'light'); }
    })();
  </script>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#/welcome" title="What is this? The product tour">StrikeBench</a>
    <nav class="nav" id="nav">
      <a href="#/home" data-route="home">Home</a>
      <a href="#/research" data-route="research">Research</a>
      <a href="#/recommend" data-route="recommend">Ideas</a>
      <a href="#/ticket" data-route="ticket">Trade</a>
      <a href="#/portfolio" data-route="portfolio">Portfolio</a>
      <a href="#/backtest" data-route="backtest">Backtest</a>
      <a href="#/account" data-route="account">Account</a>
      <a href="#/status" data-route="status">Data</a>
    </nav>
    <div class="topbar-controls">
      <input id="global-search" type="text" list="universe-symbols" placeholder="Search symbol  /"
             autocomplete="off" spellcheck="false" aria-label="Search a ticker symbol">
      <button id="theme-toggle" type="button" class="theme-toggle"
              title="Theme: follows your system. Click to cycle System / Light / Dark."></button>
      <label class="risk-select" title="Risk mode used for new ideas and tickets">
        <span>Risk</span>
        <select id="risk-mode">
          <option value="learning">Learning</option>
          <option value="conservative" selected>Conservative</option>
          <option value="balanced">Balanced</option>
          <option value="aggressive">Aggressive</option>
        </select>
      </label>
      <div class="level-switch" id="level-switch" role="group" aria-label="Experience level"
           title="Learning: plain language and extra safety context. Confident: balanced detail. Pro: dense, data-first screens.">
        <button data-level="learning" type="button">Learning</button>
        <button data-level="confident" type="button">Confident</button>
        <button data-level="pro" type="button">Pro</button>
      </div>
    </div>
  </header>

  <div id="tape" class="tape" hidden aria-label="Universe ticker">
    <select id="tape-sector" class="tape-sector" aria-label="Universe sector"></select>
    <div class="tape-scroll"><div class="tape-strip" id="tape-strip"></div></div>
  </div>
  <datalist id="universe-symbols"></datalist>

  <main id="app" class="app">
    <noscript>StrikeBench needs JavaScript enabled.</noscript>
    <div class="loading">Loading…</div>
  </main>

  <footer class="disclaimer" id="disclaimer">
    Educational tool only — paper trading by default. Options involve substantial risk of loss.
    Nothing here is financial advice or a promise of profit.
  </footer>

  <div id="modal-root"></div>

  <nav class="bottom-nav" id="bottom-nav" aria-label="Primary">
    <a href="#/home" data-route="home"><span class="bn-ico">&#8962;</span>Home</a>
    <a href="#/research" data-route="research"><span class="bn-ico">&#128269;</span>Research</a>
    <a href="#/recommend" data-route="recommend"><span class="bn-ico">&#10022;</span>Ideas</a>
    <a href="#/ticket" data-route="ticket"><span class="bn-ico">&#9998;</span>Trade</a>
    <a href="#/portfolio" data-route="portfolio"><span class="bn-ico">&#9636;</span>Portfolio</a>
  </nav>

  <script src="/js/learn.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/views.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
