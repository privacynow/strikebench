  var side='<button class="tgl '+(l.q<0?'sell':'buy')+'" data-'+a+'="side" data-'+idx+'="'+i+'">'+(l.q<0?'SELL':'BUY')+'</button>';
  var type=l.t==='s'?'<span class="tgl stockc">STOCK</span>':'<button class="tgl '+(l.t==='c'?'callc':'putc')+'" data-'+a+'="type" data-'+idx+'="'+i+'">'+(l.t==='c'?'CALL':'PUT')+'</button>';
  var strike=l.t==='s'?'':'<span class="mstp"><span class="ml">K</span><button data-'+a+'="strike" data-'+idx+'="'+i+'" data-d="-1">−</button><span class="mv">'+l.k+'</span><button data-'+a+'="strike" data-'+idx+'="'+i+'" data-d="1">+</button></span>';
  var qty='<span class="mstp"><span class="ml">'+(l.t==='s'?'Sh':'Qty')+'</span><button data-'+a+'="qty" data-'+idx+'="'+i+'" data-d="-1">−</button><span class="mv">'+Math.abs(l.q)+'</span><button data-'+a+'="qty" data-'+idx+'="'+i+'" data-d="1">+</button></span>';
  var rm=l.t==='s'?'':'<button class="lrm" data-'+a+'="rm" data-'+idx+'="'+i+'" title="Remove">✕</button>';
  /* per-leg IV / delta / credit (reclaimed from compose — priced live from our BS engine) */
  var meta;
  if(l.t==='s'){ meta='<span class="lgm">'+Math.abs(l.q)+' sh @ '+spot.toFixed(spot>=100?0:2)+' · Δ '+(l.q<0?'−':'+')+'1.00</span>'; }
  else { var pr=bsPrice(spot,l.k,DEC_T,ivForK(spot,l.k),l.t), iv=Math.round(ivForK(spot,l.k)*100), cr=Math.round(-l.q*pr.price*100);
    meta='<span class="lgm">IV '+iv+' · Δ'+(pr.delta>=0?'+':'')+pr.delta.toFixed(2)+' · <b class="'+(cr>=0?'pos':'neg')+'">'+(cr>=0?'+':'−')+'$'+Math.abs(cr).toLocaleString()+'</b></span>'; }
  return '<div class="legr"><div class="legr-top">'+side+type+strike+qty+rm+'</div>'+meta+'</div>';
}
function adjChip(p,l,i){ return legChip(l,i,'adjleg','ali',p.spot); }
function adjNums(p,c){

  function delta(nv,ov,lowerBetter){ var x=Math.round(nv-ov); if(x===0)return '<span class="adjd flat">no change</span>'; var good=lowerBetter?x<0:x>0; return '<span class="adjd '+(good?'pos':'neg')+'">'+(x>0?'+':'−')+'$'+Math.abs(x).toLocaleString()+'</span>'; }
  var dp=c.pop-b.pop, dcr=Math.round(c.credit-b.credit);

    '<div class="adjn"><span class="lbl">Max loss</span><b class="neg">−$'+Math.round(c.maxLoss).toLocaleString()+'</b>'+delta(c.maxLoss,b.maxLoss,true)+'</div>'+
    '<div class="adjn"><span class="lbl">Chance</span><b>'+c.pop+'%</b>'+(dp===0?'<span class="adjd flat">no change</span>':'<span class="adjd '+(dp>=0?'pos':'neg')+'">'+(dp>=0?'+':'')+dp+' pts</span>')+'</div>';

/* draw the bloom payoff — interactive strike handles + before/after ghost + pinned scenario */
var pinnedScen={};
/* sentinel pin: the active scenario is an EXACT path chosen from the market fan, not a named
   story tile — its authored waypoints live on the candidate as _customStoryPins */
var FAN_STORY=-9;
function redrawBloomPayoff(p, animate){
  var svg=cardEl[p.id]&&cardEl[p.id].querySelector('.cbig'); if(!svg)return;
  var opts={interactive:true, pinM:scrubMag(p), animate:!!animate};
  if(adjust&&adjust.posId===p.id) drawPayoff(svg, adjustCand(), true, adjust.base||baseCand(p), opts);   // ghost = current on the SAME computed basis
  else drawPayoff(svg, p, true, null, opts);
}
/* DRAG a strike handle on the payoff → live-edit that leg's strike (enters an adjustment) */
/* ONE strike-drag used by BOTH the bloom and Decide (no more duplicate functions). It's
   CLAMPED (0.35–2.6× spot, so a strike can't run to $98M and blow up the axis), CONTINUOUS
   during the drag (the line follows the cursor smoothly, no $-increment stepping) and snaps to
   the strike increment only on release. cfg: {getSvg,getLegs,legIdx,spot,onStart,onMove,onEnd}. */
function beginStrikeDrag(ev, cfg){
  var inc=strikeInc(cfg.spot), loK=Math.max(inc, cfg.spot*0.35), hiK=cfg.spot*2.6;
  if(cfg.onStart) cfg.onStart();
  _dragActive=true;
  function priceAt(clientX){ var svg=cfg.getSvg(); if(!svg||!svg._map)return null;
    var rect=svg.getBoundingClientRect(), vbw=(svg.viewBox&&svg.viewBox.baseVal&&svg.viewBox.baseVal.width)||rect.width;
    var xu=(clientX-rect.left)*(vbw/rect.width);
    var px=svg._map.lo+(xu-svg._map.x0)/svg._map.pw*(svg._map.hi-svg._map.lo);
    return Math.max(loK, Math.min(hiK, px)); }               // CLAMP — no runaway strikes
  function move(e){ var cx=e.clientX!=null?e.clientX:(e.touches&&e.touches[0]?e.touches[0].clientX:null); if(cx==null)return;
    var px=priceAt(cx); if(px==null)return; var l=cfg.getLegs()[cfg.legIdx]; if(!l||l.t==='s')return;
    var k=Math.round(px*2)/2;                                 // continuous (½-pt), smooth follow
    if(l.k!==k){ l.k=k; cfg.onMove(); } }
  function up(){ document.removeEventListener('pointermove',move); document.removeEventListener('pointerup',up); _dragActive=false;
    var l=cfg.getLegs()[cfg.legIdx]; if(l&&l.t!=='s') l.k=Math.max(inc,Math.round(l.k/inc)*inc);   // snap on release
    if(cfg.onEnd) cfg.onEnd(); }
  document.addEventListener('pointermove',move); document.addEventListener('pointerup',up);
  move(ev);
}
function startStrikeDrag(p, legIdx, ev){
  beginStrikeDrag(ev, { spot:p.spot, legIdx:legIdx,

  if(adjust && (level!=='position' || focus!==adjust.posId)) adjust=null;
  var prev=state.level, prevFocus=state.focus;
  var cardPair=(prev==='book'||prev==='position')&&(level==='book'||level==='position');
  /* which cards do a full FLIP (grow/shrink) vs cross-fade: the INCOMING focus always blooms,
     and when we were already in a position, the OUTGOING focus recedes the same way — so
     position→position (and →book) breathe symmetrically, not one-sided. */
  function isHero(id){ return id===focus || (prev==='position' && id===prevFocus); }

  }

    for(var i=0;i<POS.length;i++){ var e=cardEl[POS[i].id]; e.style.transition=''; e.style.transform=''; e.style.transformOrigin=''; e.style.opacity=''; }

  if(level==='position'){ window.setTimeout(function(){ addReveal(focus); }, Math.round(DUR*0.38)); }

function candStats(c){
  var d=payDomain(c),lo=d[0],hi=d[1],n=200,mn=1e18,mx=-1e18;
  for(var i=0;i<=n;i++){var v=payFor(c,lo+(hi-lo)*i/n); if(v<mn)mn=v; if(v>mx)mx=v;}

/* round a spot·pct level to a sensible strike increment for the price band */
function rk(spot,pct){ var raw=spot*pct, inc=spot>800?10:spot>300?5:spot>80?2.5:1; return Math.round(raw/inc)*inc; }
/* an uncovered short CALL = genuinely unlimited risk (a short put/CSP is bounded to strike→0) */
function calcUndef(legs){
  var shortC=legs.some(function(l){return l.t==='c'&&l.q<0;}), longC=legs.some(function(l){return l.t==='c'&&l.q>0;}),
      longStk=legs.some(function(l){return l.t==='s'&&l.q>0;});
  return shortC&&!longC&&!longStk;
}
/* fill net/greeks/pop/cap/edge/assign/risk on a {sym,spot,em,legs,...meta} object from the leg engine.
   Shared by buildCandidate, genCands and imports so numbers are consistent everywhere. */
function finishCand(c){
  var spot=c.spot, T=DEC_T, net=0,dl=0,th=0,vg=0,gm=0,coll=0,hasStock=false,shortOpt=0;
  c.legs.forEach(function(l){
    if(l.t==='s'){dl+=l.q/100;hasStock=true;coll+=Math.abs(l.q)*spot;return;}
    if(l.q<0)shortOpt+=Math.abs(l.q);
    var pr=bsPrice(spot,l.k,T,ivForK(spot,l.k),l.t);
    net+=-l.q*pr.price*100; dl+=l.q*pr.delta; th+=l.q*pr.theta*100; vg+=l.q*pr.vega*100; gm+=l.q*pr.gamma*100;
    if(l.q<0&&l.t==='p')coll+=l.k*100*Math.abs(l.q);
  });
  c.net=Math.round(net); c.credit=c.net;
  c.delta=Math.round(dl*100)/100; c.theta=Math.round(th); c.vega=Math.round(vg); c.gamma=Math.round(gm*100)/100;
  if(c.undef==null)c.undef=calcUndef(c.legs);
  candStats(c); c.pop=popCalc(c);
  /* capital committed: a DEFINED spread ties up only its max loss (the long leg caps it);
     a collateralized short (CSP / covered) ties up the collateral / stock value; an uncovered
     short ties up margin. (Previously spreads wrongly used the naked short-leg collateral.) */
  c.cap=Math.round(c.undef ? spot*100*shortOpt*0.20 : ((isCollat(c)||hasStock) ? Math.max(coll,c.maxLoss) : c.maxLoss));
  c.edge=Math.round(c.credit*0.06);
  if(c.assign==null)c.assign=Math.max(4,Math.round((100-c.pop)*0.5));
  if(!c.risk)c.risk=c.undef?'high':c.maxLoss<2500?'low':c.maxLoss<9000?'mid':'high';
  return c;
}
/* net greeks under a scenario's assumptions — arbitrary price px, IV-point shift, days elapsed.
   Same leg engine as finishCand; drives the mechanics panel as a scenario scrubs (see liveGreeks). */
function greeksAt(c, px, ivShift, daysFwd){
  var T=Math.max(1/365, DEC_T-(daysFwd||0)/365), dl=0,th=0,vg=0,gm=0, shortITM=0;
  c.legs.forEach(function(l){
    if(l.t==='s'){ dl+=l.q/100; return; }
    var pr=bsPrice(px,l.k,T,Math.max(0.05,ivForK(px,l.k)+(ivShift||0)/100),l.t);
    dl+=l.q*pr.delta; th+=l.q*pr.theta*100; vg+=l.q*pr.vega*100; gm+=l.q*pr.gamma*100;
    if(l.q<0) shortITM=Math.max(shortITM, Math.abs(pr.delta));   /* P(ITM)≈|Δ| of the nearest short */
  });
  return {delta:dl, theta:th, vega:vg, gamma:gm, assign:Math.round(shortITM*100)};
}
/* the DISPLAYED greeks: the position's shown baseline + the modelled CHANGE from now→(px,iv,days),
   so t=0 lands exactly on the baseline numbers and the move is what animates (no jump on play). */
function liveGreeks(c, px, ivShift, daysFwd){
  var g0=greeksAt(c,c.spot,0,0), g=greeksAt(c,px,ivShift,daysFwd);
  return {
    delta:(+c.delta||0)+(g.delta-g0.delta),
    theta:(+c.theta||0)+(g.theta-g0.theta),
    vega:(+c.vega||0)+(g.vega-g0.vega),
    gamma:(+c.gamma||0)+(g.gamma-g0.gamma),
    assign:Math.max(0,Math.min(100,(+c.assign||0)+(g.assign-g0.assign)))
  };
}
/* MARK-TO-MARKET value under a scenario (via BS, so IV expansion + time decay visibly move the
   number — the at-expiry payoff can't show either). Anchored at the line's real open P/L so t=0
   shows today's number and you watch it change. */
function scenMarkRaw(c, px, ivShift, daysFwd){
  var T=Math.max(1/365, DEC_T-(daysFwd||0)/365), t=(c.net||0);
  c.legs.forEach(function(l){
    if(l.t==='s'){ t+=l.q*(px-l.k); return; }
    var pr=bsPrice(px,l.k,T,Math.max(0.05,ivForK(px,l.k)+(ivShift||0)/100),l.t);
    t+=l.q*pr.price*100;
  });
  return t;
}
function scenPL(c, px, ivShift, daysFwd){
  var base=(typeof c.pnl==='number')?c.pnl:0;
  return base + (scenMarkRaw(c,px,ivShift,daysFwd) - scenMarkRaw(c,c.spot,0,0));
}

/* the one primitive that puts a position INTO the book — used by imports (and reusable

function pushToBook(p){ POS.push(p); EXTRA[p.id]=p; byId[p.id]=p;
  try{ p.pop=popCalc(p); }catch(e){}    /* an imported line gets the same tail-aware win-odds as everything else */
  _bookTailCache=null;                  /* the book's concentration/tail must reflect the new position */
  cardEl[p.id]=makeCard(p); }

/* ======================================================================
   TAIL / GAP-RISK MODEL — the terminal-price distribution is a quiet diffusion
   BODY plus a rare, calibrated DOWN-GAP, so a tail-exposed credit trade can no
   longer hide a catastrophic gap behind a benign win-rate. General & per-symbol:
   calibrated from IV (expected move), IV-rank, sector and known events — no AI.
   The jump variance is CARVED OUT of the IV-implied total so we don't double-count
   the fear already priced into IV. Feeds popCalc, the Monte-Carlo, the bell and
   the tail readout — one distribution, one source of truth.
   ====================================================================== */
var GAP_STANCE='base';                       /* the user's standing gap-risk assumption (outlook dial) */
var GAP_DIAL={calm:0.5, base:1, tense:1.9};
/* per-sector priors (NOT a fit): jump intensity over the horizon + characteristic down-gap. em is
   the only real market anchor. IV-rank scales the intensity; a known catalyst fattens it. */
var SECTOR_GAP={ Semis:{lam:0.09,gap:0.15}, Autos:{lam:0.09,gap:0.16}, Tech:{lam:0.05,gap:0.11},
  Software:{lam:0.04,gap:0.10}, Index:{lam:0.025,gap:0.07}, Health:{lam:0.045,gap:0.10}, default:{lam:0.05,gap:0.11} };
function tailParams(c){
  var u=univBy[c.sym]||{}, sec=SECTOR_GAP[u.sector]||SECTOR_GAP.default;
  var ivr=(typeof u.ivRank==='number'?u.ivRank:55), dial=GAP_DIAL[GAP_STANCE]||1;
  /* a known catalyst (earnings) that lands in the future BUT BEFORE this trade's expiry fattens the
     jump — the scheduled-event counterpart to the sector base rate. */
  var evSoon=false, evName=null;
  if(u.earn){ var eo=dateOrd(u.earn), xo=c.exp?dateOrd(c.exp):9999; if(eo>=TODAY_ORD && eo<=xo){ evSoon=true; evName=u.earn; } }
  var evMult=evSoon?1.7:1;
  var L=Math.max(0.015,Math.min(0.45, sec.lam*(0.7+ivr/100*0.7)*evMult*dial));  /* jump intensity over the horizon */
  var gap=Math.max(0.05,Math.min(0.30, sec.gap*(1+(ivr-50)/100*0.3)*(evSoon?1.1:1)));  /* characteristic down-gap size (a touch wider through an event) */
  var muJ=Math.log(1-gap), dJ=0.05;            /* log-return jump: mean = the gap, small dispersion */
  var vBody=Math.pow((c.em||6)/100,2);         /* body keeps the full IV-implied vol; gaps are EXTRA tail risk the smooth IV under-prices */
  var drift=-0.5*vBody;                        /* martingale BODY only — the down-jumps are left UNCOMPENSATED, so the distribution
                                                  carries an honest downside skew (POP is a real-world 'will I profit?', not a pricing question) */
  return {L:L, muJ:muJ, dJ:dJ, vDiff:vBody, sigBody:Math.sqrt(vBody), drift:drift, gap:gap, sector:u.sector||'—', evSoon:evSoon, evName:evName};
}
function nlpdf(x,m,s){ var z=(x-m)/s; return Math.exp(-0.5*z*z)/(s*2.5066282746310002); }
function tailDens(tp,x){ var w=Math.exp(-tp.L), sum=0;   /* Merton Poisson-Gaussian terminal density (log-return) */
  for(var k=0;k<=6;k++){ sum+=w*nlpdf(x, tp.drift+k*tp.muJ, Math.sqrt(tp.vDiff+k*tp.dJ*tp.dJ)); w*=tp.L/(k+1); }
  return sum; }
function popCalc(c){
  var tp=tailParams(c), spot=c.spot, n=340, loX=Math.log(0.35), hiX=Math.log(1.9), dx=(hiX-loX)/n, p=0, tot=0;
  for(var i=0;i<n;i++){ var x=loX+dx*(i+0.5), px=spot*Math.exp(x), d=tailDens(tp,x); tot+=d; if(payFor(c,px)>0)p+=d; }
  return Math.max(1,Math.min(99,Math.round(p/tot*100)));
}
/* Fast terminal expected shortfall for the always-visible brief. It integrates the same tail
   density without constructing the 1,500 multi-session paths; Run simulation therefore brackets
   the actual path build instead of revealing work that an earlier render already performed. */
var TAIL_ES_CACHE={};
function tailExpectedShortfall(c){
  var key=GAP_STANCE+'|'+hashCand(c), cached=TAIL_ES_CACHE[key]; if(cached!=null)return cached;
  var tp=tailParams(c), n=340, loX=Math.log(0.35), hiX=Math.log(1.9), dx=(hiX-loX)/n, rows=[], tot=0;
  for(var i=0;i<n;i++){ var x=loX+dx*(i+0.5), w=tailDens(tp,x); rows.push({pl:payFor(c,c.spot*Math.exp(x)),w:w}); tot+=w; }
  rows.sort(function(a,b){return a.pl-b.pl;});
  var target=Math.max(1e-9,tot*.05), used=0, sum=0;
  for(var j=0;j<rows.length&&used<target;j++){ var take=Math.min(rows[j].w,target-used); sum+=rows[j].pl*take; used+=take; }
  var out=Math.round(sum/Math.max(1e-9,used)); TAIL_ES_CACHE[key]=out; return out;
}
/* the honest tail readout — same distribution: deterministic cost of a characteristic gap + expected shortfall */
function tailStats(c){
  var tp=tailParams(c), dn=payFor(c, c.spot*(1-tp.gap)), up=payFor(c, c.spot*(1+tp.gap));
  /* stress the side that HURTS: down-gaps are the usual equity crash, but an upside-loss trade
     (short call / call spread) is threatened by an UP-gap — show whichever is worse, honestly. */
  var worse=dn<=up?{pl:dn,dir:'−'}:{pl:up,dir:'+'};
  /* A completed child valuation may refine the cheap brief, but it is valid only for this exact
     package AND this exact market ensemble. A lane/world/seed change can never reuse it. */
  var ready=(typeof decide==='object'&&decide&&decide._mc&&decide._mcId===hashCand(c)&&decide._mcEnsembleKey===ensembleKey(c));
  var es=ready?decide._mc.es5:tailExpectedShortfall(c);
  return {gapPct:Math.round(tp.gap*100), gapPL:Math.round(worse.pl), gapDir:worse.dir, es5:es,
    atMaxLoss:!c.undef && (worse.pl<=-c.maxLoss*0.98), undef:!!c.undef, sector:tp.sector, lamPct:Math.round(tp.L*100), evName:tp.evName};
}
/* The served Desk reads the backend risk grid; only the file:// fixture uses the local tail sketch. */
function gapLoss(c){
  if(c&&c.authoritative){var rows=authoritativeScenarioRows(c);return rows.length?Math.min.apply(null,rows.map(function(row){return row.pnl;})):null;}
  var tp=tailParams(c); return Math.min(payFor(c,c.spot*(1-tp.gap)), payFor(c,c.spot*(1+tp.gap)));
}
/* BOOK-level tail — the concentration bites here: ONE shared sector jump hits every line in that
   sector together (not independent per-name tails), so the book's worst-case is far worse than the
   sum of the parts. That is the '74% is one bet' bloodbath, quantified. */
function bookGapFrac(){ var secR={}; POS.forEach(function(p){ var s=(univBy[p.sym]||{}).sector||'—'; secR[s]=(secR[s]||0)+p.riskPct; });
  var d=Object.keys(secR).sort(function(a,b){return secR[b]-secR[a];})[0]||'default';
  return {sector:d, gap:(SECTOR_GAP[d]||SECTOR_GAP.default).gap}; }
/* the tail of ANY position set, correlated on the BOOK's dominant sector — used both for the book
   itself and for a hypothetical hedged book (POS + a protective put). */
function bookTailCore(positions){
  var bg=bookGapFrac(), domSec=bg.sector, dsp=SECTOR_GAP[domSec]||SECTOR_GAP.default;   /* dominant sector = the book's, not the arg's */

function decisionLegQuote(l){

     Never decorate a September leg with an August quote merely because the strike matches.
     Matching-contract volatility and Greeks may enrich that receipt, but never replace its book. */
  var capturedBid=authNumber(l.quoteBid),capturedAsk=authNumber(l.quoteAsk);
  var chainExpiration=String(chain.expiration||market.expiration||''),rows=l.t==='c'?chain.calls:chain.puts,target=Number(l.k);
  var matching=(!l.expiration||chainExpiration!==String(l.expiration))?null:
    (Array.isArray(rows)?rows:[]).find(function(row){return Number(row.strike)===target;});
  if(capturedBid!=null||capturedAsk!=null)return {
    bid:capturedBid,ask:capturedAsk,asOfEpochMs:l.quoteAsOfEpochMs,
    source:l.quoteSource,freshness:l.quoteFreshness,captured:true,
    iv:matching&&matching.iv,delta:matching&&matching.delta

}

function overlayShow(el, origin){
  el.style.display='block'; el.classList.remove('on'); void el.offsetWidth; el.classList.add('on'); el.setAttribute('aria-hidden','false');
  el.scrollTop=0;
  var wrap=el.querySelector('.ovwrap');

}

  var W=Math.max(320,Math.round(svg.clientWidth||600)), H=Math.max(150,Math.round(svg.clientHeight||220));

  var dMax=Math.max(0.8,Math.max.apply(0,dl.map(Math.abs))*1.15);
  var X=function(d){return padL+(W-padL-padR)*(d+dMax)/(2*dMax);};
  var Y=function(v){return H-padB-(H-padB-padT)*(v-cLo)/((cHi-cLo)||1);};
  /* stress = loss on the characteristic sector gap; drives temperature (honest — a collateralised CSP that only dips stays cool, not scary-red) */
  var gapF=1-bookGapFrac().gap, stress=POS.map(function(p){var v=payFor(p,p.spot*gapF);return v<0?-v:0;});
  var maxStress=Math.max.apply(0,stress)||1;
  var g='';
  var xz=X(0);
  g+='<line x1="'+xz.toFixed(1)+'" y1="'+padT+'" x2="'+xz.toFixed(1)+'" y2="'+(H-padB)+'" stroke="var(--line)" stroke-dasharray="3 3"/>';
  g+='<text x="'+(padL+2)+'" y="'+(padT+11)+'" fill="var(--faint)" font-size="12">short Δ</text>';
  g+='<text x="'+(W-padR-2)+'" y="'+(padT+11)+'" fill="var(--faint)" font-size="12" text-anchor="end">long Δ</text>';
  [0.25,0.5,0.75,1].forEach(function(f){var v=cHi*f,yy=Y(v);g+='<line x1="'+padL+'" y1="'+yy.toFixed(1)+'" x2="'+(W-padR)+'" y2="'+yy.toFixed(1)+'" stroke="var(--line-soft)"/>';g+='<text x="'+(padL-5)+'" y="'+(yy+3).toFixed(1)+'" fill="var(--faint)" font-size="12" text-anchor="end" font-family="ui-monospace">'+(v>=1000?'$'+Math.round(v/1000)+'k':'$'+Math.round(v))+'</text>';});
  g+='<rect class="rkSelRect" x="0" y="0" width="0" height="0" fill="var(--accent)" fill-opacity=".08" stroke="var(--accent)" stroke-dasharray="4 3" style="display:none;pointer-events:none"/>';
  var pts=[];
  POS.forEach(function(p,i){var x=X(+p.delta||0),y=Y(p.cap),r=6+Math.min(11,p.riskPct/3);
    var col=tempColor(stress[i]/maxStress);

    g+='<circle class="rkdot" data-id="'+p.id+'" cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="'+r.toFixed(1)+'" fill="'+col+'" fill-opacity=".22" stroke="'+col+'" stroke-width="1.4" data-goto="'+p.id+'" style="cursor:pointer"/>';
  });
  /* ticker labels: score each candidate slot (below/above/right/left/diagonals) by out-of-bounds,
     clash with already-placed labels, and overlap with ANY dot (incl. its own) — pick the lowest

               [pt.x+pt.r*0.7+lw/2,pt.y+pt.r+11],[pt.x-pt.r*0.7-lw/2,pt.y-pt.r-5]];

      sc+=(Math.max(0,padT+2-box.y0)+Math.max(0,box.y1-(H-padB))+Math.max(0,padL-box.x0)+Math.max(0,box.x1-(W-padR)))*50; /* out-of-bounds */
      lboxes.forEach(function(b){ var ox=Math.min(box.x1,b.x1)-Math.max(box.x0,b.x0), oy=Math.min(box.y1,b.y1)-Math.max(box.y0,b.y0); if(ox>0&&oy>0)sc+=ox*oy*0.5; }); /* label clash */
      pts.forEach(function(o){ if((o.r+lw/2-Math.abs(o.x-cx))>0 && (o.r+7-Math.abs(o.y-(cy-4)))>0) sc+=(o===pt?70:130); }); /* on a dot (own or other) */
      if(sc<bestScore){bestScore=sc;best=cands[ci];} }

  });

/* box-select-to-aggregate: drag a rect, pool the enclosed lines into one combined readout.
   + optional hover-link (dot⇄roster card + floating readout) and click-to-zoom, driven by cfg. */
function wireExpMapSelect(svg, info, cfg){
  cfg=cfg||{};

  var rect=null, start=null, moved=false, downId=null;
  function pt(ev){var b=svg.getBoundingClientRect(),vb=svg.viewBox.baseVal;return {x:(ev.clientX-b.left)/b.width*vb.width, y:(ev.clientY-b.top)/b.height*vb.height};}
  svg.addEventListener('mousedown',function(ev){ start=pt(ev); moved=false; rect=svg.querySelector('.rkSelRect'); downId=(ev.target&&ev.target.getAttribute&&ev.target.getAttribute('data-id'))||null; });
  svg.addEventListener('mousemove',function(ev){ if(!start||!rect)return; var q=pt(ev);
    var x=Math.min(start.x,q.x),y=Math.min(start.y,q.y),w=Math.abs(q.x-start.x),h=Math.abs(q.y-start.y);
    if(w>4||h>4)moved=true;
    rect.setAttribute('x',x);rect.setAttribute('y',y);rect.setAttribute('width',w);rect.setAttribute('height',h);rect.style.display='';
  });
  /* hover-link + click-zoom (Home only — cfg.hover / cfg.zoom) */
  if(cfg.hover){
    svg.addEventListener('mouseover',function(ev){ var d=ev.target.closest&&ev.target.closest('.rkdot'); if(d){ var id=d.getAttribute('data-id'); if(cfg.onHover)cfg.onHover(id,true); } });
    svg.addEventListener('mouseout',function(ev){ var d=ev.target.closest&&ev.target.closest('.rkdot'); if(d){ var id=d.getAttribute('data-id'); if(cfg.onHover)cfg.onHover(id,false); } });
  }
  window.addEventListener('mouseup',function(ev){ if(!start){return;} var s=start; start=null;
    if(!moved){ if(rect)rect.style.display='none'; if(cfg.zoom&&downId){ go('position',downId); } return; } /* click on a dot → zoom into its bloom */
    var q=pt(ev), x0=Math.min(s.x,q.x),x1=Math.max(s.x,q.x),y0=Math.min(s.y,q.y),y1=Math.max(s.y,q.y);
    var sel=(svg._pts||[]).filter(function(d){return d.x>=x0&&d.x<=x1&&d.y>=y0&&d.y<=y1;}).map(function(d){return d.id;});
    var lines=POS.filter(function(p){return sel.indexOf(p.id)>=0;});
    svg.querySelectorAll('.rkdot').forEach(function(c){c.classList.toggle('selon',sel.indexOf(c.getAttribute('data-id'))>=0);});
    if(!lines.length){ if(info)info.innerHTML='<b>Nothing enclosed.</b> Drag a box around two or more dots to pool them.'; return; }
    var gapF2=1-bookGapFrac().gap, cap=0,nd=0,st=0,risk=0; lines.forEach(function(p){cap+=p.cap;nd+=(+p.delta||0);st+=Math.max(0,-payFor(p,p.spot*gapF2));risk+=p.riskPct;});
    if(info)info.innerHTML='<div class="rkselttl">'+lines.length+' lines pooled — '+lines.map(function(p){return p.sym;}).join(' · ')+'</div>'+
      '<div class="rkselstats"><span><i>Capital</i>'+money(cap)+'</span><span><i>Net Δ</i>'+(nd>=0?'+':'')+nd.toFixed(2)+'</span>'+
      '<span><i>Book risk</i>'+Math.round(risk)+'%</span><span class="'+(st>0?'warnv':'')+'"><i>If −10%</i>'+money(-st)+'</span></div>'+
      '<div class="rkselnote">These '+lines.length+' move together — one SMH/SMH-put hedge would cap the pool at once.</div>';
  });
}

function conceptCardHTML(c,big){ if(!c)return ''; return '<div class="lconcept'+(big?' big':'')+'" data-concept="'+c.h.toLowerCase()+'"><div class="lc-h"><span class="lci"><svg viewBox="0 0 24 24">'+c.icon+'</svg></span><b>'+c.h+'</b></div><p>'+glossWrap(c.p)+'</p>'+(big?'<div class="callout bare"><span class="xt">The mechanics</span>'+glossWrap(c.x)+'</div>':'')+'</div>'; }
function glossItemHTML(t){ return '<div class="lgi" data-k="'+(t.t+' '+(t.alias||'')+' '+(t.k||'')).toLowerCase().replace(/"/g,'')+'"><div class="lgi-h"><b>'+t.t+'</b>'+(t.alias?'<span class="ga">'+t.alias+'</span>':'')+'<span class="lgi-cat">'+t.cat+'</span></div><div class="lgi-def">'+glossWrap(t.def)+'</div></div>'; }
function renderLearn(seed){
  var lead='';
  if(seed&&seed.type==='strat'){ lead=strategyExplainerHTML(seed.s); }
  else if(seed&&seed.type==='term'){ var t=seed.t; lead='<div class="lexpl"><div class="lexpl-h"><b>'+t.t+'</b>'+(t.alias?'<span class="ga">'+t.alias+'</span>':'')+'<span class="badge">'+t.cat+'</span></div><div class="lexpl-tag">'+t.def+'</div><div class="callout bare"><span class="xt">Under the hood</span>'+glossWrap(t.x)+'</div></div>'; }
  else if(seed&&seed.type==='concept'){ lead=conceptCardHTML(seed.c,true); }
  return '<div class="ovwrap lrn"><div class="dectop"><button class="dback" data-learn-act="back">← Back</button>'+
      '<div class="decttl">Learn<span class="dctx"> · concepts · strategies · terms</span></div>'+
      '<div class="lsearch"><input id="learnq" placeholder="what to understand? — theta · iron condor · gap risk" autocomplete="off" spellcheck="false"></div></div>'+
    '<div class="lrn-body">'+
      (lead?'<div class="lsec lead">'+lead+'</div>':'')+
      '<div class="lsec"><div class="lsec-h"><span class="eyebrow">Concepts</span></div><div class="lconcepts">'+LEARN_C.map(function(c){return conceptCardHTML(c,false);}).join('')+'</div></div>'+
      '<div class="lsec"><div class="lsec-h"><span class="eyebrow">Glossary</span><span class="hint">'+LEARN_G.length+' terms · type above to filter</span></div><div class="lgloss" id="lglossList">'+LEARN_G.map(glossItemHTML).join('')+'</div></div>'+
    '</div></div>'; }
function openLearn(seed,origin){ learnEl=learnEl||document.getElementById('learnStage'); if(!learnEl)return;
  learnEl.innerHTML=renderLearn(seed); learnOpen=true; learnO._origin=origin||null; overlayShow(learnEl,origin);
  if(seed&&seed.type==='strat'){ var sv=learnEl.querySelector('.lexpl-pay'); if(sv)drawLearnPay(sv,seed.s.def); }
  var q=document.getElementById('learnq'); if(q){ q.oninput=function(){ filterLearn(q.value); }; if(!reduce)window.setTimeout(function(){q.focus();},80); }
  learnEl.onclick=function(e){ var b=e.target.closest('[data-learn-act]'); if(b&&b.getAttribute('data-learn-act')==='back'){ closeLearn(); return; }
    var g=e.target.closest('.gloss[data-term]'); if(g){ var gt=GBY[g.getAttribute('data-term').toLowerCase()]; if(gt)openLearn({type:'term',t:gt}, g.getBoundingClientRect()); return; }
    var cc=e.target.closest('[data-concept]'); if(cc){ var c=CBY[cc.getAttribute('data-concept')]; if(c&&!e.target.closest('.big'))openLearn({type:'concept',c:c}, cc.getBoundingClientRect()); return; } };
}
function closeLearn(){ if(!learnOpen)return; learnOpen=false; overlayHide(learnEl, learnO._origin); }
function filterLearn(q){ q=(q||'').trim().toLowerCase(); if(!learnEl)return;
  var items=learnEl.querySelectorAll('#lglossList .lgi'); for(var i=0;i<items.length;i++){ items[i].style.display=(!q||items[i].getAttribute('data-k').indexOf(q)>=0)?'':'none'; } }
/* command-bar learn entry: 'learn X' / a bare term / strategy / concept → the lens seeded on it */
function learnResolve(q){ q=(q||'').trim().toLowerCase().replace(/^(learn|what ?is|explain|define|teach me)\s+/,''); if(!q){ openLearn(null,null); return true; }
  var s=SBY[q]||learnStrat(q); if(s){ openLearn({type:'strat',s:s},null); return true; }
  if(GBY[q]){ openLearn({type:'term',t:GBY[q]},null); return true; }
  if(CBY[q]){ openLearn({type:'concept',c:CBY[q]},null); return true; }
  var k=glossKeys().filter(function(x){return x.indexOf(q)>=0;})[0]; if(k){ openLearn({type:'term',t:GBY[k]},null); return true; }
  /* multi-word: every word must appear in the term's/concept's searchable text */
  var words=q.split(/\s+/).filter(Boolean);
  var gt=LEARN_G.filter(function(t){ var hay=(t.t+' '+(t.alias||'')+' '+(t.k||'')).toLowerCase(); return words.every(function(w){return hay.indexOf(w)>=0;}); })[0];
  if(gt){ openLearn({type:'term',t:gt},null); return true; }
  var sf=STRATS.filter(function(x){return (x.nm||'').toLowerCase().indexOf(q)>=0;})[0]; if(sf){ openLearn({type:'strat',s:sf},null); return true; }
  var cf=LEARN_C.filter(function(c){ var hay=((c.k||'')+' '+c.h).toLowerCase(); return words.every(function(w){return hay.indexOf(w)>=0;}); })[0]; if(cf){ openLearn({type:'concept',c:cf},null); return true; }
  return false; }
/* the glossary hover popover — one singleton, reads GBY, never a route */
function wireGloss(){ var pop=document.getElementById('glossPop'); if(!pop||pop._wired)return; pop._wired=1;
  document.addEventListener('mouseover',function(e){ var g=e.target.closest&&e.target.closest('.gloss[data-term]'); if(!g)return;
    var t=GBY[g.getAttribute('data-term').toLowerCase()]; if(!t)return;
    pop.innerHTML='<b>'+t.t+'</b>'+(t.alias?' <span class="ga">'+t.alias+'</span>':'')+'<div class="gpd">'+t.def+'</div><div class="gph">click to open in Learn</div>';
    var r=g.getBoundingClientRect(); pop.style.display='block';
    var pw=pop.offsetWidth,ph=pop.offsetHeight,left=Math.max(6,Math.min(window.innerWidth-pw-6,r.left));
    var top=r.bottom+7; if(top+ph>window.innerHeight-6)top=Math.max(6,r.top-ph-7);
    pop.style.left=left+'px'; pop.style.top=top+'px'; void pop.offsetWidth; pop.classList.add('on'); });
  document.addEventListener('mouseout',function(e){ var g=e.target.closest&&e.target.closest('.gloss[data-term]'); if(g){ pop.classList.remove('on'); pop.style.display='none'; } }); }

function boot(){
  var served=deskBackendEnabled(),fixtureFlag=document.getElementById('fixtureFlag');if(fixtureFlag)fixtureFlag.hidden=served;
  if(served){POS=[];byId={};state.focus=null;BOOK_AUTH={phase:'loading',data:null,missing:[],error:null,requestId:0};}
  /* one POP definition everywhere: run held positions through the SAME tail-aware model as
     candidates, so a card's 'Chance' matches its own bell + scenario bars (no stale literals).
     Parse each line's expiry so the event-calendar check knows whether a catalyst lands in-window. */
  POS.forEach(function(p){ if(!p.exp){ var m=(p.legStr||'').match(/exp ([0-9]{2}-[A-Za-z]{3})/); if(m)p.exp=m[1]; } p.pop=popCalc(p); });
  stageEl=document.getElementById('stage');
  boardEl=document.getElementById('board');
  bookEl=document.getElementById('book');
  recedeEl=document.getElementById('recede');
  focusEl=document.getElementById('focus');
  summaryEl=document.getElementById('summary');
  crumbsEl=document.getElementById('crumbs');
  cmdEl=document.getElementById('cmd');
  toastEl=document.getElementById('toast');
  decideEl=document.getElementById('decideStage');
  importEl=document.getElementById('importStage');
  learnEl=document.getElementById('learnStage');
  wireGloss();

  /* Escape closes any open overlay first (capture phase, before the zoom-out handler) */
  document.addEventListener('keydown',function(e){
    if(e.key!=='Escape')return;
    if(learnOpen){ closeLearn(); e.stopPropagation(); e.preventDefault(); return; }
    if(importOpen){ closeImport(); e.stopPropagation(); e.preventDefault(); return; }
    if(decide){exitDecide();e.stopPropagation();e.preventDefault();}
  },true);

  for(var i=0;i<POS.length;i++){ cardEl[POS[i].id]=makeCard(POS[i]); }

  layoutForLevel('book',state.focus);
  updateThread();
  if(served)window.DeskBackend.loadBook().catch(function(){ /* typed book-error renders through the bridge */ });

  cmdEl.addEventListener('keydown',function(e){ if(e.key==='Enter'){ handleCmd(cmdEl.value); } });
  cmdEl.addEventListener('focus',function(){ cmdEl.placeholder='symbol · sector · or learn — XOM · financials · iron condor · theta'; });
  /* brand mark = the home anchor (was a lone 'Your book' crumb); click zooms all the way out */
  var bh=document.getElementById('brandHome'); if(bh) bh.onclick=function(){ if(decide)exitDecide(); go('book'); };
  /* the symbol pill echoes what the chain/sector lenses point at — click to retarget via the command bar */
  var cs=document.getElementById('cmdSym'); if(cs) cs.onclick=function(){
    if(decide&&decide.canPick){ decide.intentOpen=true;decide.composerKeepOpen=true;decide.ideaDraft=ideaDraftFromDecide(false); decide.pickOpen=true; renderDecide(); var uq=document.getElementById('univq'); if(uq){uq.focus();if(uq.select)uq.select();} return; }
    cmdEl.focus(); if(cmdEl.select)cmdEl.select(); };
  /* persistent New idea — reachable from ANY view (not just the landing) */
  var tni=document.getElementById('threadNewIdea');
  if(tni) tni.onclick=function(){
    if(importOpen)closeImport(); if(decide)exitDecide();
    HOME_IDEA.symbol=null;HOME_IDEA.query='';HOME_IDEA.targetCents=null;HOME_IDEA.holdingsShares=null;
    go('book');authRenderOpportunityOnly();
    var input=document.querySelector('[data-auth-workbench-query]');
    if(input){input.focus({preventScroll:true});if(input.select)input.select();input.scrollIntoView({block:'nearest'});} };

  /* ---- market mode (Observed = live Cboe data · Simulated = synthetic/demo). Replaces the old
     Beginner/Expert lens (level content is unified now). Conditions chains/candles + the sim controls. ---- */
  var msegs=document.querySelectorAll('#mktMode .mmseg button');
  for(var li=0;li<msegs.length;li++){ (function(b){ b.addEventListener('click',function(){
    setMktMode(b.getAttribute('data-mkt')); }); })(msegs[li]); }

  document.addEventListener('keydown',function(e){
    if(e.key==='Escape'){
      if(document.activeElement===cmdEl){ cmdEl.blur(); return; }
      var i=LEVELS.indexOf(state.level);
      if(i>0) go(LEVELS[i-1]);
    }
  });

  window.addEventListener('resize',function(){ window.cancelAnimationFrame(rzTimer); rzTimer=window.requestAnimationFrame(redraw); });
}

if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',boot);
else boot();
/* read-only layout probe for cross-browser audits (?probe=1): fixed overlay reporting the
   real computed geometry, so a screenshot of ANY browser yields numbers, not guesses. */
(function(){if(!/[?&]probe=1/.test(location.search))return;
  var el=document.createElement('div');
  el.style.cssText='position:fixed;right:6px;bottom:6px;z-index:99999;background:#000c;border:1px solid #0ff;color:#0ff;font:11px monospace;padding:6px 8px;pointer-events:none;white-space:pre;text-align:left';
  document.body.appendChild(el);
  window.setInterval(function(){
    var g=document.querySelector('.decgrid'),cols=['.dcleft','.dccenter','.dcright'].map(function(sel){var n=document.querySelector(sel);if(!n)return sel+':—';var b=n.getBoundingClientRect();return sel.slice(1)+':'+Math.round(b.left)+'+'+Math.round(b.width);});
    el.textContent='vp '+innerWidth+'x'+innerHeight+' dpr'+(window.devicePixelRatio||1)+
      '\nscrollW '+document.documentElement.scrollWidth+
      (g?'\ngrid w'+Math.round(g.getBoundingClientRect().width)+'\n'+cols.join('\n')+'\ntpl '+getComputedStyle(g).gridTemplateColumns:'\n(no decgrid)');
  },1000);})();
/* audit/deep links: ?goto=idea:SYM opens a working idea, ?goto=pos:SYM opens that position's
   bloom — the SAME openers the UI uses, nothing parallel. Waits for backend hydration. */
(function(){var m=/[?&]goto=(idea|pos):([A-Za-z0-9.\-]+)/.exec(location.search);if(!m)return;
  var kind=m[1],sym=m[2].toUpperCase(),tries=0;
  var timer=window.setInterval(function(){
    if(++tries>80){window.clearInterval(timer);return;}
    if(!deskBackendEnabled())return;
    if(kind==='pos'){var p=POS.find(function(row){return row.sym===sym;});
      if(p){window.clearInterval(timer);go('position',p.id);}}
    else{if(decide)return;window.clearInterval(timer);authOpenSymbol(sym,null);}
  },500);})();
</script>
</body>
