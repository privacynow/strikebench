<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StrikeBench</title>
  <script>
    // Theme must be decided BEFORE first paint or dark-mode users get a white flash.
    // Modes: system (follow OS), light, dark. Stored under strikebench.theme.
    (function () {
      try {
        var mode = localStorage.getItem('strikebench.theme') || localStorage.getItem('optionslab.theme') || 'system';
        var dark = mode === 'dark' || (mode === 'system'
          && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      } catch (e) { document.documentElement.setAttribute('data-theme', 'light'); }
    })();
  </script>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#/home" title="Home — fresh accounts see the tour">StrikeBench</a>
    <nav class="nav" id="nav">
      <a href="#/home" data-route="home">Home</a>
      <a href="#/research" data-route="research">Research</a>
      <a href="#/trade" data-route="trade">Trade</a>
      <a href="#/portfolio" data-route="portfolio">Portfolio</a>
      <a href="#/status" data-route="status">Data</a>
    </nav>
    <div class="topbar-controls">
      <input id="global-search" type="text" list="universe-symbols" placeholder="Search symbol  /"
             autocomplete="off" spellcheck="false" aria-label="Search a ticker symbol">
      <button id="theme-toggle" type="button" class="theme-toggle"
              title="Theme: follows your system. Click to cycle System / Light / Dark."></button>
      <label class="risk-select" title="Risk mode used for new ideas and tickets">
        <span>Risk</span>
        <select id="risk-mode">
          <option value="learning">Learning</option>
          <option value="conservative" selected>Conservative</option>
          <option value="balanced">Balanced</option>
          <option value="aggressive">Aggressive</option>
        </select>
      </label>
      <div class="level-switch" id="level-switch" role="group" aria-label="Experience level"
           title="Beginner: question-driven flows, plain language, extra safety context. Expert: dense, data-first screens with deeper analytics.">
        <button data-level="beginner" type="button">Beginner</button>
        <button data-level="expert" type="button">Expert</button>
      </div>
    </div>
  </header>

  <div id="tape" class="tape" hidden aria-label="Universe ticker">
    <div class="tape-scroll"><div class="tape-strip" id="tape-strip"></div></div>
  </div>
  <datalist id="universe-symbols"></datalist>

  <main id="app" class="app">
    <noscript>StrikeBench needs JavaScript enabled.</noscript>
    <div class="loading">Loading…</div>
  </main>

  <footer class="disclaimer" id="disclaimer">
    Educational tool only — paper trading by default. Options involve substantial risk of loss.
    Nothing here is financial advice or a promise of profit.
  </footer>

  <div id="modal-root"></div>

  <nav class="bottom-nav" id="bottom-nav" aria-label="Primary">
    <a href="#/home" data-route="home"><span class="bn-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 11l8-7 8 7"/><path d="M6.5 9.5V20h11V9.5"/></svg></span>Home</a>
    <a href="#/research" data-route="research"><span class="bn-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="6.5"/><path d="M16 16l4.5 4.5"/></svg></span>Research</a>
    <a href="#/trade" data-route="trade"><span class="bn-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 20l1-4L16.5 4.5a2.1 2.1 0 0 1 3 3L8 19z"/><path d="M13.5 7.5l3 3"/></svg></span>Trade</a>
    <a href="#/portfolio" data-route="portfolio"><span class="bn-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 19h16"/><path d="M5 15l4-5 3 3 6-8"/><circle cx="18" cy="5" r="1.2"/></svg></span>Portfolio</a>
    <a href="#/status" data-route="status"><span class="bn-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="4" width="7" height="7" rx="1"/><rect x="13" y="4" width="7" height="7" rx="1"/><rect x="4" y="13" width="7" height="7" rx="1"/><rect x="13" y="13" width="7" height="7" rx="1"/></svg></span>Data</a>
  </nav>

  <script src="/vendor/d3.min.js"></script>
  <script src="/js/learn.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/assist.js"></script>
  <script src="/js/builder.js"></script>
  <script src="/js/views.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
