<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>StrikeBench — Desk</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2024%2024'%3E%3Cdefs%3E%3ClinearGradient%20id='g'%20x1='0'%20y1='0'%20x2='1'%20y2='1'%3E%3Cstop%20offset='0'%20stop-color='%232f6bde'/%3E%3Cstop%20offset='1'%20stop-color='%237c4fe0'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect%20width='24'%20height='24'%20rx='6'%20fill='url(%23g)'/%3E%3Cpath%20d='M5%2019h14'%20stroke='rgba(255,255,255,.4)'%20stroke-width='1.2'%20stroke-linecap='round'%20stroke-dasharray='1.4%202.6'/%3E%3Cpath%20d='M5%2015.5h6l7.5-8.5'%20stroke='%23fff'%20stroke-width='2.2'%20fill='none'%20stroke-linecap='round'%20stroke-linejoin='round'/%3E%3Ccircle%20cx='11'%20cy='15.5'%20r='1.9'%20fill='%23fff'/%3E%3C/svg%3E">
<link rel="stylesheet" href="app.css?v=@asset.version@">
<style>
/* =====================================================================
   index.html — the whole Desk as one breathing decision canvas (site root).
   NO tabs, NO rail. One zoom axis: Market > Sector > Book > Position.
   Everything below is NEW layout + FLIP animation. Colors/type/atoms are
   reused from app.css while canonical backend owners replace staged fixtures.
   ===================================================================== */

/* readability: raise the app.css type scale ~16% across the whole Desk (book, bloom, Decide),
   and one shared MOTION vocabulary (bloom DUR/EASE) used by every transition + animation. */
:root{
  /* Use valid length-valued fluid tokens. A unitless multiplier cannot interpolate with vw;
     when it did, browsers rejected the derived declarations and flattened most labels to the
     inherited 16px size. These clamps preserve hierarchy continuously across desktop widths. */
  --fs:1;
  --f-2xs:clamp(10.4px,calc(8.8px + .13vw),12px);
  --f-xs:clamp(11px,calc(9.3px + .14vw),12.9px);
  --f-sm:clamp(12.7px,calc(10.7px + .16vw),14.8px);
  --f-base:clamp(14.2px,calc(12.2px + .16vw),16.5px);
  --f-md:clamp(15.5px,calc(13.2px + .19vw),18.1px);
  --f-lg:clamp(17.2px,calc(14.4px + .22vw),20.2px);
  --f-xl:clamp(19px,calc(15.7px + .26vw),22.3px);
  --f-num:var(--f-base);
  --mo-dur:340ms; --mo-ease:cubic-bezier(.22,.68,.28,1); --mo-quick:140ms
}

/* HTML's hidden state is an application invariant. Layout selectors below intentionally have
   higher specificity, so the semantic state must remain authoritative over their display mode. */
[hidden]{display:none!important}

#app{height:100%;display:flex;flex-direction:column;overflow:hidden}

/* ---- THE THREAD (the only persistent chrome: breadcrumb + command) ---- */
.thread{height:46px;flex:none;display:flex;align-items:center;gap:14px;padding:0 14px;
  border-bottom:1px solid var(--line);background:var(--grad-top)}
.brandmk{width:18px;height:18px;border-radius:5px;flex:none;border:0;cursor:pointer;padding:0;
  background:conic-gradient(from 210deg,var(--accent),#237e86 55%,#123a3f);transition:filter var(--mo-quick) var(--mo-ease)}
.brandmk:hover{filter:brightness(1.15)}
.thctl{display:flex;align-items:center;gap:9px;flex:none}
.thsep{width:1px;height:20px;background:var(--line-soft);flex:none}
.thctx{flex:1;min-width:0;display:flex;align-items:center;gap:13px;overflow:hidden}   /* swaps market-strip ⇄ crumbs+state by zoom */
.thread.zoomed .mktstrip{display:none}
.thread:not(.zoomed) .crumbs,.thread:not(.zoomed) .tstate{display:none}
.cmdsym{border:0;background:var(--panel-2);border-radius:6px;color:var(--dim);font-family:var(--mono);
  font-size:var(--f-2xs);padding:3px 7px;margin-right:2px;cursor:pointer;flex:none;white-space:nowrap;transition:color var(--mo-quick) var(--mo-ease)}
.cmdsym b{color:var(--accent);font-weight:700} .cmdsym:hover{color:var(--text)}
/* depth is short by design → crumbs size to content; the reclaimed middle carries live STATE.
   The old .crumbs{flex:1} is what stretched the clickable row across the whole strip → rail feel. */
.crumbs{display:flex;align-items:center;gap:1px;flex:none}
.crumb{border:0;background:0;color:var(--dim);font-size:var(--f-sm);font-weight:600;
  padding:5px 9px;border-radius:6px;white-space:nowrap;max-width:38ch;overflow:hidden;
  text-overflow:ellipsis;transition:background var(--mo-quick) var(--mo-ease),color var(--mo-quick) var(--mo-ease)}
.crumb:hover:not(.cur){color:var(--text);background:var(--row-hover)}
.crumb.cur{color:var(--text);font-weight:700;cursor:default}
.crumb .cx{color:var(--dim);font-weight:600}
.crumb.home .hmk{vertical-align:-1.5px;margin-right:6px;opacity:.7;transition:opacity var(--mo-quick) var(--mo-ease)}
.crumb.home.cur{cursor:default}                       /* lone home token = a place, not a link */
.crumb.home:not(.cur):hover .hmk{opacity:1}           /* a zoom-OUT only once it's a real ancestor */
.sep{color:var(--faint);font-size:var(--f-base);padding:0 1px;user-select:none}
/* live pulse of wherever you're zoomed — STATE, never navigation (that's what keeps it off the rail) */
.tstate{flex:1;min-width:0;display:flex;align-items:center;gap:13px;overflow:hidden;
  font-size:var(--f-sm);color:var(--dim);white-space:nowrap;
  -webkit-mask-image:linear-gradient(90deg,#000 90%,transparent);mask-image:linear-gradient(90deg,#000 90%,transparent)}
.tstate .tz{display:inline-flex;align-items:baseline;gap:5px;flex:none}
.tstate .tk{font-size:var(--f-2xs);color:var(--faint);text-transform:uppercase;letter-spacing:.06em}
.tstate .tz b{font-family:var(--mono);font-weight:700;color:var(--text)}
.tstate .tz b.pos{color:var(--profit)} .tstate .tz b.neg{color:var(--loss)}
.tstate .tz b.sim{color:var(--violet)}                /* echoes the simRibbon / Simulated segment */
.tstate .tdot{width:3px;height:3px;border-radius:50%;background:var(--faint);flex:none}
.tstate:empty{display:none}
@media (max-width:1200px){ .thread.zoomed .tstate{display:none} }    /* narrow: yield the strip to crumbs + command */
.cmd{flex:none;width:min(348px,42vw)}
.thread .searchbox{width:100%}
/* market-mode control (Observed · Simulated) — replaces the old level toggle in the thread */
.mktmode{flex:none}
.mktmode .mmseg{display:inline-flex;border:1px solid var(--line);border-radius:7px;overflow:hidden;background:var(--panel-2)}
.mktmode .mmseg button{border:0;background:0;color:var(--dim);font-size:var(--f-sm);font-weight:600;padding:5px 11px;cursor:pointer;border-left:1px solid var(--line);transition:background var(--mo-quick) var(--mo-ease),color var(--mo-quick) var(--mo-ease)}
.mktmode .mmseg button:first-child{border-left:0}
.mktmode .mmseg button:hover{color:var(--text)}
.mktmode .mmseg button.on{background:var(--accent-2);color:var(--text)}
.mktmode .mmseg button[data-mkt="sim"].on{background:var(--violet);color:#0a0f18}
/* simulated-market control ribbon (Home, sim mode only) */
.simribbon{display:flex;align-items:center;gap:16px;flex-wrap:wrap;padding:7px 16px;border-bottom:1px solid var(--line);background:rgba(155,140,255,.08)}
.simribbon .simlbl{font-family:var(--mono);font-size:var(--f-xs);font-weight:700;color:var(--violet);letter-spacing:.05em}
.simribbon .simctl{display:inline-flex;align-items:center;gap:7px}
.simribbon .sck{font-size:var(--f-2xs);text-transform:uppercase;letter-spacing:.06em;color:var(--faint)}
.simribbon .seg{display:inline-flex;border:1px solid var(--line-soft);border-radius:5px;overflow:hidden}
.simribbon .seg button{border:0;border-left:1px solid var(--line-soft);background:var(--panel-2);color:var(--dim);font-size:var(--f-2xs);padding:3px 9px;cursor:pointer}
.simribbon .seg button:first-child{border-left:0}
.simribbon .seg button.on{background:var(--violet);color:#0a0f18}
.simribbon .magb{width:19px;height:19px;border:1px solid var(--line-soft);background:var(--panel-2);color:var(--dim);border-radius:4px;cursor:pointer;font-weight:600}
.simribbon .simseedv{font-family:var(--mono);font-weight:700;min-width:24px;text-align:center}
.simribbon .simfp{font-family:var(--mono);font-size:var(--f-2xs);color:var(--faint)}
.simribbon .simnote{font-size:var(--f-2xs);color:var(--faint);margin-left:auto}

/* ---- STAGE ---- */
#stage{flex:1;min-height:0;display:flex;flex-direction:column}

/* ---- LANDING HEADER (book view only): market pulse · your-book line · opportunities.
   Three slim rows fold in light Data + ambient posture so there's no rail anywhere. ---- */
.summary{flex:none;display:flex;flex-direction:column;border-bottom:1px solid var(--line);background:var(--panel-2)}
.lv-position .summary{display:none}
.summary .sblock{display:flex;flex-direction:column;gap:1px}
.summary .sv{font-family:var(--mono);font-weight:700;font-size:var(--f-lg);letter-spacing:-.3px}
.summary .sv.warnv{color:var(--caution)}
.summary .sblock-btn{border:0;background:0;text-align:left;cursor:pointer;padding:3px 8px;margin:-3px -2px;border-radius:7px;align-items:flex-start;
  transition:background var(--mo-quick) var(--mo-ease)}
.summary .sblock-btn:hover{background:var(--row-hover)}
.summary .sblock-btn .lbl{position:relative}
.summary .sblock-btn:hover .lbl::after{content:'interrogate ›';position:absolute;left:100%;margin-left:6px;white-space:nowrap;color:var(--accent);font-size:var(--f-xs);letter-spacing:.02em}

/* MARKET STRIP — the folded pulse, now living INLINE in the merged top row's middle zone (was a
   whole second .pulse row). Mode shows ONCE here: the .mktsrc source tag flips teal→violet and
   .mktstrip.sim tints every value violet — the #mktMode segment stays the control, never echoed. */
.mktstrip{display:flex;align-items:center;gap:13px;flex:1;min-width:0;overflow:hidden;white-space:nowrap;
  -webkit-mask-image:linear-gradient(90deg,#000 92%,transparent);mask-image:linear-gradient(90deg,#000 92%,transparent)}
.mktstrip .mktsrc{font-size:var(--f-2xs);font-family:var(--mono);color:var(--accent);letter-spacing:.03em;flex:none}
.mktstrip.sim .mktsrc{color:var(--violet)}
.mktstrip.sim .idx b,.mktstrip.sim .mktsec b{color:var(--violet)}
.mktstrip .idx{font-size:var(--f-xs);color:var(--dim);font-family:var(--mono);display:inline-flex;gap:5px;align-items:baseline;flex:none}
.mktstrip .idx b{color:var(--text);font-weight:700}
.mktstrip .idx i{font-style:normal;font-size:var(--f-sm)}
.mktstrip .idx i.pos{color:var(--profit)} .mktstrip .idx i.neg{color:var(--loss)}
.mktstrip .pdiv{width:1px;height:15px;background:var(--line-soft);flex:none}
.mktstrip .mktsec{font-size:var(--f-xs);font-family:var(--mono);color:var(--dim);flex:none} .mktstrip .mktsec b{color:var(--text);font-weight:700}
.mktstrip .badge{flex:none}
.mktstrip .heat{display:flex;align-items:flex-end;gap:9px;flex:none}
.mktstrip .hx{display:flex;flex-direction:column;align-items:center;gap:3px}
.mktstrip .hx .hxbar{height:18px;display:flex;align-items:flex-end}
.mktstrip .hx i{display:block;width:8px;border-radius:2px 2px 0 0;background:var(--dim);min-height:3px}
.mktstrip .hx.you i{background:var(--caution)}
.mktstrip .hx em{font-style:normal;font-size:var(--f-2xs);color:var(--faint);letter-spacing:.01em;line-height:1;white-space:nowrap}
.mktstrip .hx.you em{color:var(--caution)}

/* row 2 — book line */
/* book-performance hero — equity curve + the numbers that tell the story */
.perfband{display:grid;grid-template-columns:minmax(150px,auto) minmax(200px,1fr) auto;gap:26px;align-items:center;
  padding:13px 18px;border-top:1px solid var(--line-soft);border-bottom:1px solid var(--line-soft);background:linear-gradient(180deg,var(--accent-wash),transparent 70%)}
.perfband .pf-lead{display:flex;flex-direction:column;gap:1px}
.perfband .pf-lead .lbl{font-size:var(--f-xs);text-transform:uppercase;letter-spacing:.09em;color:var(--faint);font-weight:700}
.pf-net{font-family:var(--mono);font-size:calc(var(--f-lg) * 1.35);font-weight:800;letter-spacing:-.6px;line-height:1.05}
.pf-net.pos{color:var(--profit)} .pf-net.neg{color:var(--loss)}
.pf-day{font-size:var(--f-xs);font-family:var(--mono);font-weight:700}
.pf-day.pos{color:var(--profit)} .pf-day.neg{color:var(--loss)}
.pf-eq{width:100%;height:58px;display:block;overflow:visible}
.beq-zero,.beq-high,.beq-now{font-family:var(--mono);font-variant-numeric:tabular-nums;
  paint-order:stroke fill;stroke:var(--panel-2);stroke-width:2.5px;stroke-linejoin:round}
.beq-zero{fill:var(--faint);font-size:var(--f-2xs);font-weight:650;letter-spacing:.02em}
.beq-high{fill:var(--profit);font-size:var(--f-2xs);font-weight:750}
.beq-now{font-size:var(--f-xs);font-weight:800}
.pf-stats{display:grid;grid-template-columns:repeat(3,auto);gap:5px 22px}
.pf-stats .pfs{display:flex;flex-direction:column;gap:0}
.pf-stats .pfk{font-size:var(--f-xs);color:var(--faint);text-transform:uppercase;letter-spacing:.3px}
.pf-stats .pfv{font-family:var(--mono);font-weight:700;font-size:var(--f-sm);color:var(--text)}
.pf-stats .pfv.pos{color:var(--profit)} .pf-stats .pfv.neg{color:var(--loss)}
@media (max-width:1100px){ .perfband{grid-template-columns:1fr;gap:12px} }

.bookline{display:flex;align-items:center;gap:20px;padding:10px 18px;flex-wrap:wrap}
.bookline .sneed{display:inline-flex;align-items:center;gap:9px;border:0;background:0;cursor:pointer;padding:3px 6px;border-radius:6px}
.bookline .sneed:hover{background:var(--row-hover)}
.posture{display:flex;align-items:center;gap:7px;margin-left:auto;padding-left:16px;border-left:1px solid var(--line-soft)}
.posture .pgt{font-size:var(--f-xs);letter-spacing:.09em;text-transform:uppercase;color:var(--faint);font-weight:700}
.pchip{border:1px solid var(--line);background:#0d131c;color:var(--dim);border-radius:6px;padding:4px 11px;
  font-size:var(--f-xs);font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px;
  transition:border-color var(--mo-quick) var(--mo-ease),color var(--mo-quick) var(--mo-ease)}
.pchip:hover{border-color:var(--accent-2);color:var(--text)}
.pchip.static{cursor:default;background:0;border-style:dashed}
.pchip.static:hover{border-color:var(--line);color:var(--dim)}
.pchip .pcsub{color:var(--faint);font-family:var(--mono);font-size:var(--f-xs)}
.pchip.lanes{gap:8px}
.pchip .ld{font-family:var(--mono);font-size:var(--f-sm)}
.pchip .ld.real{color:var(--profit)} .pchip .ld.paper{color:var(--violet)}
.landing-acts{display:flex;align-items:center;gap:8px}

/* row 3 — opportunities */
.oppstrip{display:flex;align-items:center;gap:9px;padding:7px 18px 9px;border-top:1px solid var(--line-soft);flex-wrap:wrap}
.opp-lbl{font-size:var(--f-xs);letter-spacing:.09em;text-transform:uppercase;color:var(--faint);font-weight:700;flex:none}
.oppchip{border:1px solid var(--line);background:var(--panel);color:var(--dim);border-radius:7px;padding:5px 11px;
  font-size:var(--f-xs);cursor:pointer;text-align:left;line-height:1.3;transition:border-color var(--mo-quick) var(--mo-ease),background var(--mo-quick) var(--mo-ease)}
.oppchip:hover{border-color:var(--accent-2);background:#0f1c22}
.oppchip b{color:var(--text)} .oppchip .oi{margin-right:2px}
.oppchip .oi{display:inline-flex;vertical-align:-4px;color:var(--accent)}
.oppchip .oi svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.oppchip .tridot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:7px;vertical-align:middle;flex:none}
.oppchip .tridot.bad{background:var(--loss);box-shadow:0 0 0 3px rgba(243,93,100,.14)}
.oppchip .tridot.warn{background:var(--caution);box-shadow:0 0 0 3px rgba(231,172,68,.14)}
.oppchip .tridot.ok{background:var(--profit)}
.oppchip.proactive{border-style:dashed;border-color:var(--accent-2)}
.oppchip.proactive:hover{background:var(--accent-wash)}

/* The wide Home header is one orientation band, composed from the existing performance and book
   line components. Position-specific triage now lives on the position rail instead of repeating
   as a second row of sentence chips. */
.homesummary{display:grid;grid-template-columns:minmax(0,1.75fr) minmax(760px,1fr);align-items:stretch}
.homesummary .perfband{padding:8px 16px;gap:18px;border-top:0;border-bottom:0;background:linear-gradient(180deg,var(--accent-wash),transparent 78%)}
.homesummary .pf-eq{height:48px}
.homesummary .pf-stats{grid-template-columns:repeat(3,auto);gap:4px 18px}
.homesummary .bookline{padding:8px 14px;gap:13px;flex-wrap:nowrap;border-left:1px solid var(--line-soft)}
.homesummary .bookline .sblock{min-width:82px}
.homesummary .bookline .sneed{padding:3px 5px;flex:none}
.homesummary .bookline .sneed .hint{display:none}
.homesummary .posture{padding-left:11px;gap:5px}
.homesummary .posture .pgt,.homesummary .posture .pchip.static{display:none}
.homesummary .pchip{padding:3px 7px;background:transparent}
.homesummary .landing-acts .btn{width:32px;height:30px;padding:0;display:grid;place-items:center;font-size:0}
.homesummary .landing-acts .btn::before{content:'↧';font-size:var(--f-lg);color:var(--accent)}
.hshort{display:none}
@media (max-width:2050px){
  .homesummary{grid-template-columns:minmax(0,1.5fr) minmax(680px,1fr)}
  .homesummary .pf-stats{gap:3px 11px}.homesummary .bookline{gap:9px}.homesummary .pchip .pcsub{display:none}
}
@media (max-width:1700px){
  .homesummary{display:flex;flex-direction:column}.homesummary .bookline{border-left:0;border-top:1px solid var(--line-soft)}
}

/* board = the zoom stage */
.board{flex:1;min-height:0;display:flex;gap:14px;padding:14px;overflow:hidden}

/* --- BOOK view: one 12-column desktop cockpit. At 2560 every primary context is co-visible:
   risk map + chain + positions above; governor + market + sector/research + news below. --- */
.book{flex:1;min-height:0;display:grid;
  grid-template-columns:repeat(auto-fill,minmax(290px,1fr));grid-auto-rows:min-content;
  gap:12px;align-content:start;overflow:auto}
.lv-book .board{display:grid;grid-template-columns:repeat(12,minmax(0,1fr));
  grid-template-rows:minmax(475px,.9fr) minmax(0,1.1fr);
  grid-template-areas:
    "roster roster map map map map map chain chain chain chain chain"
    "bookrisk bookrisk bookrisk univ univ univ sector sector sector news news news";
  gap:11px;overflow:hidden}
.lv-book .book{grid-area:roster;grid-template-columns:1fr;
  grid-template-rows:auto repeat(var(--home-position-count,6),minmax(42px,1fr));grid-auto-rows:minmax(42px,1fr);
  overflow-x:hidden;overflow-y:auto;overscroll-behavior:contain;scroll-snap-type:y proximity;scrollbar-width:none;position:relative}
.lv-book .book>.rosterhd{position:sticky;top:0;z-index:3;background:var(--panel);padding-block:2px}
.bookoverflowmeta{margin-left:auto;min-width:112px;max-width:150px}.bookoverflowmeta .overflowhair{min-width:58px}
#riskMain,#bookrisk,#chainBand,#univBand,#sectorBand,#newsBand{display:none}
#riskMain{position:relative}
.lv-book #riskMain{display:flex;grid-area:map;flex-direction:column;min-height:0}
.lv-book #bookrisk{display:flex;grid-area:bookrisk;flex-direction:column;min-height:0}
.lv-book #chainBand{display:flex;grid-area:chain;flex-direction:column;min-height:0}
.lv-book #univBand{display:flex;grid-area:univ;flex-direction:column;min-height:0}
.lv-book #sectorBand{display:flex;grid-area:sector;flex-direction:column;min-height:0}
.lv-book #newsBand{display:flex;grid-area:news;flex-direction:column;min-height:0}
/* Short wide desktop: retain the two-row cockpit and reduce bounded previews before considering
   page movement. Home is a glanceable desk here, so the chain shows its nine nearest strikes; the
   complete chain remains one scope change away. */
@media (max-height:1199px) and (min-width:1701px){
  .lv-book .board{grid-template-rows:minmax(350px,.72fr) minmax(0,1.28fr);overflow:hidden}
}
@media (max-width:1700px){
  .lv-book .board{grid-template-columns:1fr 1fr;grid-template-rows:minmax(400px,auto) minmax(450px,auto) minmax(545px,auto) minmax(400px,auto);
    grid-template-areas:"map chain" "roster bookrisk" "univ sector" "news news";overflow:auto}
}
/* The cockpit scales continuously through normal desktop widths. The earlier two-column fallback
   turned the same six lenses into a four-row page at 1280–1440px, hiding universe and news below
   the fold. Keep the signed-off 12-column ownership and compact its internals instead. */
@media (min-width:1200px) and (max-width:1700px){
  .homesummary{display:grid;grid-template-columns:minmax(0,1.5fr) minmax(500px,.95fr);align-items:stretch}
  .homesummary .hfull{display:none}.homesummary .hshort{display:inline}
  .homesummary .perfband{grid-template-columns:minmax(180px,auto) minmax(190px,1fr);padding:6px 10px;gap:10px}
  .homesummary .pf-eq{height:42px}.homesummary .pf-stats{gap:2px 7px}.homesummary .pf-stats .pfk{white-space:nowrap;font-size:var(--f-2xs)}
  .homesummary .pf-lead .lbl{font-size:10px;line-height:1.1;white-space:nowrap}.homesummary .pf-net{font-size:16px}.homesummary .pf-day{font-size:11px;line-height:1.1}

.recede,.focus,.panel{display:none}
.lv-position .book{display:none}
.lv-position .recede{display:flex;flex-direction:column;gap:8px;flex:0 0 172px;overflow:auto}
.lv-position .focus{display:flex;flex:1;min-width:0;overflow:hidden}

/* ---- THE CARD (one node, three faces by parent container) ---- */
.card{border:1px solid var(--line);border-radius:10px;background:var(--raise);
  box-shadow:var(--raise-sheen);overflow:hidden;position:relative;will-change:transform}
.crow1{display:flex;align-items:baseline;gap:9px}
.crisk{width:8px;height:8px;border-radius:50%;flex:none;align-self:center}   /* risk-character dot (defined/secured/undef) */
.csym{font-size:var(--f-xl);font-weight:800;letter-spacing:.01em}
.cstruct{color:var(--dim);font-size:var(--f-sm)}
.cpnl{margin-left:auto;font-family:var(--mono);font-weight:700;font-size:var(--f-md)}
/* share-of-book row — the roster IS the concentration list, so no second list is needed */
.cshareRow{display:flex;align-items:center;gap:8px}
.cshare{flex:1;height:6px;border-radius:3px;background:var(--line-soft);overflow:hidden}
.cshare i{display:block;height:100%;border-radius:3px}
.csharev{font-family:var(--mono);font-size:var(--f-2xs);color:var(--dim);width:34px;text-align:right}
.ccap{color:var(--faint);font-size:var(--f-xs);font-family:var(--mono)}
/* peek — attn·cap·mini-payoff, revealed on hover/hot (density earned by focus) */
.cpeek{display:flex;gap:8px;align-items:center;max-height:0;opacity:0;overflow:hidden;
  transition:max-height var(--mo-quick) var(--mo-ease),opacity var(--mo-quick) var(--mo-ease)}
.cpeek .cspark{flex:1;height:34px;width:auto}
.cspark{width:100%;height:46px;display:block}
.cplspark{width:48px;height:16px;flex:none}
.cdetail{display:none}

/* book tile face — COMPACT scalable row (~52px); peeks on hover, blooms on click */
.book .card{padding:8px 11px;cursor:pointer;transition:border-color var(--mo-quick) var(--mo-ease),transform var(--mo-quick) var(--mo-ease)}
.book .card.needs.bad{border-left-color:var(--loss)}
.book .card.needs.warn{border-left-color:var(--caution)}
.book .card>.cface{display:flex;flex-direction:column;gap:5px}
.book .card:hover{border-color:#33465c;transform:translateY(-1px)}
.book .card:hover .cpeek,.book .card.cardhot .cpeek{max-height:120px;opacity:1;margin-top:3px}

/* Desktop roster: six fixed-height rows, with the hover preview cross-fading over row two instead
   of growing the card. The same card nodes still move through the book → bloom FLIP transition. */
@media (min-width:901px){
  .lv-book .book{gap:6px}
  .lv-book .book .card{padding:5px 9px}
  .lv-book .book .card>.cface{display:grid;grid-template-rows:auto 24px;gap:2px;min-width:0}

  .lv-book .book .cpnl{font-size:var(--f-sm);line-height:1}
  .lv-book .book .cshareRow,.lv-book .book .cpeek{grid-column:1;grid-row:2;min-width:0;align-self:center}
  .lv-book .book .cshareRow{opacity:1;transition:opacity var(--mo-quick) var(--mo-ease)}
  .lv-book .book .cpeek{max-height:none;height:24px;margin:0;opacity:0;gap:6px;align-items:center}
  .lv-book .book .cpeek .cspark{height:20px;min-width:44px}

/* receded strip chip face */
.recede .card{padding:9px 11px;cursor:pointer;border-radius:9px}
.recede .card>.cface{display:flex;flex-direction:column;gap:5px}
.recede .card .cstruct,.recede .card .cpeek,.recede .card .cdetail{display:none}
.recede .card .cshareRow .cplspark{display:none}
.recede .card .csym{font-size:var(--f-md)}
.recede .card .cpnl{font-size:var(--f-sm)}
.recede .card:hover{border-color:var(--accent-2);background:#0f1c22}
.recede .card.is-focus{display:none}
.recstrip-hd{font-size:var(--f-xs);letter-spacing:.11em;text-transform:uppercase;
  color:var(--faint);font-weight:600;padding:2px 2px 4px}

/* focus bloom face */
.focus .card{flex:1;display:flex;flex-direction:column;padding:0;cursor:default;border-radius:12px}
.focus .card>.cface{padding:15px 20px 13px;border-bottom:1px solid var(--line-soft);
  display:flex;flex-direction:column;gap:8px}
.focus .card .csym{font-size:calc(var(--f-xl)*1.25)}
.focus .card .cstruct{font-size:var(--f-md)}
.focus .card .cpnl{font-size:var(--f-lg)}
.focus .card .cspark,.focus .card .cshareRow,.focus .card .cpeek{display:none}   /* the bloom header is crow1 only; detail lives in .cdetail */
/* bloom: one full-width causal stack — payoff first, then the SAME scenario spectrum used by Decide.
   At 2560 the spectrum is one eight-card row; narrower desktop containers reflow it without shortening
   names. This keeps the payoff→scenario relationship legible and removes the dead middle-column void. */
.focus .card>.cdetail{flex:1;display:flex;flex-direction:column;padding:13px 18px 14px;min-height:0;overflow-y:auto;overflow-x:hidden}
.focus .card>.cdetail>.bd-cols{display:flex;flex-direction:column;gap:11px;margin-top:8px}
.focus .card>.cdetail>.bd-cols>.bd-hero{display:flex;flex-direction:column;min-width:0}
.focus .card .bd-hero .paywrap{position:relative;height:clamp(225px,21vh,292px);display:flex}
.focus .card .bd-hero .paywrap .cbig{flex:1;width:100%;height:auto;min-height:0;cursor:crosshair}
.focus .card>.cdetail>.bd-cols>.bd-right>.scenbox{margin-top:0;height:auto;display:flex;flex-direction:column}
.focus .card>.cdetail>.bd-cols>.bd-right>.scenbox .smx.barmode{overflow:visible}
.focus .card>.cdetail>.bd-cols>.bd-right>.scenbox .scensum{margin-top:7px}
/* hover crosshair + tooltip on the hero payoff (value at any price, instead of tiny labels) */
.paywrap .paycross{position:absolute;top:0;bottom:0;width:1px;background:var(--accent);opacity:0;pointer-events:none;
  transition:opacity var(--mo-quick) var(--mo-ease);z-index:2}
.paywrap .paytip{position:absolute;top:4px;transform:translateX(-50%);pointer-events:none;opacity:0;z-index:3;
  background:var(--pop-surface,#0d131c);border:1px solid var(--line);border-radius:7px;box-shadow:0 6px 18px rgba(0,0,0,.5);
  padding:5px 9px;white-space:nowrap;font-family:var(--mono);font-size:var(--f-sm);display:flex;align-items:baseline;gap:8px;
  transition:opacity var(--mo-quick) var(--mo-ease)}
.paywrap .paytip b{color:var(--text);font-weight:700}
.paywrap .paytip .tpct{color:var(--faint);font-size:var(--f-xs)}
.paywrap .paytip .tpl{font-weight:700}
.paywrap .paytip .tpl.pos{color:var(--profit)} .paywrap .paytip .tpl.neg{color:var(--loss)}
.focus .card .bd-right{min-height:0;display:flex;width:100%}
.focus .card .bd-right .scenbox{flex:1;display:flex;flex-direction:column}
/* one-row spectrum at the wide desktop target; the control ribbon spans the full row when pinned */

.scenbox>.lenshd{margin-bottom:5px}
/* the little colour keys that teach what the two bars mean (replaces the click-CTA prose) */

/* ---- ALWAYS-VISIBLE editable legs panel (the structure IS the editor) ---- */
.legspanel{margin-top:13px;border:1px solid var(--line-soft);border-radius:10px;background:var(--panel-2);padding:10px 12px}
.legspanel.editing{border-color:var(--accent-2);background:linear-gradient(100deg,var(--accent-wash),transparent 60%)}

.pendingbar{display:flex;align-items:center;gap:18px;flex-wrap:wrap}

.closetext{flex:1;min-width:240px;font-size:var(--f-sm);color:var(--text);line-height:1.5}
/* ACTIONABLE scenarios (bloom only) — click a row to pin a what-if on the payoff */
.focus .srow{cursor:pointer}
.focus .srow.pinned{background:var(--accent-wash);box-shadow:inset 2px 0 0 var(--accent)}
.focus .srow.pinned .snm{color:var(--accent)}
.whatif{margin-top:auto;padding:8px 2px 2px;border-top:1px solid var(--line-soft);display:flex;flex-direction:column;gap:7px}
.whatif .wf-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px}
.whatif .wf-main{font-size:var(--f-xs);color:var(--dim);line-height:1.4;min-width:0}
.whatif .wf-main b{color:var(--text)}
.whatif .wf-acts{display:flex;align-items:center;gap:12px;flex:none;white-space:nowrap}
.magctl{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:6px;padding:2px 4px 2px 8px;background:#0d131c}
.magctl .lbl{margin:0;font-size:var(--f-xs)}
.magctl .magb{border:1px solid var(--line-soft);background:#0e141d;color:var(--dim);width:22px;height:22px;border-radius:4px;font-size:var(--f-md);font-weight:600;cursor:pointer}
.magctl .magb:hover{border-color:var(--accent-2);color:var(--text)}
.magctl .magv{font-family:var(--mono);font-weight:700;font-size:var(--f-sm);min-width:40px;text-align:center}
.magctl .magv.pos{color:var(--profit)} .magctl .magv.neg{color:var(--loss)}
/* scenario playback timeline — now ▶───────● target-move, with speed */
.scenplay{display:flex;align-items:center;gap:9px;padding:6px 9px;border:1px solid var(--line-soft);border-radius:7px;background:#0d131c}
.scenplay .playb{flex:none;width:26px;height:26px;border-radius:50%;border:1px solid var(--accent-2);background:#0e141d;color:var(--accent);font-size:var(--f-xs);line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .12s,color .12s}
.scenplay .playb:hover{background:var(--accent-2);color:var(--text)}
.scenplay .playb.on{background:var(--accent);color:#04222a;border-color:var(--accent)}
.scenplay .tk{font-family:var(--mono);font-size:var(--f-2xs);letter-spacing:.02em;color:var(--dim);white-space:nowrap;flex:none}
.scenplay .tk.pos{color:var(--profit)} .scenplay .tk.neg{color:var(--loss)}
.scenplay .scrub{flex:1;min-width:70px;-webkit-appearance:none;appearance:none;height:4px;border-radius:3px;background:linear-gradient(90deg,var(--accent-2),var(--accent));cursor:pointer;margin:0}
.scenplay .scrub::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;background:var(--text);border:2px solid var(--accent);cursor:grab;box-shadow:0 1px 3px rgba(0,0,0,.5)}
.scenplay .scrub::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--text);border:2px solid var(--accent);cursor:grab}
.scenplay .scrub:active::-webkit-slider-thumb{cursor:grabbing}
.scenplay .magctl.end{flex:none;border:0;background:none;padding:0;gap:3px}
.scenplay .magctl.end .magb{width:19px;height:19px;font-size:var(--f-sm)}
.scenplay .magctl.end .magv{min-width:38px;font-size:var(--f-xs)}
.scenplay .spd{flex:none;display:inline-flex;border:1px solid var(--line-soft);border-radius:5px;overflow:hidden}
.scenplay .spd button{border:0;background:#0e141d;color:var(--dim);font-family:var(--mono);font-size:var(--f-2xs);padding:3px 6px;cursor:pointer;border-left:1px solid var(--line-soft)}
.scenplay .spd button:first-child{border-left:0}
.scenplay .spd button.on{background:var(--accent-2);color:var(--text)}
.whatif .wf-main .wf-mv{font-family:var(--mono);color:var(--dim)}
/* (scenario assumption steppers now reuse the canonical .mstp family inline in the pinned row —
   the bespoke .scenasm/.asmc/.magb block was deleted; see .smstps near the .srow rules) */

.pfhandle:hover rect{fill-opacity:1}

.adjtray{margin-top:14px;border:1px solid var(--accent-2);border-radius:10px;background:var(--panel-2);

/* research LENS (proves research is a lens on focus, not a destination) */

/* --- staggered reveal of detail after the geometry settles --- */

  transition:opacity var(--mo-dur) var(--mo-ease),transform var(--mo-dur) var(--mo-ease)}

.focus .card>.cdetail.reveal>.depth{transition-delay:.15s}
.focus .card>.cdetail.reveal>.bd-manage{transition-delay:.22s}

/* --- SECTOR / MARKET panels (lighter — the axis extends outward) --- */
.lvhd{margin-bottom:16px}
.lvhd h1{margin:6px 0 3px;font-size:var(--f-xl);font-weight:800}
.lvhd p{margin:0;max-width:64ch}
.secblock{margin-top:18px}
.secblock>.lbl{margin-bottom:9px}
.holdrow{display:flex;flex-wrap:wrap;gap:8px}
.holdchip{font-family:var(--mono);display:inline-flex;gap:6px;align-items:baseline}
.msgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(184px,1fr));gap:12px;max-width:840px}
.msector{border:1px solid var(--line);background:var(--panel);border-radius:10px;padding:13px;
  text-align:left;display:flex;flex-direction:column;gap:9px;transition:border-color var(--mo-quick) var(--mo-ease)}
.msector.you{border-color:var(--accent-2);background:linear-gradient(180deg,var(--accent-wash),transparent 80%)}  /* passive 'your sector' highlight — no pointer/jump */
.msrow{display:flex;align-items:center;gap:8px}
.msrow b{font-size:var(--f-md)}
.msbar{height:6px;background:var(--line-soft);border-radius:4px;overflow:hidden}
.msbar i{display:block;height:100%;background:var(--accent);border-radius:4px}
.msector.you .msbar i{background:var(--caution)}
.mssub{display:flex;justify-content:space-between;align-items:baseline}

/* ---- DATA LENS (the zoom-out research surface: chart · vol scan · providers) ---- */
.dlens{display:grid;grid-template-columns:1.5fr 1fr;gap:18px;margin-top:18px}
.dlcol{display:flex;flex-direction:column;gap:16px;min-width:0}
.dpanel{border:1px solid var(--line-soft);border-radius:10px;background:var(--panel-2);padding:13px 15px}
.dpanel .lenshd{margin-bottom:10px}
.mdchart{width:100%;height:154px;display:block;border:1px solid var(--line-soft);border-radius:8px;background:var(--panel)}
.mdmeta{display:flex;gap:16px;margin-top:9px;font-size:var(--f-xs);color:var(--dim)}
.mdmeta b{font-family:var(--mono);color:var(--text)}
.vshd,.vsrow{display:grid;grid-template-columns:52px 1fr 46px 52px 74px;align-items:center;gap:10px}
.vshd{font-size:var(--f-xs);letter-spacing:.05em;text-transform:uppercase;color:var(--faint);font-weight:700;padding:0 8px 6px}
.vshd span:not(:nth-child(2)){text-align:right}
.volscan{display:flex;flex-direction:column;gap:1px}
.vsrow{padding:7px 8px;border-radius:6px;cursor:pointer;font-size:var(--f-sm);border:1px solid transparent;text-align:left;
  transition:background var(--mo-quick) var(--mo-ease),border-color var(--mo-quick) var(--mo-ease)}
.vsrow:hover{background:var(--row-hover);border-color:var(--line-soft)}
.vsrow.you{background:var(--accent-wash)}
.vsrow .vsym{font-family:var(--mono);font-weight:800;color:var(--text)}
.vsrow .vsym .uheld{color:var(--accent-2);font-size:var(--f-2xs);font-weight:700}
.vsrow .vscat{color:var(--caution);font-size:var(--f-xs)}
.vsrow .vncat{color:var(--caution);font-size:var(--f-xs);opacity:.85}
.vsrow .vname{color:var(--dim);font-size:var(--f-xs);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vsrow .vv{font-family:var(--mono);text-align:right;color:var(--dim);font-size:var(--f-xs)}
.vsrow .vscell{text-align:right}
.vsrow .vsig{font-size:var(--f-xs);font-weight:700;letter-spacing:.03em}
.vsig.rich{color:var(--profit)} .vsig.fair{color:var(--faint)} .vsig.cheap{color:var(--loss)}
.vsrow .vsgo{display:none;color:var(--accent);font-size:var(--f-xs);font-weight:700}
.vsrow:hover .vsig{display:none} .vsrow:hover .vsgo{display:inline}
.provider{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.pvchip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:var(--panel);border-radius:6px;padding:4px 11px;font-size:var(--f-xs);color:var(--dim)}
.pvchip .pvdot{width:7px;height:7px;border-radius:50%;background:var(--profit)}
.pvchip .pvdot.warn{background:var(--caution)}

/* zoom-in enter animation for panel/plain transitions */
/* ONE shared motion vocabulary: the zoom-out panels (book↔sector↔market) BREATHE the same
   way the bloom FLIP does (var(--mo-dur)/var(--mo-ease)) — a scaled breath, not a flat fade —
   and their contents ASSEMBLE with a short stagger so it reads as a morph, not a page load. */
.zoomin{animation:zoomin var(--mo-dur) var(--mo-ease)}
@keyframes zoomin{from{opacity:0;transform:scale(.965) translateY(8px)}to{opacity:1;transform:none}}
@keyframes riseIn{from{opacity:0;transform:translateY(12px) scale(.99)}to{opacity:1;transform:none}}
.zoomin .lvhd,.zoomin .kgrid,.zoomin .secblock,.zoomin .holdchip,.zoomin .msector,.zoomin .callout{
  animation:riseIn var(--mo-dur) var(--mo-ease) backwards}
.zoomin .msector:nth-child(2),.zoomin .holdchip:nth-child(2){animation-delay:.03s}
.zoomin .msector:nth-child(3),.zoomin .holdchip:nth-child(3){animation-delay:.06s}
.zoomin .msector:nth-child(4),.zoomin .holdchip:nth-child(4){animation-delay:.09s}
.zoomin .msector:nth-child(5),.zoomin .holdchip:nth-child(5){animation-delay:.12s}
.zoomin .msector:nth-child(6),.zoomin .holdchip:nth-child(6){animation-delay:.15s}
.zoomin .secblock{animation-delay:.08s}
/* Decide entry: everything EXCEPT the payoff settles in around the morphing candidate chart */
@keyframes decSettle{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:none}}
.decwrap.morphin .dectop,.decwrap.morphin .dcleft,.decwrap.morphin .dcright,
.decwrap.morphin .dccenter .paytitle,.decwrap.morphin .dccenter .numrow,.decwrap.morphin .dccenter .scenbox{
  animation:decSettle var(--mo-dur) var(--mo-ease) backwards}
.decwrap.morphin .dcright{animation-delay:.04s}

/* payoff SVG typography: numeric axes stay tabular; semantic annotations get enough weight and a
   quiet surface halo so they remain crisp over the probability and payoff fills. */
.pfax{fill:var(--faint);font-family:var(--mono);font-size:var(--f-2xs);font-weight:650}
.pflab{fill:var(--dim);font-family:var(--sans);font-size:var(--f-2xs);font-weight:700;letter-spacing:.01em}
.pfpx{fill:var(--dim);font-family:var(--mono);font-size:var(--f-2xs);font-weight:650}
.pfpct{fill:var(--faint);font-family:var(--sans);font-size:var(--f-2xs);font-weight:550;letter-spacing:.02em}
.pfplat{font-family:var(--mono);font-size:var(--f-2xs);font-weight:750}
.pfp{fill:var(--profit)} .pfl{fill:var(--loss)}
.pfbe{fill:var(--caution);font-family:var(--mono);font-size:var(--f-2xs);font-weight:750}
.pfscen{transition:r var(--mo-quick) var(--mo-ease)}
.pfmk{fill:var(--dim);font-family:var(--mono);font-size:var(--f-2xs);font-weight:650}
.pfxp{font-family:var(--mono);font-size:var(--f-2xs);font-weight:750}
.pfplat,.pfbe,.pfmk,.pfxp,.pflab,.pfpin,.pfpop{paint-order:stroke fill;stroke:var(--panel-2);stroke-width:3px;stroke-linejoin:round}
.pfpin{font-family:var(--sans);font-size:var(--f-2xs);font-weight:800;letter-spacing:.01em}
.pfpop{fill:var(--accent);font-family:var(--sans);font-size:var(--f-2xs);font-weight:750;letter-spacing:.01em}
.pfstrike{font-family:var(--sans);font-size:10.5px;font-weight:800;pointer-events:none}

/* ============================================================
   BLOOM COMPOSITION — inner content of .cdetail (ported grammar).
   A·decision band  B·payoff+scenarios  C·depth lenses  D·rail.
   Only NEW structural CSS lives here; colors/type/atoms = app.css.
   ============================================================ */

/* A — DECISION BAND (the spine) */
.decband{display:flex;flex-direction:column;gap:8px;
  padding:10px 16px;margin-bottom:10px;border:1px solid var(--line-soft);border-left:3px solid var(--accent-2);
  border-radius:10px;background:var(--panel-2)}
.decrow{display:grid;grid-template-columns:minmax(150px,auto) 1fr;gap:18px;align-items:center}
.decband.tone-warn{border-left-color:var(--caution);background:linear-gradient(100deg,var(--caution-wash),transparent 55%)}
.decband.tone-bad{border-left-color:var(--loss);background:linear-gradient(100deg,var(--loss-wash),transparent 55%)}
.decband.tone-ok{border-left-color:var(--profit);background:linear-gradient(100deg,var(--profit-wash),transparent 55%)}
/* the now→at-expiry P/L bridge: reconciles today's mark with the at-expiry-if-it-holds value */
.decbridge{border-top:1px solid var(--line-soft);padding-top:9px;font-size:var(--f-xs);color:var(--dim);line-height:1.5}
.decbridge .nowv{font-family:var(--mono);color:var(--dim)}
.decbridge .arrow{color:var(--faint);padding:0 4px}
.decbridge .expv{font-family:var(--mono);font-weight:700}
.decbridge .expv.pos{color:var(--profit)} .decbridge .expv.neg{color:var(--loss)}
.decbridge .brq{color:var(--faint)}
.decpl{display:flex;flex-direction:column;gap:3px;padding-right:16px;border-right:1px solid var(--line-soft)}
.decplv{font-family:var(--mono);font-weight:800;font-size:calc(var(--f-xl)*1.4);letter-spacing:-.6px;line-height:1}
.decsub{font-size:var(--f-xs);color:var(--faint);display:flex;flex-wrap:wrap;gap:8px;align-items:baseline}
.decmain{display:flex;flex-direction:column;gap:8px;min-width:0}
.deceyebrow{display:flex;align-items:center;gap:9px}
.decread{font-size:var(--f-md);line-height:1.5;color:var(--text)}
.decread b,.verdict b{font-weight:700;color:var(--text)}
.decacts{display:flex;flex-wrap:wrap;gap:8px;margin-top:2px}
.verdict{display:flex;align-items:flex-start;gap:10px;font-size:var(--f-md);line-height:1.5;color:var(--text)}
.verdict .vdot{width:8px;height:8px;border-radius:50%;background:var(--profit);margin-top:6px;flex:none;box-shadow:0 0 0 4px var(--profit-wash)}

/* B — numbers row under the payoff (reuses .kgrid.boxed/.k) */
.numrow .v{font-size:var(--f-sm)}

/* B — MARKET SCENARIOS (ported from plan-desk market-scenarios) */
.scenbox{border:1px solid var(--line-soft);border-radius:9px;background:var(--panel-2);
  padding:10px 12px;height:100%;display:flex;flex-direction:column;container:scenarios / inline-size}
.scenbox .paytitle{margin-bottom:4px}
.smx.barmode{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px;margin:5px 0}
/* Terminal tile: full scenario name + move, then probability and P/L on their own readable lines.
   The selected tile remains in place while one shared control ribbon opens beneath the spectrum. */
.srow{position:relative;display:grid;grid-template-columns:minmax(0,1fr) auto;grid-template-areas:"name name" "odds odds" "pl value";
  align-items:center;column-gap:9px;row-gap:6px;min-height:76px;padding:8px 9px;border:1px solid transparent;border-radius:7px;
  min-width:0;overflow:hidden;background:transparent;color:inherit;text-align:left;cursor:pointer;font-size:var(--f-sm);transition:background var(--mo-quick) var(--mo-ease),border-color var(--mo-quick) var(--mo-ease),transform var(--mo-quick) var(--mo-ease)}
.srow:hover,.srow.hot{background:#101821}
.srow:hover{border-color:var(--line);transform:translateY(-1px)}
.srow .sn{grid-area:name;display:flex;align-items:center;gap:6px;min-width:0}
.srow .sn .snm{color:var(--text);font-weight:650;white-space:normal;line-height:1.2;min-width:0}
.srow .sn .snshort{display:none}
.srow .sn .smv{font-family:var(--mono);font-size:var(--f-xs);line-height:1;flex:none}
.srow .sn .sprob{display:none;font-family:var(--mono);font-size:var(--f-2xs);color:var(--dim);line-height:1;flex:none}
.srow .sn .cg{width:24px;height:13px;flex:none;opacity:.6;margin-left:auto}
.srow .sdesc{display:none;grid-area:desc;color:var(--faint);font-size:var(--f-xs);line-height:1.3}
.srow .smv.up{color:var(--profit)} .srow .smv.dn{color:var(--loss)} .srow .smv.fl{color:var(--faint)}
.srow .slk{grid-area:odds;display:flex;align-items:center;gap:6px;min-width:0}
.srow .slk-b{flex:1;height:4px;background:#18212e;border-radius:2px;overflow:hidden}
.srow .slk-b i{display:block;height:100%;background:var(--accent-2);border-radius:2px}
.srow .slk-n{font-family:var(--mono);font-size:var(--f-2xs);color:var(--dim);width:auto;min-width:34px;max-width:44px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:clip;flex:none;line-height:1}
.srow .sbw{grid-area:pl;position:relative;height:12px;background:#0d131c;border-radius:3px;border:1px solid var(--line-soft)}
.srow .sbw::before{content:"";position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--faint)}
.srow .sb{position:absolute;top:1px;bottom:1px;border-radius:2px}
.srow .sb.p{left:50%;background:var(--profit)} .srow .sb.n{right:50%;background:var(--loss)}
.srow .sv{grid-area:value;text-align:right;font-family:var(--mono);font-weight:650;min-width:62px}
.srow .splay{position:absolute;right:5px;top:5px;opacity:0;color:var(--faint);font-size:var(--f-2xs);text-align:center;transition:opacity var(--mo-quick) var(--mo-ease)}
.srow:hover .splay,.srow.pinned .splay,.srow.live .splay{opacity:1}
.srow.pinned .splay,.srow.live .splay{color:var(--accent)}
.srow.best{background:rgba(65,200,146,.09)} .srow.best .snm{color:var(--profit)}
.srow.worst{background:rgba(243,93,100,.09)} .srow.worst .snm{color:var(--loss)}
.srow.likely{border-color:rgba(70,213,181,.45);box-shadow:inset 2px 0 0 var(--accent)}
.srow.live{background:var(--accent-wash);box-shadow:inset 2px 0 0 var(--accent)} .srow.live .snm{color:var(--accent)}
/* selected tile marks the cause; the shared ribbon below owns playback + assumptions */
.srow.pinned{background:var(--accent-wash);border-color:var(--accent-2);box-shadow:inset 2px 0 0 var(--accent)}
.srow.pinned .snm{color:var(--accent)}
.srow-ctl{grid-column:1/-1;display:flex;flex-direction:column;gap:7px;padding:9px 10px;border:1px solid var(--line-soft);border-left:2px solid var(--accent);border-radius:7px;background:#0d131c;cursor:default;
  transition:border-color var(--mo-quick) var(--mo-ease),background var(--mo-quick) var(--mo-ease)}
.srx-read{font-size:var(--f-2xs);color:var(--dim);line-height:1.35;text-align:center}
.srx-read b{color:var(--text)} .srx-read b.pos{color:var(--profit)} .srx-read b.neg{color:var(--loss)}
.smstps{display:flex;justify-content:center;flex-wrap:wrap;gap:8px}
.smstps .mstp{border-radius:5px}
.smstps .mstp .ml{padding:0 6px}
.smstps .mstp button{width:20px;height:22px}
.smstps .mstp .mv{min-width:44px;font-size:var(--f-xs);padding:0 3px}
.smstps .mstp .mv.pos{color:var(--profit)} .smstps .mstp .mv.neg{color:var(--loss)} .smstps .mstp .mv.warn{color:var(--caution)}
.smstps .tunit{display:inline-flex;border-left:1px solid var(--line-soft)}
.smstps .tunit button{border:0;border-left:1px solid var(--line-soft);background:#0e141d;color:var(--dim);font-family:var(--mono);font-size:var(--f-2xs);width:18px;height:22px;cursor:pointer;text-transform:uppercase}
.smstps .tunit button:first-child{border-left:0}
.smstps .tunit button.on{background:var(--accent-2);color:var(--text)}
.srow-ctl .scenplay{padding:4px 8px}
/* greek values while a scenario animates + the projected hero P/L (glow keeps semantic colors) */
.mgv.breath,.expv.proj-live{text-shadow:0 0 9px rgba(57,199,212,.35)}
.scensum{display:flex;align-items:baseline;flex-wrap:wrap;gap:9px 18px;padding:7px 2px 1px;margin-top:auto;
  border-top:1px solid var(--line-soft);font-size:var(--f-sm)}
.scensum .e .lbl{margin-bottom:1px} .scensum .e .v{font-family:var(--mono);font-weight:600}
.scensum .e{display:flex;align-items:baseline;gap:7px}.scensum .range{margin-left:auto}
.scensum .sumshort{display:none}
.probleg{padding:8px 2px 0;font-size:var(--f-xs);color:var(--faint);line-height:1.4}
.bloomgap{margin:6px 0 9px;padding:6px 10px;border:1px solid var(--line-soft);border-left:2px solid var(--loss);border-radius:7px;background:var(--panel-2);
  font-size:var(--f-xs);line-height:1.45;color:var(--dim)}
.bloomgap .lbl{color:var(--loss);font-weight:700;text-transform:uppercase;letter-spacing:.04em;font-size:var(--f-xs);margin-right:4px}
.bloomgap b{color:var(--text)} .bloomgap b.neg{color:var(--loss)} .bloomgap b.pos{color:var(--profit)}
.bloomgap .bgev{color:var(--caution);font-weight:700}
.probleg span{color:var(--accent-2);font-style:italic}

/* C — DEPTH BAND (three quiet lenses) — deliberately RECESSIVE: it must read as
   secondary to the payoff+decision hero, so type is smaller and titles are muted. */
.depth{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:11px}
.depth .lens{padding:9px 12px;background:var(--panel-2);gap:8px}
.depth .lenshd .eyebrow{color:var(--faint)}          /* recede lens titles from accent */
.depth .lenshd .hint{font-size:var(--f-xs)}
.mechlens .greeks.dense{margin-top:2px}
.ivrow{display:flex;align-items:center;gap:8px;margin:3px 0 1px}
.depth .lpx{font-size:var(--f-md)}
.depth .lenswhy .wtext{font-size:var(--f-xs);color:var(--dim);line-height:1.45}
.depth .lensnews{font-size:var(--f-sm);padding-top:8px}
.mechrow{margin-top:9px}
.mechrow .kv{padding:3px 0;font-size:var(--f-xs)}
.beg-help{display:block;font-size:var(--f-xs);color:var(--faint);line-height:1.5;margin-top:2px}
.beg-help b{color:var(--dim)}
/* level lens on depth: Beginner gets the plain gloss ONLY; the raw greeks + edge/yield/
   assign figures are Expert-only. Nothing conceptual is lost — the gloss carries the facts. */
.mechnums{display:none}
/* mechanics + book-help are IDENTICAL for both levels (one graphic, all numbers present) so
   toggling Beginner/Expert never reflows the flex hero — that was the abrupt graph resize. */
.booktext{font-size:var(--f-xs);color:var(--dim);line-height:1.5}
.booktext b{color:var(--text)}
.bookbar{height:6px;border-radius:4px;background:var(--line-soft);overflow:hidden;margin:9px 0 5px}
.bookbar.big{height:9px}
.bookbar i{display:block;height:100%;background:var(--caution);border-radius:4px}
/* research: relative-strength mini bars (stock vs sector vs market) */
.lblrow{margin:9px 0 4px}
.relgrid{display:flex;flex-direction:column;gap:4px}
.relrow{display:grid;grid-template-columns:52px 1fr 46px;align-items:center;gap:8px;font-size:var(--f-xs)}
.relrow .rell{color:var(--dim);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.relrow .relbar{height:6px;background:#18212e;border-radius:3px;overflow:hidden}
.relrow .relbar i{display:block;height:100%;border-radius:3px}
.relrow .relbar i.pos{background:var(--profit)} .relrow .relbar i.neg{background:var(--loss)}
.relrow .relv{font-family:var(--mono);font-weight:700;text-align:right}
.relrow .relv.pos{color:var(--profit)} .relrow .relv.neg{color:var(--loss)}
/* book context compact */
.bkmeta{font-size:var(--f-xs);color:var(--dim);line-height:1.4}
.bkmeta b{color:var(--text)} .bkmeta b.warn{color:var(--caution)}
.corrrow{display:flex;align-items:center;gap:6px;margin-top:9px;flex-wrap:wrap}
.corrrow .lbl{margin:0}
.corrchip{font-family:var(--mono);font-size:var(--f-sm);font-weight:700;color:var(--dim);border:1px solid var(--line);border-radius:5px;padding:1px 6px}

/* The signed-off wide bloom keeps payoff and the complete scenario spectrum full width. At tall
   desktop sizes, recover the small remaining vertical overrun inside the already-wide decision and
   depth bands instead of adding a nested scrollbar or narrowing the scenario descriptions. Shorter
   viewports retain the natural stack and its internal scroll fallback. */
@media (min-width:1900px) and (min-height:1180px){
  .focus .card>.cdetail{padding-top:10px;padding-bottom:10px}
  .focus .card .decmain{display:grid;grid-template-columns:minmax(0,1fr) auto;
    grid-template-areas:"eye acts" "read acts";column-gap:16px;row-gap:4px;align-items:center}
  .focus .card .deceyebrow{grid-area:eye}
  .focus .card .decread{grid-area:read;line-height:1.35}
  .focus .card .decacts{grid-area:acts;margin-top:0;align-self:center}
  .focus .card .decband{gap:6px;padding-top:8px;padding-bottom:8px;margin-bottom:7px}
  .focus .card .decbridge{padding-top:6px;line-height:1.35}
  .focus .card>.cdetail>.bd-cols{gap:8px;margin-top:5px}
  .focus .card .bd-hero .paywrap{height:238px}
  .focus .card .srow-ctl{display:grid;
    grid-template-columns:minmax(0,1fr) minmax(500px,1.2fr) auto;
    grid-template-areas:"read play steps";align-items:center;gap:12px;padding:6px 8px}
  .focus .card .srow-ctl>.srx-read{grid-area:read;text-align:left}
  .focus .card .srow-ctl>.scenplay{grid-area:play}
  .focus .card .srow-ctl>.smstps{grid-area:steps;flex-wrap:nowrap}
  .focus .card .depth{margin-top:8px;gap:10px}
  .focus .card .depth .lens{padding:8px 10px;gap:7px}
  .focus .card .depth>.mechlens{display:grid;

.fanname{min-width:0;display:flex;flex-direction:column;justify-content:center}.fanname .fsub{display:none;margin-top:2px;color:var(--faint);font-size:var(--f-2xs);line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.fanmain .rchip{font-size:var(--f-2xs);font-weight:700;text-transform:uppercase;letter-spacing:.03em;border:1px solid;border-radius:4px;padding:0 5px;justify-self:start}

.scoutidlefield{grid-template-columns:1fr}.scoutidlecard{background:linear-gradient(145deg,var(--panel-2),var(--accent-wash))}
.opportunityprompt .scoutprimary{flex:none;min-width:170px;min-height:34px;font-weight:800}
.authmarketrow span small{display:inline-block;margin-right:6px;padding:1px 4px;border:1px solid var(--line-soft);border-radius:4px;color:var(--accent);font-size:9px}

/* Sparse books do not reserve empty roster/risk columns. A one-position Book carries lifecycle
   and Greeks in its compact roster cell; the aggregate future and live market keep the top row. */
.homeonesummary{display:flex;flex-direction:column;gap:7px;padding-top:4px;border-top:1px solid var(--line-soft)}
.homeonesummary .authlifecycle{padding:6px 7px;gap:3px 6px}
.homeonesummary .authlifecycle b{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.homeonesummary .authlifecycle p{-webkit-line-clamp:2}
.homeonesummary .authlifefacts{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:3px 7px}
.homeonesummary .authlifefacts span{min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.homeonegreeks{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:4px}
.homeonegreeks span{padding:5px;border:1px solid var(--line-soft);border-radius:6px;color:var(--faint);font-size:var(--f-2xs)}
.homeonegreeks b{display:block;color:var(--text);font:700 var(--f-xs) var(--mono)}
.homeoneshares{display:flex;flex-direction:column;gap:3px;padding-top:4px;border-top:1px solid var(--line-soft);min-height:0}
.homeoneshares .lenshd{margin:0}
.homeoneshares .authlist{gap:3px;overflow:visible}
.homeoneshares .authsharerow{padding:3px 5px;gap:5px;font-size:var(--f-2xs)}
.homeoneshares .authsharerow .authrowmain{gap:0}
.homeoneshares .authsharerow .btn{padding:2px 5px}
.lv-book[data-position-count="1"] #bookrisk{display:none}
@media(min-width:1200px){
  .lv-book[data-position-count="1"] .book{overflow:hidden;grid-template-rows:auto auto 1fr;grid-auto-rows:auto}
}

/* Opening recency stays a badge, not a unique cyan frame around one entire surface. A position
   with no siblings also has no empty sibling rail. */
.card.authoritative.justopened{border-color:var(--line);box-shadow:var(--raise-sheen)}
.lv-position .recede:empty{display:none}

/* Home's orientation band and its cells use the same surface grammar at every density. */
.homesummary{border-bottom:1px solid var(--line-soft);background:linear-gradient(180deg,var(--panel),var(--ground))}
.homesummary .perfband,.homesummary .bookline{background:transparent}
/* Short desktop viewports: the two-row board keeps its floors and the page scrolls instead of clipping. */
@media(min-width:1500px) and (max-height:899px){
  .lv-book .board,.lv-book[data-book-authority="empty"] .board{overflow-y:auto}
}
@media(max-width:1199px){
  .scoutactivegrid{grid-template-columns:1fr}
  .scoutresultcard{min-height:250px}
}

@media(max-width:1000px){
  #app:has(>.decstage.on.composeonly) #stage{display:flex}
  .composepanel{top:6px;right:6px;bottom:6px;width:calc(100vw - 12px);max-height:none}
  .composepanel .decwrap{position:absolute;inset:0;height:100%;max-height:none}
  .composepanel .dectop{padding:7px}.composebody{padding:8px}
  .composebody{flex:1;overflow:hidden}.composebody>.ideacomposer{flex:1;overflow:hidden}.composebody .ideacomposer .objrow{flex:1;overflow-y:auto}
  .strategycoverage{grid-template-columns:minmax(0,1fr) auto}.strategycoverage>em{grid-column:1/-1;white-space:normal}
  .scoutactivegrid{grid-template-columns:1fr}.scoutresultcard{min-height:240px}
  .opportunityprompt{align-items:stretch;flex-direction:column}.opportunityprompt .scoutprimary{width:100%}
  .packagebookhead{display:none}.packagebookrow{grid-template-columns:auto 45px minmax(78px,1fr) auto;grid-template-areas:
    "side strike expiry entry" "book book receipt receipt"}
  .packagebookrow>span:first-child{grid-area:side}.packagebookrow>strong{grid-area:strike}.packagebookrow>span:nth-child(3){grid-area:expiry}
  .packagebookrow>span:nth-child(4){grid-area:book}.packagebookrow>em{grid-area:entry}.packagebookrow>small{grid-area:receipt;text-align:right}
}
@media(max-width:600px){
  .composepanel{top:0;right:0;bottom:0;width:100vw;border-radius:0;border-inline:0}
  .composebody .ideacomposer .objrow{overflow-y:auto}.composereceipt{align-items:flex-start;flex-direction:column;gap:2px}
  .opportunitycontrol.goals{max-width:100%;overflow-x:auto;scrollbar-width:none}
  .opportunityrow{grid-template-columns:42px minmax(0,1fr) auto;grid-template-areas:"symbol detail action" "value detail action"}.opportunityrow>strong{grid-area:symbol}.opportunityrow>span{grid-area:detail}.opportunityrow>em{grid-area:value}.opportunityrow>.opportunitygo{grid-area:action;align-self:stretch}
  .homeonegreeks{grid-template-columns:1fr 1fr}
}
@media(max-width:900px){
  /* Mobile has one page scroller: Scout participates in the page instead of becoming a
     clipped miniature desktop viewport with a second scrollbar inside its result list. */
  .lv-book #riskMain:has(.homescoutpanel){display:block;height:auto;min-height:auto;overflow:visible}
  .homescoutpanel,
  .homescoutpanel #authHomeOpportunity,
  .homescoutpanel .opportunitylens,
  .homescoutpanel .scoutactivegrid,
  .homescoutpanel .scoutidlefield,
  .homescoutpanel .scoutresultcard{height:auto;min-height:0;overflow:visible;flex:none}
  .homescoutpanel .scoutactivegrid{display:flex;flex-direction:column}
  .homescoutpanel .opportunityrows{height:auto;min-height:0;overflow:visible;flex:none}
}

/* Home is one permanent composition, not a launcher plus a succession of modal surfaces.
   The workbench owns both a governed field scan and one exact staged underlying. */
.homeworkbenchpanel{gap:7px}
.homeworkbenchpanel.emptyopportunitypanel{background:var(--panel);border-color:var(--line-soft)}
.homeworkbenchpanel .emptyopportunityintro{padding-bottom:3px}
.homeworkbenchpanel .emptyopportunityintro h2{font-size:clamp(18px,1.08vw,23px)}
.homeworkbenchpanel .opportunitylens{margin-top:2px;padding-top:6px}
.homeworkbenchpanel .opportunitycontrols{gap:5px 7px;margin-bottom:5px}
.homeworkbenchpanel .opportunitycontrol{border-color:var(--line);background:var(--panel-2)}
.homeworkbenchpanel .opportunitycontrol .oseg button{min-height:27px;padding:3px 7px}
.homeworkbenchpanel .scoutidlecard{padding:8px;gap:6px}
.homeworkbenchpanel .scoutidlecard,.homeworkbenchpanel .scoutresultcard{background:var(--panel-2)}
.homeworkbenchpanel .scoutgoalread{padding:6px 7px}
.homecatalogline{padding:6px 8px;border-left:2px solid var(--line);color:var(--faint);font-size:var(--f-2xs);line-height:1.4}
.homecatalogline.warn{border-left-color:var(--loss)}
.homeideasearch{display:grid;grid-template-columns:auto minmax(0,1fr);align-items:center;gap:8px;padding:6px 8px;border:1px solid var(--line-soft);border-radius:7px;background:var(--panel)}
.homeideasearch>span{color:var(--faint);font-size:var(--f-2xs);font-weight:750;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.homeideasearch input,.homeacquirefields input{min-width:0;width:100%;height:30px;border:1px solid var(--line);border-radius:6px;background:var(--panel-2);color:var(--text);padding:4px 7px;font:650 var(--f-xs) var(--sans);outline:none}
.homeideasearch input:focus,.homeacquirefields input:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-wash)}
.homeideamatchhost{min-height:28px}
.homeideahelp{padding:5px 7px;color:var(--faint);font-size:var(--f-2xs);line-height:1.35}
.homeideachosen{display:flex;align-items:center;gap:8px;padding:5px 7px;border-left:2px solid var(--accent);background:var(--accent-wash);color:var(--dim);font-size:var(--f-2xs)}
.homeideachosen span{flex:1}.homeideachosen b{color:var(--text);font-family:var(--mono)}.homeideachosen button{border:0;background:transparent;color:var(--accent);cursor:pointer}
.homeideamatches{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:4px;margin-top:4px}
.homeideamatch{display:grid;grid-template-columns:auto minmax(0,1fr) auto;align-items:center;gap:6px;min-width:0;padding:5px 7px;border:1px solid var(--line-soft);border-radius:6px;background:var(--panel);color:var(--dim);cursor:pointer;text-align:left}
.homeideamatch:hover,.homeideamatch:focus-visible,.homeideamatch.on{border-color:var(--accent-2);background:var(--row-hover);outline:none}
.homeideamatch b{color:var(--text);font:750 var(--f-xs) var(--mono)}.homeideamatch span{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:var(--f-2xs);color:var(--faint)}.homeideamatch em{font-style:normal;color:var(--accent);font-size:var(--f-2xs)}
.homeideamatch.homesectormatch b{font-family:var(--sans)}.homeideamatch.homesectormatch{border-style:dashed}
.homeacquirefields{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.homeacquirefields label{display:grid;grid-template-columns:auto minmax(0,1fr);align-items:center;gap:7px;padding:5px 7px;border:1px solid var(--accent-2);border-radius:7px;background:var(--accent-wash)}
.homeacquirefields span{color:var(--dim);font-size:var(--f-2xs);white-space:nowrap}
.homesectorchips{display:flex;align-items:center;gap:4px;min-width:0;flex:1 1 auto;overflow-x:auto;scrollbar-width:none;padding:1px 0}
.homesectorchips::-webkit-scrollbar{display:none}
.homesectorchips button{flex:none;min-height:22px;padding:2px 9px;border:1px solid var(--line-soft);border-radius:999px;background:var(--panel-2);color:var(--dim);font-size:var(--f-2xs);font-weight:650;white-space:nowrap;cursor:pointer}
.homesectorchips button:hover{background:var(--row-hover);color:var(--text)}
.homesectorchips button.on{border-color:var(--accent-2);background:var(--accent-wash);color:var(--accent)}
.homeworkbenchactions{display:flex;align-items:center;gap:8px}
.homeworkbenchactions .btn{min-width:150px}.homeworkbenchactions>span{min-width:0;color:var(--faint);font-size:var(--f-2xs);line-height:1.35}
.homeworkbenchpanel .scoutactivegrid>.scoutidlefield{display:block;min-width:0;margin-top:0}
@media(max-width:1499px){
.homeworkbenchpanel:not(.emptyopportunitypanel) .scoutactivegrid{display:flex;flex-direction:column;gap:8px}
.homeworkbenchpanel:not(.emptyopportunitypanel) .scoutactivegrid>.scoutidlefield{flex:0 0 auto;min-height:auto}
.homeworkbenchpanel:not(.emptyopportunitypanel) .scoutresultcard{flex:1 1 140px;min-height:140px;overflow:hidden}
}
.homeworkbenchpanel .scoutactivegrid>.scoutidlefield{align-content:start}
.homeworkbenchpanel .scoutresultcard .opportunityrows{flex:1 1 auto;min-height:60px;overflow-y:auto;overscroll-behavior:contain;scroll-snap-type:y proximity}
.homeworkbenchpanel .scoutresultcard .opportunityrows>.opportunityrow{scroll-snap-align:start}
.homeworkbenchpanel .scoutactivegrid>.scoutidlefield>.scoutidlecard{height:auto;min-height:100%}
.homeworkbenchpanel .scoutstartgrid{flex:1;min-height:0}
.compactbookfutures .bookonefacts .authmetric{padding:4px 6px}
.compactbookfutures .bookonefacts .authmetric{gap:0}
.compactbookfutures .bookonefacts .authmetric span{font-size:9px;line-height:1.1}
.compactbookfutures .bookonefacts .authmetric b{font-size:11px;line-height:1.1}
.compactbookfutures .bookfanrow{grid-template-columns:auto minmax(0,1fr) auto;padding:2px 6px}
.compactbookfutures>.lenshd{min-width:0;flex-wrap:nowrap;overflow:hidden}
.compactbookfutures>.lenshd .eyebrow{flex:none;white-space:nowrap}
.compactbookfutures>.lenshd .hint{min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.compactbookfutures .bookfanrow span{display:none}
.compactbookfutures .bookfanrow em{white-space:nowrap}
.compactbookfutures .bookfanrow em small{display:inline;margin-left:4px}

@media(min-width:1500px){
  /* Market first (persistent sector lens + chart|chain + watch + news), the work row below it.
     ONE populated grid and ONE empty grid — variants multiplied styling without earning it. */
  .lv-book .board,
  .lv-book[data-position-count="1"] .board,
  .lv-book[data-position-count="1"][data-plan-count="0"] .board,
  .lv-book[data-book-authority="empty"] .board{grid-template-columns:repeat(12,minmax(0,1fr));grid-template-rows:minmax(320px,4fr) minmax(440px,6fr);
    grid-template-areas:
      "chain chain chain chain chain chain chain chain sector sector news news"
      "map map map map map bookrisk bookrisk bookrisk roster roster univ univ";
    gap:10px;overflow:hidden}
  .lv-book[data-book-authority="empty"] .board,
  .lv-book[data-book-authority="empty"][data-position-count="1"] .board,
  .lv-book[data-book-authority="empty"][data-plan-count="0"] .board,
  .lv-book[data-book-authority="empty"][data-plan-count="0"][data-position-count="1"] .board{grid-template-areas:
      "chain chain chain chain chain chain chain chain sector sector news news"
      "map map map map map map map map univ univ univ univ"}
}
@media(min-width:1200px) and (max-width:1499px){
  .lv-book .board,
  .lv-book[data-position-count="1"] .board,
  .lv-book[data-position-count="1"][data-plan-count="0"] .board,
  .lv-book[data-book-authority="empty"] .board{grid-template-columns:repeat(12,minmax(0,1fr));grid-template-rows:minmax(320px,auto) minmax(500px,auto) minmax(210px,auto);
    grid-template-areas:
      "chain chain chain chain chain chain chain chain sector sector sector sector"
      "map map map map map bookrisk bookrisk bookrisk bookrisk roster roster roster"
      "univ univ univ univ news news news news news news news news";
    gap:9px;overflow-y:auto;overflow-x:hidden}
  .lv-book[data-book-authority="empty"] .board,
  .lv-book[data-book-authority="empty"][data-position-count="1"] .board{grid-template-areas:
      "chain chain chain chain chain chain chain chain sector sector sector sector"
      "map map map map map map map map univ univ univ univ"
      "news news news news news news news news news news news news"}
}
@media(min-width:901px) and (max-width:1199px){
  .lv-book .board,
  .lv-book[data-position-count="1"] .board{grid-template-columns:repeat(2,minmax(0,1fr));grid-template-rows:auto;grid-template-areas:
    "chain chain" "map bookrisk" "roster univ" "sector news";overflow:auto}
  .lv-book[data-book-authority="empty"] .board{grid-template-columns:repeat(2,minmax(0,1fr));grid-template-rows:auto;grid-template-areas:
    "chain chain" "map map" "univ sector" "news news";overflow:auto}
}
@media(max-width:900px){
  .lv-book .board,
  .lv-book[data-position-count="1"] .board{grid-template-areas:"map" "chain" "roster" "bookrisk" "univ" "sector" "news"}
  .lv-book[data-book-authority="empty"] .board,
  .lv-book[data-book-authority="empty"][data-position-count="1"] .board{grid-template-areas:"map" "chain" "univ" "sector" "news"}
  .lv-book #riskMain:has(.homeworkbenchpanel){display:block;height:auto;min-height:auto;overflow:visible}
  .homeworkbenchpanel,.homeworkbenchpanel #authHomeOpportunity,.homeworkbenchpanel .opportunitylens,.homeworkbenchpanel .scoutactivegrid,.homeworkbenchpanel .scoutidlefield,.homeworkbenchpanel .scoutresultcard{height:auto;min-height:0;overflow:visible;flex:none}
  .homeworkbenchpanel .scoutactivegrid{display:flex;flex-direction:column}
  .homeworkbenchpanel .opportunityrows{height:auto;min-height:0;overflow:visible;flex:none}
  .authhomenews.elegantscroll{height:auto;max-height:none;overflow:visible;overscroll-behavior:auto;scroll-snap-type:none;mask-image:none!important}
  .newsoverflowmeta,.watchoverflowmeta,.planoverflowmeta,.rowsoverflowmeta{display:none!important}
  .homeworkbenchpanel .scoutresultcard .opportunityrows{overflow:visible;scroll-snap-type:none;mask-image:none!important}
  .authmarketwatch.elegantscroll,.lv-book #univBand .authlist.elegantscroll{height:auto;max-height:none;overflow:visible;overscroll-behavior:auto;scroll-snap-type:none;mask-image:none!important}
  .homeideamatches{grid-template-columns:1fr}.homeideasearch,.homeacquirefields label{grid-template-columns:1fr}.homeworkbenchactions{align-items:stretch;flex-direction:column}.homeworkbenchactions .btn{width:100%}
}
@media(min-width:1001px){
  .authmarketpulse .pulsecols{grid-template-columns:minmax(0,1fr) minmax(360px,1.15fr)}
}
.lv-book[data-position-count="1"] #bookrisk{display:flex}
.compactbookfutures .bookfanwrap,.compactbookfutures .bookfanwrap.singleposition{grid-template-columns:minmax(0,1fr)}
.compactbookfutures .bookfanlegend{flex-direction:row;flex-wrap:wrap}
.compactbookfutures .bookfanrow{flex:1 1 150px}
.compactbookfutures .bookonefacts{flex:1 1 100%;grid-template-columns:repeat(4,minmax(0,1fr))}
.compactbookfutures .bookmapfacet{display:none}
.compactbookfutures .bookfan{min-height:105px}
.compactbookfutures .bookfanactions span{display:none}
.compactbookfutures .bookfanlegend{overflow:auto}
@media(max-width:900px){
  .compactbookfutures .bookfanlegend{height:auto;max-height:none;overflow:visible}
}

<body>
<div id="app">
  <!-- ONE top row: left controls (home · new idea · mode) · a flex middle that shows the market strip
       at book and swaps to breadcrumb+state on zoom · a right symbol⇢sector⇢learn entry. Merges the
       old .thread + .pulse rows; mode is signalled ONCE by the strip's own source tag + tint. -->
  <div class="thread" id="thread">
    <button class="brandmk" id="brandHome" title="Your book"></button>
    <div class="thctl">
      <button class="btn pri xs threadnew" id="threadNewIdea">＋ New idea</button>
      <div class="mktmode" id="mktMode"><div class="mmseg">
        <button data-mkt="observed" class="on" title="Live market — Cboe option chains + candles when wired">● Observed</button><button data-mkt="sim" title="Demo market — synthetic, deterministic per seed; safe to experiment">◈ Simulated</button>
      </div></div>
    </div>
    <span class="thsep"></span>
    <div class="thctx" id="thctx">
      <div class="crumbs" id="crumbs"></div>
      <div class="tstate" id="threadState"></div>
      <div class="mktstrip" id="mktStrip"></div>
    </div>
    <span class="fixtureflag" id="fixtureFlag" hidden title="Staged visual context; New idea uses active StrikeBench services">Visual fixture panels</span>
    <div class="cmd">
      <div class="searchbox sm">
        <button class="cmdsym" id="cmdSym" title="focused underlying — click to search another" style="display:none">◎ <b></b></button>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="cmd" placeholder="symbol · sector · or learn — XOM · financials · iron condor · theta" autocomplete="off" spellcheck="false">
      </div>
    </div>
  </div>

  <div id="stage" class="stagewrap lv-book">
    <div id="summary" class="summary"></div>
    <div id="board" class="board">
      <div id="recede" class="recede"></div>
      <div id="riskMain" class="rkpanel"></div>
      <div id="bookrisk"></div>
      <div id="chainBand"></div>
      <div id="univBand"></div>
      <div id="sectorBand"></div>
      <div id="newsBand"></div>
      <div id="book" class="book"></div>
      <div id="focus" class="focus"></div>
      <div id="bookAuthState" class="bookauthority" hidden></div>
    </div>
  </div>
  <div id="decideStage" class="decstage" aria-hidden="true"></div>
  <div id="importStage" class="decstage" aria-hidden="true"></div>
  <div id="learnStage" class="decstage" aria-hidden="true"></div>
</div>
<div class="glosspop" id="glossPop"></div>

<div class="toast" id="toast"></div>

<!-- shared canonical data (no sprawl): the 60-strategy library + teaching content, also used by learn.html -->
<script src="strategies.js?v=@asset.version@"></script>
<script src="learn-content.js?v=@asset.version@"></script>
<script src="js/api.js?v=@asset.version@"></script>
<script src="js/desk-backend.js?v=@asset.version@"></script>
<script>
"use strict";
/* ======================================================================
   OFFLINE VISUAL FIXTURE — used only by the file:// design regression. When
   served by StrikeBench, the Desk bridge replaces decision data and math with
   the canonical market, Plan, recommendation, outcome, and decision APIs.
   legs: {t:'s'|'c'|'p', k, q}  ·  s.k=entry, s.q=shares(±) · opt.q=contracts(±)
   payoff(S) = net + Σ  s: q·(S−k) · c: q·100·max(S−k,0) · p: q·100·max(k−S,0)
   ====================================================================== */
var POS=[
 {id:'amd-cs', sym:'AMD', struct:'Covered strangle', spot:493.00, em:6.2,
  pnl:-1240.50, riskPct:22, cap:58700, net:5415, delta:0.31, theta:71, vega:-1240, pop:61,
  maxLoss:38400, maxProfit:8900, attn:'Expiry week', need:true, tone:'warn',
  legs:[{t:'s',k:462.10,q:300},{t:'c',k:540,q:-3},{t:'p',k:450,q:-3}],
  legStr:'LONG 300 · SHORT 3×540C · SHORT 3×450P · exp 07-Aug',
  why:'Core semis holding — the strangle rents both tails while you keep the shares underneath.',
  news:'AMD MI400 ramp reported on track; Street nudges FY26 numbers up into the 07-Aug print.',
  plain:'You own 300 AMD and rent a call above $540 and a put below $450. You keep the rent unless AMD breaks that range by 07-Aug.'},

 {id:'nvda-ic', sym:'NVDA', struct:'Iron condor', spot:182.40, em:7.4,
  pnl:-2410.00, riskPct:5, cap:3900, net:1100, delta:-0.14, theta:62, vega:-410, pop:58,
  maxLoss:3900, maxProfit:1100, attn:'Past stop', need:true, tone:'bad',
  legs:[{t:'p',k:165,q:5},{t:'p',k:175,q:-5},{t:'c',k:190,q:-5},{t:'c',k:200,q:5}],
  legStr:'LONG 165P / SHORT 175P · SHORT 190C / LONG 200C · ×5 · exp 07-Aug',
  why:'A range bet that NVDA cools after its run — the tested call side is why this one is on watch.',
  news:'NVDA pushes toward 190 on data-center demand; your short call side is now ITM-adjacent.',
  plain:'A range bet on NVDA between $175 and $190. It pushed toward $190 and the call side is tested — this one is past your stop.'},

 {id:'avgo-pcs', sym:'AVGO', struct:'Put credit spread', spot:1685.00, em:5.8,
  pnl:-1880.00, riskPct:11, cap:24000, net:8000, delta:0.22, theta:45, vega:-360, pop:66,
  maxLoss:24000, maxProfit:8000, attn:'Earnings 04-Sep', need:false, tone:'warn',
  legs:[{t:'p',k:1600,q:-8},{t:'p',k:1560,q:8}],

/* underlying price sparkline (the lens' little chart) — deterministic wiggle per symbol */
function priceSpark(svg,p){
  if(!svg)return;
  var W=Math.max(40,Math.round(svg.clientWidth||120)), H=Math.max(18,Math.round(svg.clientHeight||30));

  var seed=0; for(var i=0;i<p.sym.length;i++) seed+=p.sym.charCodeAt(i)*(i+7);
  var n=30, a=[], v=0;
  for(var i=0;i<n;i++){ seed=(seed*9301+49297)%233280; v+=((seed/233280)-0.47)*2; a.push(v); }

  var up=a[n-1]>=a[0];
  svg.innerHTML='<path d="'+d+'" fill="none" stroke="'+(up?'var(--profit)':'var(--loss)')+'" stroke-width="1.3" stroke-linejoin="round"/>';

function adjustCand(){

function baseCand(p){   /* the CURRENT structure run through the same engine, so tray deltas compare like-for-like */
  var b={id:'base',sym:p.sym,spot:p.spot,em:p.em,exp:posExp(p),legs:p.legs.map(function(l){return {t:l.t,k:l.k,q:l.q};}),undef:null};

function openAdjust(posId,kind){
  var p=byId[posId]; if(!p)return;
  var legs=p.legs.map(function(l){return {t:l.t,k:l.k,q:l.q};});
  var exp=posExp(p);
  if(kind==='roll'){
    for(var i=0;i<legs.length;i++){ if(legs[i].t!=='s'&&legs[i].q<0){ var inc=strikeInc(p.spot); legs[i].k=legs[i].k+(legs[i].t==='c'?inc:-inc); } }
    var ei=EXP_LADDER.indexOf(exp); if(ei>=0&&ei<EXP_LADDER.length-1) exp=EXP_LADDER[ei+1];
  }
  if(kind==='add'){ legs.push({t:'p',k:rk(p.spot,0.90),q:(p.spot>600?1:3)}); }
  adjust={posId:posId,kind:kind,legs:legs,exp:exp,base:baseCand(p)};
  refreshManage(posId, kind==='roll');   // a Roll preset morphs the curve into the rolled shape
}
function closeAdjust(){ var pid=adjust&&adjust.posId; adjust=null; if(pid) refreshManage(pid, true); }   // morph back to current
function refreshManage(pid, animate){

function adjLeg(p,act,i,d){
  if(!adjust||adjust.posId!==p.id) openAdjust(p.id,'adjust');   // touching a leg starts a live adjustment
  var L=adjust.legs, l=L[i];
  if(act==='rm'){ if(l&&l.t!=='s') L.splice(i,1); }
  else if(l){
    if(act==='side') l.q=-l.q;
    else if(act==='type') l.t=(l.t==='c'?'p':'c');
    else if(act==='strike'){ var inc=strikeInc(p.spot); l.k=Math.max(inc,l.k+d*inc); }
    else if(act==='qty'){ var sgn=l.q<0?-1:1; if(l.t==='s') l.q=sgn*Math.max(100,Math.abs(l.q)+d*100); else l.q=sgn*Math.max(1,Math.abs(l.q)+d); }
  }
  refreshManage(p.id, true);   // stepper edit → morph the curve
}
function handleManage(p,kind){
  if(kind==='roll'){ openAdjust(p.id,'roll'); return; }
  if(kind==='add'||kind==='addwing'){ if(!adjust||adjust.posId!==p.id) openAdjust(p.id,'adjust');
    pushNewLeg(adjust.legs, p.spot); refreshManage(p.id, false); return; }
  if(kind==='close'){ adjust=null; closingId=p.id; refreshManage(p.id); return; }
  if(kind==='close-cancel'){ closingId=null; refreshManage(p.id); return; }
  if(kind==='close-confirm'){ closePosition(p); return; }
  if(kind==='workbench'){
    var legs=(adjust&&adjust.posId===p.id)?adjust.legs.map(function(l){return {t:l.t,k:l.k,q:l.q};}):null;
    var rect=(cardEl[p.id]||{}).getBoundingClientRect?cardEl[p.id].getBoundingClientRect():null;
    adjust=null; enterDecide('roll',p.id,'Adjust',rect);
    if(legs){ decide.mode='build'; decide.buildLegs=legs; renderDecide(); }
    return;
  }
  if(kind==='exp-prev'||kind==='exp-next'){ if(!adjust)return; var i=EXP_LADDER.indexOf(adjust.exp),n=EXP_LADDER.length; i=(i+(kind==='exp-next'?1:-1)+n)%n; adjust.exp=EXP_LADDER[i]; refreshManage(p.id, true); return; }
  if(kind==='place'){ applyAdjust(p); return; }
  if(kind==='cancel'){ closeAdjust(); return; }
}
function handleBandAction(p,action){
  var a=(action||'').toLowerCase();
  if(a.indexOf('roll')===0){ handleManage(p,'roll'); return; }
  if(a.indexOf('close')===0){ handleManage(p,'close'); return; }
  if(a.indexOf('adjust')===0){ openAdjust(p.id,'adjust'); return; }
  if(a.indexOf('add a wing')===0){ handleManage(p,'addwing'); return; }
  if(a.indexOf('add')===0){ handleManage(p,'add'); return; }
  if(a.indexOf('stress')===0){ pinScen(bloomSurf(p),0); return; }
  if(a.indexOf('let')===0||a.indexOf('hold')===0||a.indexOf('accept')===0){
    toast(action+' selected — no order is sent.');
  }
}
function applyAdjust(p){
  var c=adjustCand();
  p.legs=adjust.legs.map(function(l){return {t:l.t,k:l.k,q:l.q};});
  p.maxLoss=c.maxLoss; p.maxProfit=c.maxProfit; p.pop=c.pop; p.delta=c.delta; p.theta=c.theta; p.vega=c.vega; p.gamma=c.gamma; p.cap=c.cap; p.net=c.credit;
  p.legStr=candLegStr(c)+' · exp '+adjust.exp;
  adjust=null;
  var oldEl=cardEl[p.id];
  cardEl[p.id]=makeCard(p);
  if(oldEl&&oldEl.parentNode) oldEl.parentNode.removeChild(oldEl);   // drop the stale element so the tray doesn't linger
  layoutForLevel('position',p.id); updateThread();
  window.setTimeout(function(){ toast('Adjustment placed — '+p.sym+' '+p.struct.toLowerCase()+' updated in your book'); },80);
}
/* ONE editable leg chip, shared by the bloom (data-adjleg/data-ali) and Decide (data-leg/data-li) */
function legChip(l,i,a,idx,spot){
