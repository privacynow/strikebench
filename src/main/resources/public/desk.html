.inspectwell{flex:1;height:auto;min-height:310px;border:1px solid var(--line-soft);border-radius:9px;background:var(--panel-2);overflow:hidden}
.inspectpane{height:100%;min-height:0;padding:10px 11px;overflow:auto}
.inspectpane>.upanel{border:0;background:transparent;padding:0}
.inspectpane>.upanel:only-child{height:100%;min-height:0;display:flex;flex-direction:column}
.inspectpane .cohpanel+.tailpanel{margin-top:8px}
.inspectpane .bookimpact{height:100%;display:flex;flex-direction:column}
/* evidence & simulation */
.evgrid{display:flex;flex-direction:column;gap:6px}
.evrow{display:flex;align-items:center;gap:9px;font-size:var(--f-xs)}
.evrow .evk{color:var(--faint);width:104px;flex:none;white-space:nowrap}
.evrow .evbar{flex:1;height:6px;background:var(--line-soft);border-radius:3px;overflow:hidden}
.evrow .evbar i{display:block;height:100%;background:var(--accent);border-radius:3px}
.evrow .evv{font-family:var(--mono);font-weight:700;color:var(--text);font-size:var(--f-sm)}
.evrow .evtxt{color:var(--dim);flex:1;font-size:var(--f-sm)}
.wfhd{font-size:var(--f-xs);letter-spacing:.08em;text-transform:uppercase;color:var(--faint);font-weight:700;margin:10px 0 4px}
.wflist{display:flex;flex-direction:column;gap:5px}
.wfrow{display:grid;grid-template-columns:16px 1fr auto auto;align-items:center;gap:9px;font-size:var(--f-xs);padding:5px 6px;border-radius:5px}
.wfrow:hover{background:#101821}
.wfrow .wfic{color:var(--faint);text-align:center}
.wfrow .wfn{color:var(--text)}
.wfrow .wfp{font-family:var(--mono);color:var(--faint)}
.wfrow .wfv{font-family:var(--mono);font-weight:700;text-align:right;font-size:var(--f-sm)}
.wfrow .wfv.pos{color:var(--profit)} .wfrow .wfv.neg{color:var(--loss)}
.evsimstage{position:relative;flex:1;height:auto;min-height:205px;margin-top:9px;overflow:hidden;border:1px solid var(--line-soft);border-radius:8px;background:var(--panel)}
.ensembleidle,.ensemblerun,.ensembleresult{position:absolute;inset:0}
.ensembleidle{border:0;background:linear-gradient(105deg,var(--panel),#0d1720);color:var(--accent);cursor:pointer;overflow:hidden}
.ensembleidle:hover{background:linear-gradient(105deg,var(--accent-wash),#0d1720)}
.ensembleidle .mcmini{position:absolute;inset:21px 48px 40px 12px;width:calc(100% - 60px);height:calc(100% - 61px);opacity:.72}
.ensembleidle .mcmini path{fill:none;stroke:var(--accent-2);stroke-width:1.2;stroke-linecap:round;vector-effect:non-scaling-stroke}
.ensembleidle .mcmini path:nth-of-type(3){stroke:var(--accent);stroke-width:1.7}
.ensembleidle .mcmini .mczero{stroke:var(--line);stroke-dasharray:3 4}
.ensembleidle .mcplay{position:absolute;right:14px;top:50%;width:31px;height:31px;transform:translateY(-50%);border-radius:50%;display:grid;place-items:center;
  border:1px solid var(--accent);background:var(--ground);box-shadow:0 0 0 5px rgba(70,213,181,.08);font-size:10px}
.ensemblecap{position:absolute;left:12px;bottom:10px;font-size:var(--f-2xs);color:var(--faint);letter-spacing:.04em;text-transform:uppercase}
.ensemblerun{display:grid;place-items:center;color:var(--dim);font-size:var(--f-xs)}
.runorb{width:44px;height:44px;border-radius:50%;border:1px solid var(--line);border-top-color:var(--accent);animation:runorb .8s linear infinite;box-shadow:0 0 0 8px rgba(70,213,181,.04)}
.runmsg{position:absolute;top:calc(50% + 37px);font-family:var(--mono);font-size:var(--f-2xs);color:var(--faint)}
@keyframes runorb{to{transform:rotate(360deg)}}
.ensembleresult{padding:7px 9px 8px;display:grid;grid-template-rows:auto minmax(0,1fr) auto;gap:4px}
.ensembleresult .mchd{display:flex;align-items:center;justify-content:space-between;gap:7px}
.ensembleresult .mcfan{height:auto;min-height:120px;align-self:stretch;clip-path:inset(0 100% 0 0);animation:mcreveal .9s var(--mo-ease) forwards}
.ensembleresult .mcstats{grid-template-columns:repeat(4,minmax(0,1fr));gap:7px;margin:0}
.ensembleresult .mcs:nth-child(n+5){display:none}
.ensembleresult .mcv{font-size:var(--f-xs)}
@keyframes mcreveal{to{clip-path:inset(0 0 0 0)}}
/* coherence panel — one verdict + four honest checks + plain-English why */
.cohpanel .cohverdict{margin-left:auto;font-size:var(--f-sm);font-weight:800;padding:2px 9px;border-radius:5px;border:1px solid var(--line);letter-spacing:.01em}
.cohverdict.on{color:var(--profit);border-color:var(--profit);background:var(--profit-wash)}
.cohverdict.mid{color:var(--caution);border-color:var(--caution);background:var(--caution-wash)}
.cohverdict.off{color:var(--loss);border-color:var(--loss);background:var(--loss-wash)}
.cohpips{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin:2px 0 8px}
.cohpip{display:flex;align-items:baseline;gap:6px;font-size:var(--f-xs);font-weight:700;color:var(--dim);border:1px solid var(--line-soft);border-radius:6px;padding:5px 8px;flex-wrap:wrap}
.cohpip .cohmk{font-weight:800;flex:none}
.cohpip.on{color:var(--text)} .cohpip.on .cohmk{color:var(--profit)}
.cohpip.mid .cohmk{color:var(--caution)}
.cohpip.off .cohmk{color:var(--loss)}
.cohpip .cohnote{flex-basis:100%;font-weight:400;font-style:normal;color:var(--faint);font-size:var(--f-sm);line-height:1.3}
.cohprose{font-size:var(--f-xs);color:var(--dim);line-height:1.45;border-top:1px solid var(--line-soft);padding-top:8px}
.cohswap{border:0;background:0;color:var(--accent);font-weight:700;font-size:var(--f-xs);cursor:pointer;padding:0;text-decoration:underline;text-underline-offset:2px}
.mcfan{width:100%;height:130px;display:block}
.mcstats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px 12px;margin:6px 0 4px}
.mcs{display:flex;flex-direction:column;gap:1px}
.mcs .mck{font-size:var(--f-xs);color:var(--faint);text-transform:uppercase;letter-spacing:.3px}
.mcs .mcv{font-family:var(--mono);font-weight:800;font-size:var(--f-sm);white-space:nowrap}
.mcs .mcv.pos{color:var(--profit)} .mcs .mcv.neg{color:var(--loss)}
/* gap-risk = a downside concept → a thin loss-red left accent on a normal panel, not a loud amber tab */
.tailpanel{border-color:var(--line-soft);background:var(--panel-2);border-left:2px solid var(--loss)}
.tailpanel .lenshd{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.tailpanel .eyebrow{color:var(--loss);display:inline-flex;align-items:center}
.tailpanel .eyebrow .tdot{width:6px;height:6px;border-radius:50%;background:var(--loss);margin-right:6px;box-shadow:0 0 0 3px rgba(243,93,100,.13)}
.tailpanel .tev{font-size:var(--f-xs);color:var(--caution);font-weight:700}
.tailpanel .gapdial{margin-left:auto}
.tailmain{font-size:var(--f-sm);line-height:1.5;color:var(--dim);margin:3px 0 4px}
.tailmain b{color:var(--text)} .tailmain b.neg{color:var(--loss)} .tailmain b.pos{color:var(--profit)}
.tailmain .tmax{font-size:var(--f-xs);color:var(--loss);border:1px solid var(--loss);border-radius:4px;padding:0 4px;margin-left:1px;font-weight:700;text-transform:uppercase;letter-spacing:.03em}
.tailsub{font-size:var(--f-xs);line-height:1.4;color:var(--faint)}
.tailsub b{color:var(--text)}
.gapdial{display:inline-flex;border:1px solid var(--line);border-radius:6px;overflow:hidden}
.gapdial button{border:0;background:0;color:var(--faint);font-size:var(--f-xs);font-weight:700;padding:2px 8px;cursor:pointer;border-left:1px solid var(--line-soft)}
.gapdial button:first-child{border-left:0}
.gapdial button.on{background:var(--accent-2);color:var(--text)}
.gapdial button:not(.on):hover{color:var(--text)}
/* book impact — graphical */
.upanel .bkbar{height:9px;border-radius:5px;background:var(--line-soft);overflow:hidden;display:flex;margin:2px 0 5px}
.upanel .bkbar .bkexist{background:var(--accent-2);opacity:.55;height:100%}
.upanel .bkbar .bknew{background:var(--caution);height:100%}
.bklabels{display:flex;justify-content:space-between;font-size:var(--f-xs);color:var(--faint)}
.bklabels .bkl2{color:var(--caution);font-weight:600}
.bkcap{display:flex;align-items:baseline;gap:6px;margin-top:7px;font-size:var(--f-xs);color:var(--faint)}
.bkcap b{font-family:var(--mono);color:var(--text);font-weight:700}
.paneverdict{display:flex;align-items:flex-start;gap:9px;padding:8px 9px;border:1px solid var(--line-soft);border-radius:7px;background:var(--panel)}
.paneverdict i{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px var(--accent-wash);margin-top:5px;flex:none}
.paneverdict.warn i{background:var(--caution);box-shadow:0 0 0 4px var(--caution-wash)}
.paneverdict b{display:block;font-size:var(--f-sm);line-height:1.25}.paneverdict span{display:block;margin-top:2px;color:var(--dim);font-size:var(--f-xs);line-height:1.35}
.bookfacts{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:7px;margin-top:8px}
.bookfact2{border:1px solid var(--line-soft);border-radius:7px;background:var(--panel);padding:7px 8px;min-width:0}
.bookfact2 span{display:block;color:var(--faint);font-size:var(--f-2xs);letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bookfact2 b{display:block;margin-top:3px;font-family:var(--mono);font-size:var(--f-sm);white-space:nowrap}.bookfact2 b.neg{color:var(--loss)}.bookfact2 b.pos{color:var(--profit)}.bookfact2 b.warn{color:var(--caution)}
.bookcompare{display:grid;grid-template-columns:auto minmax(0,1fr) auto;gap:7px;align-items:center;margin-top:8px;color:var(--faint);font-size:var(--f-2xs)}
.bookcompare .track,.tailtrack{height:7px;border-radius:4px;background:var(--line-soft);overflow:hidden;position:relative}
.bookcompare .track i{display:block;height:100%;background:linear-gradient(90deg,var(--accent-2),var(--caution));border-radius:4px}
.bookgreeks{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:5px;margin-top:8px}
.bookgreeks span{border-left:2px solid var(--line);padding:3px 6px;color:var(--faint);font-size:var(--f-2xs)}
.bookgreeks b{display:block;margin-top:2px;font-family:var(--mono);font-size:var(--f-xs);color:var(--text)}
.bookcluster{display:none}
@media (min-width:1900px) and (min-height:1100px){
  .bookcluster{display:flex;flex:1;min-height:290px;flex-direction:column;margin:13px 0 10px;border:1px solid var(--line-soft);border-radius:9px;background:var(--panel);overflow:hidden}
  .bchd,.bcresult{display:flex;align-items:baseline;justify-content:space-between;gap:10px;padding:9px 11px;color:var(--faint);font-size:var(--f-xs)}
  .bchd{border-bottom:1px solid var(--line-soft);text-transform:uppercase;letter-spacing:.04em}.bchd b{color:var(--text);font-family:var(--mono)}
  .bcstage{position:relative;flex:1;min-height:220px;background:radial-gradient(circle at 56% 52%,rgba(57,199,212,.07),transparent 48%)}
  .bcstage::before,.bcstage::after{content:"";position:absolute;inset:12% 9%;border:1px solid var(--line-soft);border-radius:50%}
  .bcstage::after{inset:28% 26%;border-color:rgba(57,199,212,.16)}
  .bczone{position:absolute;left:12px;top:10px;color:var(--accent-2);font-size:var(--f-2xs);letter-spacing:.08em;text-transform:uppercase}
  .bcshock{position:absolute;left:12px;bottom:10px;display:inline-flex;align-items:center;gap:7px;color:var(--loss);font-family:var(--mono);font-size:var(--f-xs)}
  .bcshock::before{content:"";width:28px;height:1px;background:var(--loss);box-shadow:9px -3px 0 -3px var(--loss)}
  .bcnode{position:absolute;left:var(--x);top:var(--y);width:var(--sz);height:var(--sz);transform:translate(-50%,-50%);display:grid;place-content:center;text-align:center;border:1px solid var(--accent-2);border-radius:50%;background:rgba(57,199,212,.10);box-shadow:0 0 0 4px rgba(57,199,212,.025);z-index:1}
  .bcnode b{font-family:var(--mono);font-size:var(--f-xs);color:var(--text)}.bcnode em{font-style:normal;font-family:var(--mono);font-size:var(--f-2xs);color:var(--dim)}
  .bcnode.warn{border-color:var(--caution);background:var(--caution-wash)}.bcnode.bad{border-color:var(--loss);background:var(--loss-wash)}
  .bcnode.idea{border-style:dashed;border-width:2px;border-color:var(--accent);background:var(--accent-wash);box-shadow:0 0 0 6px rgba(70,213,181,.05)}.bcnode.idea b{color:var(--accent)}
  .bcresult{border-top:1px solid var(--line-soft)}.bcresult b{font-family:var(--mono);color:var(--loss)}.bcresult i{color:var(--faint);font-style:normal}
  .inspectpane:has(>.cohpanel){display:grid;grid-template-rows:minmax(330px,1fr) 150px 130px;gap:12px;overflow:hidden}
  .inspectpane:has(>.cohpanel)>.cohpanel{display:flex;min-height:0;flex-direction:column}
  .inspectpane:has(>.cohpanel) .cohpips{flex:1;align-items:stretch;margin:8px 0 12px}
  .inspectpane:has(>.cohpanel) .cohpip{align-content:center;padding:14px 16px;font-size:var(--f-sm)}
  .inspectpane:has(>.cohpanel)>.tailpanel,.inspectpane:has(>.cohpanel)>.fitbudget{display:flex;flex-direction:column;justify-content:center;margin:0;padding:13px 15px}
  .inspectpane>.upanel:only-child:has(>.mechg){display:grid;grid-template-rows:auto minmax(270px,1.25fr) auto minmax(210px,1fr) auto;gap:12px}
  .inspectpane>.upanel:only-child:has(>.mechg)>.mechg{height:100%;margin:0}
  .inspectpane>.upanel:only-child:has(>.mechg) .mgt{display:flex;flex-direction:column;justify-content:center;padding:14px 16px}
  .inspectpane>.upanel:only-child:has(>.mechg) .mgbar{height:6px}
  .inspectpane>.upanel:only-child:has(>.mechg)>.mechstats{margin:0}
  .inspectpane>.upanel:only-child:has(>.mechg)>.sensitivity{display:grid;grid-template-rows:auto repeat(3,minmax(0,1fr));align-items:center;margin:0;padding-top:12px}
  .inspectpane>.upanel:only-child:has(>.mechg) .sensrow{grid-template-columns:88px minmax(0,1fr) auto;margin:0}.inspectpane>.upanel:only-child:has(>.mechg) .sensrow>i{height:7px}
  .inspectpane>.upanel:only-child:has(>.mechg)>.legreceipt{margin:0;padding-top:10px}
}
.panefoot{margin-top:auto;padding-top:8px;border-top:1px solid var(--line-soft);font-size:var(--f-xs);line-height:1.4;color:var(--dim)}
.panefoot b{color:var(--text)}
.fitbudget{margin-top:8px;padding:8px 9px;border:1px solid var(--line-soft);border-radius:7px;background:var(--panel)}
.fitbudget .fbh{display:flex;justify-content:space-between;align-items:baseline;gap:7px;font-size:var(--f-xs);color:var(--faint)}
.fitbudget .fbh b{font-family:var(--mono);color:var(--text)}
.fitbudget .tailtrack{margin-top:6px}.fitbudget .tailtrack i{display:block;height:100%;border-radius:4px;background:var(--accent)}
.sensitivity{margin-top:9px;padding-top:8px;border-top:1px solid var(--line-soft)}
.sensrow{display:grid;grid-template-columns:68px 1fr auto;gap:7px;align-items:center;margin-top:6px;font-size:var(--f-xs)}
.sensrow>span{color:var(--faint)}.sensrow>i{height:5px;border-radius:3px;background:var(--line-soft);position:relative}
.sensrow>i::after{content:"";position:absolute;left:var(--mark,50%);top:-2px;width:2px;height:9px;border-radius:2px;background:var(--accent)}
.sensrow>b{font-family:var(--mono);font-size:var(--f-xs);color:var(--text)}
.legreceipt{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px;padding-top:8px;border-top:1px solid var(--line-soft)}
.legreceipt .lsleg{display:inline-flex;align-items:center;gap:4px;padding:3px 6px;border:1px solid var(--line-soft);border-radius:5px;background:var(--panel);font-size:var(--f-2xs)}
.legreceipt .lsleg b{font-family:var(--mono);color:var(--text)}.legreceipt .sell i{color:var(--loss)}.legreceipt .buy i{color:var(--profit)}
.mcreceipt{display:flex;align-items:center;justify-content:space-between;gap:7px;margin-top:5px;color:var(--faint);font-size:var(--f-2xs)}
/* execute */
.execbox{border:1px solid var(--line-soft);border-radius:10px;background:var(--panel-2);padding:12px 13px;margin-top:2px}
.execgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px 12px}
.efield{display:flex;flex-direction:column;gap:4px}
.efield .elbl{font-size:var(--f-xs);letter-spacing:.06em;text-transform:uppercase;color:var(--faint);font-weight:700}
.efield .seg{width:100%}
.efield .seg button{flex:1}
.decdock .usechead{display:none}
.decdock .execbox{margin:0;padding:8px 10px;border-radius:9px}
.decdock .execbox.open{padding-top:9px}
.decdock .execbox.open .execgrid{grid-template-columns:repeat(4,minmax(0,1fr));gap:7px 10px}
.dockrow{display:grid;grid-template-columns:auto minmax(260px,1fr) auto auto;align-items:center;gap:12px;min-height:42px}
.dockorder{display:flex;align-items:baseline;gap:7px;white-space:nowrap}.dockorder b{font-size:var(--f-sm)}
.dockorder span{font-size:var(--f-xs);color:var(--dim)}
.dockrow .fillbar{margin:0;min-width:0}.dockrow .fillbar .fbstate{display:none}
.dockrow .btn.place{padding:7px 18px}
.ticketedit{width:30px;height:29px;display:grid;place-items:center;border:1px solid var(--line-soft);border-radius:7px;background:var(--panel);color:var(--accent);cursor:pointer}
.ticketedit:hover,.ticketedit.on{border-color:var(--accent);background:var(--accent-wash)}
.ticketedit svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.decdock .execbox.open .execact{margin-top:7px}.decdock .execbox.open>.fillbar{margin-top:5px}
.decdock .execbox.open .placefoot{position:absolute;right:10px;bottom:8px;border:0;margin:0;padding:0}
.decdock .execbox.open{position:relative;padding-right:165px}
.decdock .execbox.open .placenote{display:none}
.execline{margin-top:11px;padding:9px 11px;background:var(--panel);border:1px solid var(--line-soft);border-radius:8px;
  font-size:var(--f-xs);color:var(--dim);line-height:1.5}
.execline b{color:var(--text)} .execline .paperlane{color:var(--violet);font-weight:700}
/* execute preview: a compact action line + a graphical fill ladder (bid⟷ask) — replaces the
   sentence that restated the order-type/lane controls; the ONE non-obvious bit (fills vs rests) is shown. */
.execact{display:flex;align-items:baseline;gap:10px;margin-top:10px;font-size:var(--f-sm);flex-wrap:wrap}
.execact b{color:var(--text)} .execact .execcash{color:var(--dim);font-size:var(--f-xs)} .execact .execcash b{color:var(--text)}
.fillbar{display:flex;align-items:center;gap:9px;margin-top:7px;font-size:var(--f-2xs)}
.fillbar .fbend{color:var(--faint);text-transform:uppercase;letter-spacing:.05em;flex:none}
.fillbar .fbtrack{position:relative;flex:1;height:6px;border-radius:3px;
  background:linear-gradient(90deg,var(--caution) 0%,var(--line-soft) 45%,var(--line-soft) 55%,var(--profit) 100%);opacity:.55}
.fillbar .fbmid{position:absolute;left:50%;top:-2px;width:1px;height:10px;background:var(--dim)}
.fillbar .fbmark{position:absolute;top:50%;width:11px;height:11px;border-radius:50%;transform:translate(-50%,-50%);
  background:var(--panel);border:2px solid var(--accent);box-shadow:0 0 0 2px var(--ground)}
.fillbar .fbmark.now{border-color:var(--caution)} .fillbar .fbmark.rest{border-color:var(--profit)}
.fillbar .fbstate{flex:none;font-family:var(--mono);font-weight:700;letter-spacing:.02em}
.fillbar .fbstate.now{color:var(--caution)} .fillbar .fbstate.rest{color:var(--profit)}
/* coherence chip on the hero (the whole "on your view" pane folded into one line) */
.fitchip{font-size:var(--f-sm);font-weight:700;padding:2px 9px;border-radius:5px;border:1px solid var(--line);white-space:nowrap}
.fitchip.on{color:var(--profit);border-color:var(--profit);background:var(--profit-wash)}
.fitchip.mid{color:var(--caution);border-color:var(--caution);background:var(--caution-wash)}
.fitchip.off{color:var(--loss);border-color:var(--loss);background:var(--loss-wash)}
/* compact governors for the narrow left column — two caps side by side, tighter screens */
.dcleft .govs{grid-template-columns:1fr 1fr;gap:0 16px}
.dcleft .govcol{margin-bottom:2px}
.dcleft .gov .gpass,.dcleft .gov .govcap{font-size:var(--f-xs);margin-top:1px}
.dechead{display:flex;align-items:center;gap:11px;margin-bottom:14px}
.dback{border:1px solid var(--line);background:#131a24;color:var(--dim);border-radius:6px;
  padding:5px 11px;font-size:var(--f-sm);font-weight:600}
.dback:hover{color:var(--text);border-color:var(--accent-2)}
.dechead .dtitle{font-size:var(--f-lg);font-weight:800}
.dechead .dctx{color:var(--faint);font-size:var(--f-sm)}

/* A — INTENT SPINE (context · editable objective · the recommendation front-and-center) */
.intent{border:1px solid var(--line-soft);border-left:3px solid var(--accent-2);border-radius:10px;
  background:var(--panel-2);padding:13px 15px;margin-bottom:14px;display:flex;flex-direction:column;gap:11px}
.objrow{display:flex;flex-wrap:wrap;align-items:center;gap:8px}
.objrow .lbl{margin-right:2px}
.objchip{display:inline-flex;align-items:center;gap:0;border:1px solid var(--line);border-radius:6px;
  background:#0d131c;overflow:hidden}
.objchip>.ok{padding:4px 9px;font-size:var(--f-sm);letter-spacing:.06em;text-transform:uppercase;color:var(--faint);font-weight:700;background:var(--panel)}
.objchip .oseg{display:flex}
.objchip .oseg button{border:0;background:0;color:var(--dim);padding:4px 9px;font-size:var(--f-sm);font-weight:600;border-left:1px solid var(--line-soft)}
.objchip .oseg button.on{color:var(--accent);background:var(--accent-wash)}
.objchip .ostatic{padding:4px 10px;font-size:var(--f-sm);font-weight:600;color:var(--text);font-family:var(--mono)}
.objchip .uxspot{color:var(--faint);font-weight:600}
/* underlying picker (search + select) — kills the AMD lock */
.pickchip{position:relative}
.pickchip .pickbtn{border:0;background:0;color:var(--text);font-family:var(--mono);font-weight:700;font-size:var(--f-sm);
  padding:4px 10px;display:inline-flex;align-items:center;gap:4px;cursor:pointer}
.pickchip .pickbtn:hover{color:var(--accent)}
.pickchip .pcar{color:var(--faint);font-size:var(--f-xs)}
.univpop{position:absolute;top:calc(100% + 6px);left:0;z-index:60;width:288px;background:var(--pop-surface,#0d131c);
  border:1px solid var(--line);border-radius:9px;box-shadow:0 14px 40px rgba(0,0,0,.55);overflow:hidden;
  animation:zoomin var(--mo-quick) var(--mo-ease)}
.univsearch{display:flex;align-items:center;gap:7px;padding:9px 11px;border-bottom:1px solid var(--line-soft);color:var(--faint)}
.univsearch input{flex:1;background:0;border:0;color:var(--text);font-size:var(--f-sm);font-weight:600;outline:none}
.univlist{max-height:290px;overflow:auto;padding:5px}
.univrow{width:100%;display:grid;grid-template-columns:52px 1fr auto auto;align-items:center;gap:9px;
  border:0;background:0;color:var(--dim);padding:7px 8px;border-radius:6px;cursor:pointer;text-align:left;
  transition:background var(--mo-quick) var(--mo-ease)}
.univrow:hover{background:var(--row-hover)}
.univrow.on{background:var(--sel-wash)}
.univrow .us{font-family:var(--mono);font-weight:800;color:var(--text);font-size:var(--f-sm)}
.univrow .un{font-size:var(--f-xs);color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.univrow .un .uheld{color:var(--accent-2);font-weight:700;font-size:var(--f-xs);letter-spacing:.04em;text-transform:uppercase}
.univrow .uv{font-family:var(--mono);font-size:var(--f-xs);color:var(--dim)}
.univrow .ue{font-family:var(--mono);font-size:var(--f-sm);font-weight:600}
.univrow .ue.pos{color:var(--profit)} .univrow .ue.neg{color:var(--loss)}
.rec{display:flex;align-items:center;gap:12px;border:1px solid var(--accent-2);border-radius:9px;
  background:var(--accent-wash);padding:11px 14px}
.rec .recico{width:26px;height:26px;border-radius:7px;flex:none;display:flex;align-items:center;justify-content:center;
  background:var(--accent);color:#06212a;font-weight:800;font-size:var(--f-md)}
.rec .rectext{min-width:0;flex:1}
.rec .receyebrow{font-size:var(--f-sm);letter-spacing:.09em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:2px}
.rec .recmain{font-size:var(--f-md);font-weight:700;color:var(--text)}
.rec .recmain .recnums{font-family:var(--mono);color:var(--dim);font-weight:600}
.rec .recwhy{font-size:var(--f-xs);color:var(--dim);line-height:1.4;margin-top:3px}
.rec .btn{flex:none}

/* B — MODE toggle + candidate source (engine picks vs build your own — ONE at a time) */
/* always-visible editable legs on the Decide hero (the pick's strikes are right there) */
.leghd{display:flex;align-items:center;gap:9px;margin:9px 0 5px}
.leghd .lbl{margin-right:0}
.declegs{display:flex;flex-wrap:wrap;gap:4px;align-items:center;margin:1px 0 5px}
.declegs .legr{margin:0;gap:3px;padding:3px 5px}
/* very compact chips so a 4-leg structure (iron condor) fits on ONE row */
.declegs .tgl{padding:2px 5px;font-size:var(--f-2xs)}
.declegs .mstp{border-radius:4px}
.declegs .mstp .ml{display:none}                 /* type implies call/put; drop the K/Qty labels for width */
.declegs .mstp button{width:17px;height:20px;font-size:var(--f-sm)}
.declegs .mstp .mv{min-width:22px;font-size:var(--f-sm);padding:0 2px}
.declegs .lrm{font-size:var(--f-2xs);padding:0 2px}
.declegshint{flex-basis:100%;color:var(--faint);margin-top:0}
.modebar{display:flex;align-items:center;gap:10px;margin:4px 0 10px}
.modebar .hint{margin-left:auto}
.railtools{display:flex;align-items:center;gap:6px;margin-left:auto}
.railtool{width:27px;height:25px;display:grid;place-items:center;border:1px solid var(--line-soft);border-radius:6px;
  background:var(--panel);color:var(--faint);cursor:pointer}
.railtool:hover,.railtool.on{border-color:var(--accent-2);color:var(--accent);background:var(--accent-wash)}
.railtool svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.raildrawer{min-height:0;overflow:auto;border-top:1px solid var(--line-soft);padding-top:8px;animation:govIn var(--mo-dur) var(--mo-ease)}
.raildrawer .pickmap{min-height:210px}
.raildrawer .govpanel{margin:0}
.srcpanel{border:1px solid var(--line-soft);border-radius:9px;background:var(--panel-2);padding:11px 12px;margin-bottom:14px}
.srchd{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.srchd .lbl{margin-right:auto}
/* ranked fan (list) */
/* engine-idea rows — 2-line cards: payoff-shape icon · name+fit · risk-chip + key metrics (no clipping) */
.fan{display:flex;flex-direction:column;gap:4px}
.fanr{display:grid;grid-template-columns:38px 1fr;align-items:center;gap:10px;width:100%;text-align:left;background:0;
  padding:6px 8px;border-radius:8px;cursor:pointer;border:1px solid transparent;
  transition:background var(--mo-quick) var(--mo-ease),box-shadow var(--mo-quick) var(--mo-ease),border-color var(--mo-quick) var(--mo-ease)}
.fanr:hover{background:var(--row-hover);border-color:var(--line-soft)}
.fanr.sel{border-color:var(--accent-2);background:var(--sel-wash);box-shadow:var(--sel-bar)}
/* the recommendation lives HERE (top row), not in a separate banner */
.fanr.pick{border-color:var(--accent);background:var(--accent-wash)}
.fanr.dis{opacity:.5}
.fanr.hot{background:#132030;box-shadow:inset 2px 0 0 var(--accent)}
.badge.pickbadge{color:#06212a;background:var(--accent);border-color:var(--accent);padding:1px 6px}
.fanicon{width:38px;height:30px;border:1px solid var(--line-soft);border-radius:6px;background:var(--panel-2);flex:none}
.fanmain{min-width:0;display:flex;flex-direction:column;gap:3px}
.fanmain .fr1{display:flex;align-items:center;gap:7px}
.fanmain .fnm{font-family:var(--mono);font-weight:800;color:var(--text);font-size:var(--f-sm);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.fanmain .fr1 .ffit{margin-left:auto;font-size:var(--f-2xs);letter-spacing:.05em;text-transform:uppercase;font-weight:700;flex:none}
.ffit.on{color:var(--profit)} .ffit.mid{color:var(--caution)} .ffit.off{color:var(--loss)}
.fanmain .fr2{display:flex;align-items:center;gap:11px;min-width:0}
.fanmain .fr2 .fmet{display:inline-flex;align-items:baseline;gap:4px}
.fanmain .fr2 .fmet small{font-family:var(--sans);font-size:var(--f-2xs);color:var(--faint);font-weight:600}
.fanmain .fr3{display:none;align-items:center;gap:10px;margin-top:2px;padding-top:5px;border-top:1px solid var(--line-soft);
  font-size:var(--f-2xs);color:var(--faint);flex-wrap:wrap}
.fanr.sel .fr3{display:flex}
.fanmain .fr3 b{font-family:var(--mono);color:var(--text)}
.fanmain .fr3 b.bad{color:var(--loss)}.fanmain .fr3 b.warn{color:var(--caution)}.fanmain .fr3 b.ok{color:var(--profit)}
.fanmain .fr3 .why{flex-basis:100%;line-height:1.35;color:var(--dim)}
.fanmain .rchip{font-size:var(--f-2xs);font-weight:700;text-transform:uppercase;letter-spacing:.03em;border:1px solid;border-radius:4px;padding:0 5px;justify-self:start}
.fanmain .fmet{font-family:var(--mono);font-size:var(--f-xs);color:var(--dim)}
.fanmain .fmet.pos{color:var(--profit)}
.fanmain .fgapchip{font-family:var(--mono);font-size:var(--f-xs);font-weight:700}
.fanmain .fgapchip.ok{color:var(--profit)} .fanmain .fgapchip.warn{color:var(--caution)} .fanmain .fgapchip.bad{color:var(--loss)}
.fanmain .fscr{font-size:var(--f-2xs);color:var(--caution);font-weight:700;text-transform:uppercase}
@media (max-width:2200px){
  .fanr{grid-template-columns:32px minmax(0,1fr);gap:7px}
  .fanmain .fr1{gap:5px}.fanmain .fr2{gap:7px}
  .fanmain .fscr{display:none}
}
/* shared strategy-identity chips — ONE appearance for the fan row, the Decide hero, and the held-position face */
.rchip{font-size:var(--f-2xs);font-weight:700;text-transform:uppercase;letter-spacing:.03em;border:1px solid;border-radius:4px;padding:0 5px}
.fgapchip{font-family:var(--mono);font-size:var(--f-xs);font-weight:700}
.fgapchip.ok{color:var(--profit)} .fgapchip.warn{color:var(--caution)} .fgapchip.bad{color:var(--loss)}
.ffit{font-size:var(--f-2xs);letter-spacing:.05em;text-transform:uppercase;font-weight:700}
.kgrid.calm{grid-template-columns:repeat(3,minmax(0,1fr))!important}
.kgrid.calm .k{padding-top:8px;padding-bottom:8px}
.ksecondary{display:flex;align-items:center;gap:17px;margin-top:5px;padding:0 4px;color:var(--faint);font-size:var(--f-2xs);flex-wrap:wrap}
.ksecondary span{display:inline-flex;align-items:baseline;gap:5px}.ksecondary b{font-family:var(--mono);color:var(--dim);font-size:var(--f-xs)}
.decspectrum{position:relative;display:grid;grid-template-columns:repeat(8,minmax(0,1fr));gap:2px;padding:20px 4px 4px;margin-top:3px}
.decspectrum::before{content:'';position:absolute;left:5%;right:5%;top:29px;height:2px;border-radius:2px;
  background:linear-gradient(90deg,var(--loss),var(--caution) 42%,var(--accent-2) 58%,var(--profit));opacity:.45}
.ssnode{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:7px;border:0;background:0;color:var(--faint);
  min-width:0;padding:0 2px 3px;cursor:pointer}
.ssnode .ssdot{width:10px;height:10px;border-radius:50%;background:var(--panel);border:2px solid var(--dim);box-shadow:0 0 0 3px var(--panel-2)}
.ssnode.loss .ssdot{border-color:var(--loss)}.ssnode.profit .ssdot{border-color:var(--profit)}
.ssnode.likely .ssdot{width:14px;height:14px;border-color:var(--accent);box-shadow:0 0 0 4px rgba(70,213,181,.09)}
.ssnode.pinned .ssdot{background:var(--accent);border-color:var(--accent);transform:scale(1.08)}
.ssnode .ssname{max-width:100%;font-size:var(--f-2xs);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ssnode:hover .ssname,.ssnode.pinned .ssname{color:var(--text)}
.ssread{display:flex;align-items:baseline;gap:14px;padding:7px 8px 2px;border-top:1px solid var(--line-soft);font-size:var(--f-xs);color:var(--dim)}
.ssread .sslead{font-weight:700;color:var(--text)}.ssread .ssmove{font-family:var(--mono);color:var(--faint)}
.ssread .sspl{font-family:var(--mono);font-weight:800}.ssread .sspl.pos{color:var(--profit)}.ssread .sspl.neg{color:var(--loss)}
.ssread .ssrange{margin-left:auto;color:var(--faint);font-size:var(--f-2xs)}
.scenpanel .srow-ctl{margin-top:7px}
.legsummary{display:flex;align-items:center;gap:7px;min-height:38px;margin:0;color:var(--dim);font-size:var(--f-xs);
  border:1px solid var(--line-soft);border-radius:8px;background:var(--panel-2);padding:5px 8px}
.legsummary .lsleg{display:inline-flex;align-items:center;gap:4px;padding:3px 7px;border:1px solid var(--line-soft);border-radius:5px;background:var(--panel)}
.legsummary .lsleg b{font-family:var(--mono);color:var(--text)}
.legsummary .lsleg.sell i{color:var(--loss)}.legsummary .lsleg.buy i{color:var(--profit)}
.legsummary .microcta,.legsummary .structedit{margin-left:auto}
.structedit{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line-soft);border-radius:6px;background:var(--panel);
  color:var(--accent);font-size:var(--f-xs);font-weight:700;padding:4px 8px;cursor:pointer}
.structedit:hover{border-color:var(--accent);background:var(--accent-wash)}
.structedit svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
/* risk/reward map (ported from plan-desk) */
.decmap{width:100%;height:200px;display:block;border:1px solid var(--line-soft);border-radius:8px;background:var(--panel)}
.mapcap{font-size:var(--f-xs);color:var(--faint);padding:7px 2px 0;line-height:1.4}
.mapcap b{color:var(--text);font-family:var(--mono)}
.fanleg{display:flex;gap:14px;flex-wrap:wrap;font-size:var(--f-sm);color:var(--faint);padding-top:9px}
.fanleg i{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:3px;vertical-align:middle}
/* GOVERNORS — a proper, visible control panel that shapes the fan (caps + screens) */
.govpanel{border:1px solid var(--line-soft);border-radius:9px;background:var(--panel-2);padding:11px 13px;margin-bottom:12px}
.govhd{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.govhd .lbl,.govhd .eyebrow{margin-right:auto}
.govhd .gshown{font-family:var(--mono);font-size:var(--f-sm);font-weight:700;color:var(--accent)}
.govhd .gshown small{color:var(--faint);font-weight:600}
.govs{display:grid;grid-template-columns:repeat(2,1fr);gap:10px 20px}
.govcol .gct{font-size:var(--f-xs);letter-spacing:.09em;text-transform:uppercase;color:var(--faint);font-weight:700;margin-bottom:7px}
.gov{margin-bottom:12px}
.gov:last-child{margin-bottom:0}
.gov .gh{display:flex;justify-content:space-between;align-items:baseline;font-size:var(--f-xs);color:var(--dim);margin-bottom:6px}
.gov .gh .num{font-family:var(--mono);color:var(--text);font-weight:700;font-size:var(--f-sm)}
.gov .slider{margin:0 0 1px}   /* canonical dark .slider (app.css #22); behavior unchanged */
.gov .gpass{display:inline-flex;align-items:center;gap:5px;font-size:var(--f-sm);color:var(--faint);margin-top:6px;
  font-weight:600}
.gov .gpass .gdot{width:6px;height:6px;border-radius:50%;background:var(--profit)}
.gov .gpass.some .gdot{background:var(--caution)}
.gov .gpass b{color:var(--text);font-family:var(--mono)}
.govcap{font-size:var(--f-sm);color:var(--faint);letter-spacing:.03em;margin-top:5px}
.bpread{margin-top:10px;padding-top:9px;border-top:1px solid var(--line-soft);font-size:var(--f-xs);color:var(--faint);line-height:1.55}
.bpread b{font-family:var(--mono);color:var(--text);font-weight:700}
.bpread b.pos{color:var(--profit)} .bpread b.neg{color:var(--loss)}

/* MECHANICS — one elegant GRAPHICAL greeks component shown to BOTH levels (numbers present) */
.mechg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:7px}
.mgt{border:1px solid var(--line-soft);border-radius:7px;background:var(--panel);padding:8px 10px}
.mgt .mgtop{display:flex;align-items:baseline;justify-content:space-between;gap:6px}
.mgk{font-size:var(--f-xs);letter-spacing:.05em;text-transform:uppercase;color:var(--faint);font-weight:700}
.mgv{font-family:var(--mono);font-weight:700;font-size:var(--f-sm)}
.mgbar{height:4px;border-radius:2px;background:#18212e;margin:6px 0 4px;position:relative;overflow:hidden}
.mgbar i{position:absolute;top:0;bottom:0;border-radius:2px}
.mgbar.center::before{content:"";position:absolute;left:50%;top:-1px;bottom:-1px;width:1px;background:#39465b;z-index:1}
.mgc{font-size:var(--f-sm);color:var(--dim);line-height:1.25}
/* compact assignment/edge/yield/mark stat grid (replaces the tall stacked gauges) */
.mechstats{display:grid;grid-template-columns:1fr 1fr;gap:8px 12px;margin-top:9px}
.mgs .mgstop{display:flex;align-items:baseline;justify-content:space-between;gap:6px}
.mgs .mgsk{font-size:var(--f-xs);letter-spacing:.04em;color:var(--faint);font-weight:600}
.mgs .mgsv{font-family:var(--mono);font-weight:700;font-size:var(--f-sm)}
.mgs .mgsv.pos{color:var(--profit)} .mgs .mgsv.neg{color:var(--loss)} .mgs .mgsv.warn{color:var(--caution)}
.mgs .mgbar{margin:5px 0 0}
/* persistent thread New-idea button */
.threadnew{flex:none;white-space:nowrap;margin-left:2px}
.mgauge{margin-top:9px}
.mgauge .gl{display:flex;justify-content:space-between;align-items:baseline;font-size:var(--f-xs);color:var(--dim);margin-bottom:4px}
.mgauge .gl .num{font-family:var(--mono);font-weight:700}
.mgauge .gbar{height:7px;border-radius:4px;position:relative;
  background:linear-gradient(90deg,var(--profit) 0%,var(--caution) 55%,var(--loss) 100%);opacity:.5}
.mgauge .gbar .gmark{position:absolute;top:-2px;width:3px;height:11px;border-radius:2px;background:var(--text);
  box-shadow:0 0 0 2px var(--ground);transform:translateX(-50%)}
.mgmeter{display:flex;align-items:center;gap:8px;margin-top:9px;font-size:var(--f-xs);color:var(--dim)}
.mgmeter .mml{white-space:nowrap}
.mgmeter .num{font-family:var(--mono);font-weight:700}
.mgmeter .mgbar{flex:1;margin:0}
.mgmeter .mmdot{width:8px;height:8px;border-radius:50%;background:var(--dim);flex:none}
.mgmeter .mmdot.pos{background:var(--profit)} .mgmeter .mmdot.neg{background:var(--loss)}
.mech-more{margin-top:2px;padding-top:8px;border-top:1px solid var(--line-soft)}   /* shown to BOTH levels */

/* LINKED map + list (two views of one fan, wired to the hero) */
.picklink{display:grid;grid-template-columns:1fr;gap:12px}
.pickmap{position:relative}
.mapcard{position:absolute;z-index:20;pointer-events:none;background:var(--pop-surface,#0d131c);border:1px solid var(--line);
  border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.5);padding:8px 10px;min-width:158px;max-width:220px;font-size:var(--f-xs);
  opacity:0;transform:translateY(3px);transition:left var(--mo-dur) var(--mo-ease),top var(--mo-dur) var(--mo-ease),opacity var(--mo-quick) var(--mo-ease),transform var(--mo-quick) var(--mo-ease)}
.mapcard.show{opacity:1;transform:none}
.mapcard.mc-place{transition:opacity var(--mo-quick) var(--mo-ease),transform var(--mo-quick) var(--mo-ease)}   /* first placement: no slide from origin */
.mapcard .mcnm{display:flex;align-items:center;gap:6px;font-weight:700;color:var(--text);margin-bottom:5px}
.mapcard .mcnm .mcrisk{width:8px;height:8px;border-radius:50%;flex:none}
.mapcard .mcg{display:grid;grid-template-columns:auto auto;gap:2px 12px}
.mapcard .mcg .kk{color:var(--faint)} .mapcard .mcg .vv{font-family:var(--mono);text-align:right}
.mapcard .mcg .vv.pos{color:var(--profit)} .mapcard .mcg .vv.neg{color:var(--loss)}
.mapcard .mcfit{margin-top:5px;font-size:var(--f-xs);color:var(--dim)}
/* legs editor (build your own — ported from compose) */
.leged{display:flex;flex-direction:column;gap:6px}
.legr{display:flex;flex-direction:column;gap:4px;border:1px solid var(--line);background:var(--panel);border-radius:7px;padding:6px 8px}
.legr-top{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.legr .lgm{font-family:var(--mono);font-size:var(--f-sm);color:var(--faint);padding-left:2px;white-space:nowrap}
.legr .lgm b{font-weight:700}
.legr .lgm b.pos{color:var(--profit)} .legr .lgm b.neg{color:var(--loss)}
.tgl{border:1px solid var(--line);background:#0e141d;color:var(--dim);border-radius:5px;padding:3px 8px;font-size:var(--f-sm);font-weight:700;letter-spacing:.04em}
.tgl.sell{color:var(--loss);border-color:var(--loss)} .tgl.buy{color:var(--profit);border-color:var(--profit)}
.tgl.callc{color:var(--accent)} .tgl.putc{color:var(--violet)} .tgl.stockc{color:var(--dim)}
.mstp{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:5px;overflow:hidden}

  }
  if(ghost){ var gline=''; for(var gi=0;gi<=n;gi++){ var gpx=lo+(hi-lo)*gi/n; gline+=(gi?' L ':'M ')+f(sx(gpx))+' '+f(sy(payFor(ghost,gpx))); }

    /* a PINNED / reshaped what-if — bold adjustable marker on the curve */
    if(opts.pinM!=null){ var pmag=+opts.pinM, ppx=p.spot*(1+pmag/100);
      if(ppx>=lo&&ppx<=hi){ var pv=payFor(p,ppx), pX=sx(ppx), pY=sy(pv), pcol=pv>=0?'var(--profit)':'var(--loss)';
        var pinAnchor=pX<x0+90?'start':pX>x1-115?'end':'middle';
        var pinTextX=pinAnchor==='start'?pX+8:pinAnchor==='end'?pX-8:pX;
        var pinTextY=pX<x0+190?y0+31:y0+10;

    var expV=payFor(p,p.spot), expX=sx(p.spot), expY=sy(expV), expCol=expV>=0?'var(--profit)':'var(--loss)';

    } else {
      g+='<circle cx="'+f(expX)+'" cy="'+f(expY)+'" r="4.7" fill="var(--accent)" stroke="var(--ground)" stroke-width="1.7"/>';
      g+='<text class="pfxp" x="'+f(lX)+'" y="'+f(expY-7)+'" text-anchor="'+anc+'" fill="'+expCol+'">at spot '+money(expV)+'</text>';
    }
  }
  svg._map={lo:lo,hi:hi,x0:x0,pw:pw};   // price↔x mapping for interactive strike dragging
  svg._snap=payoffSnap(p);               // for the next edit's tween
  svg.innerHTML=g;
}

/* underlying price sparkline (the lens' little chart) — deterministic wiggle per symbol */
function priceSpark(svg,p){
  if(!svg)return;
  var W=Math.max(40,Math.round(svg.clientWidth||120)), H=Math.max(18,Math.round(svg.clientHeight||30));
  svg.setAttribute('viewBox','0 0 '+W+' '+H);
  var seed=0; for(var i=0;i<p.sym.length;i++) seed+=p.sym.charCodeAt(i)*(i+7);
  var n=30, a=[], v=0;
  for(var i=0;i<n;i++){ seed=(seed*9301+49297)%233280; v+=((seed/233280)-0.47)*2; a.push(v); }
  var lo=Math.min.apply(null,a), hi=Math.max.apply(null,a), pad=(hi-lo)*0.12||1; lo-=pad; hi+=pad;
  var d=''; for(var i=0;i<n;i++){ var x=(W-2)*i/(n-1)+1, y=H-2-(a[i]-lo)/(hi-lo)*(H-4); d+=(i?' L ':'M ')+(Math.round(x*10)/10)+' '+(Math.round(y*10)/10); }
  var up=a[n-1]>=a[0];
  svg.innerHTML='<path d="'+d+'" fill="none" stroke="'+(up?'var(--profit)':'var(--loss)')+'" stroke-width="1.3" stroke-linejoin="round"/>';
}

/* ONE spec per greek — shared by mechGraphic (build) and renderAtPrice (per-frame patch) so the
   formatting/scaling lives in exactly one place (no-sprawl). */
var GSPEC=[
  {key:'delta',lab:'Δ Delta',dec:2,signed:true,center:true, w:function(v){return Math.min(50,Math.abs(v)/0.8*50);},  col:function(v){return v>=0?'var(--profit)':'var(--loss)';}, cue:function(v){return Math.abs(v)<0.08?'near-neutral':(v>0?'long lean':'short lean');}, cls:function(){return '';}},
  {key:'theta',lab:'Θ Theta',dec:0,signed:true,center:false,w:function(v){return Math.min(100,Math.abs(v)/80*100);},  col:function(v){return v>=0?'var(--profit)':'var(--loss)';}, cue:function(v){return v>=0?'time pays you':'time costs you';}, cls:function(v){return v>=0?'pos':'neg';}},
  {key:'vega', lab:'V Vega', dec:0,signed:false,center:false,w:function(v){return Math.min(100,Math.abs(v)/1400*100);},col:function(v){return v<=0?'var(--caution)':'var(--violet)';}, cue:function(v){return v<=0?'short vol · your risk':'long vol';}, cls:function(v){return v<=0?'warn':'';}},
  {key:'gamma',lab:'Γ Gamma',dec:2,signed:true,center:false,w:function(v){return Math.min(100,Math.abs(v)/0.06*100);},col:function(){return 'var(--dim)';}, cue:function(){return 'curvature';}, cls:function(){return '';}}
];

    (c.mark?mgStat('Mark',c.mark,(/rich/.test(c.mark)?'pos':/cheap/.test(c.mark)?'neg':''),null):'')+

/* ---- A · the decision band (spine): P/L hero + situation read + recommended action ---- */
function decband(p){
  var f=FLAGS[p.flagKind]||FLAGS.clear;

    '<div class="decplv '+(p.pnl>=0?'pos':'neg')+'">'+money(p.pnl)+'</div>'+
    '<div class="decsub"><span>since entry · held '+p.held+'d</span>'+
      '<span class="'+(p.day>=0?'pos':'neg')+'">'+signed(p.day)+' today</span></div></div>';
  var main;
  if(p.flagKind==='clear'){
    main='<div class="decmain">'+
      '<div class="deceyebrow"><span class="badge ok">Clear</span><span class="hint">'+p.event+'</span></div>'+
      '<div class="verdict"><span class="vdot"></span><div>'+p.read+'</div></div>'+
      '<div class="decacts">'+f.alt.map(function(a){return '<button class="btn" data-act="'+a+'">'+a+'</button>';}).join('')+'</div>'+
    '</div>';
  } else {
    main='<div class="decmain">'+
      '<div class="deceyebrow"><span class="badge '+(p.tone||f.tone)+'">'+p.attn+'</span><span class="hint">'+p.flagNote+'</span></div>'+
      '<div class="decread">'+p.read+'</div>'+

        f.alt.map(function(a){return '<button class="btn" data-act="'+a+'">'+a+'</button>';}).join('')+'</div>'+
    '</div>';
  }
  /* bridge: today's mark → the at-expiry value if price simply HOLDS at spot (same engine
     as the payoff curve & scenarios). The gap between them is the time value still to collect. */
  var hold=payFor(p,p.spot);
  var bridge='<div class="decbridge"><span class="nowv">'+money(p.pnl)+' on today’s mark</span>'+
    '<span class="arrow">→</span>'+

    '<span class="brq">'+p.settle+'</span></div>';
  return '<div class="decband tone-'+f.tone+'"><div class="decrow">'+pl+main+'</div>'+bridge+'</div>';
}

/* DRAG a strike handle on the payoff → live-edit that leg's strike (enters an adjustment) */

/* ======================================================================
   GO — the zoom transition. book<->position = FLIP; else = zoom crossfade
   ====================================================================== */
function go(level,focus){
  if(LEVELS.indexOf(level)<0)return;
  if(level==='position'){ focus=focus||state.focus||POS[0].id; }
  else { focus=state.focus; }
  /* an inline adjust tray only lives on its own focused position — leaving resets it */
  if(adjust && (level!=='position' || focus!==adjust.posId)) adjust=null;
  var prev=state.level, prevFocus=state.focus;
  var cardPair=(prev==='book'||prev==='position')&&(level==='book'||level==='position');
  /* which cards do a full FLIP (grow/shrink) vs cross-fade: the INCOMING focus always blooms,
     and when we were already in a position, the OUTGOING focus recedes the same way — so
     position→position (and →book) breathe symmetrically, not one-sided. */
  function isHero(id){ return id===focus || (prev==='position' && id===prevFocus); }

  if(reduce||!cardPair){
    layoutForLevel(level,focus);
    state={level:level,focus:focus};
    updateThread();
    if(!reduce) enterAnim(level);
    if(level==='position') addReveal(focus);
    return;
  }

  /* --- FLIP: record First rects of every card --- */
  var firsts={};
  for(var i=0;i<POS.length;i++){ var e=cardEl[POS[i].id];
    if(e.isConnected){ var r=e.getBoundingClientRect(); if(r.width>0) firsts[POS[i].id]=r; } }

  /* --- switch to the Last layout --- */
  layoutForLevel(level,focus);
  state={level:level,focus:focus};
  updateThread();

  /* --- measure Last; the HERO card (focus) does a full FLIP — grows from where you clicked /
         shrinks back to its grid slot. Every OTHER card just cross-fades in at its new slot, so
         the grid(290px)↔strip(172px) size change never distorts content mid-flight. --- */
  for(var i=0;i<POS.length;i++){ var p=POS[i], e=cardEl[p.id];
    if(!e.isConnected) continue;
    if(isHero(p.id)){
      var fr=firsts[p.id]; if(!fr){ e.style.transition='none'; e.style.transform=''; e.style.opacity='0'; continue; }
      var lr=e.getBoundingClientRect();
      var dx=fr.left-lr.left, dy=fr.top-lr.top;
      var sX=lr.width?fr.width/lr.width:1, sY=lr.height?fr.height/lr.height:1;
      e.style.transition='none';
      e.style.transformOrigin='top left';
      e.style.transform='translate('+dx+'px,'+dy+'px) scale('+sX+','+sY+')';
      /* the receding card also fades a touch so its (now smaller) content doesn't read as scaled */
      e.style.opacity=(p.id===focus?'1':'0.55');
    } else {
      e.style.transition='none'; e.style.transform=''; e.style.opacity='0';
    }
  }
  /* --- flush layout, then animate the breath (heroes: transform→identity; others: opacity→1) --- */
  void stageEl.offsetHeight;
  for(var i=0;i<POS.length;i++){ var p=POS[i], e=cardEl[p.id];
    if(!e.isConnected) continue;
    if(isHero(p.id)){ e.style.transition='transform '+DUR+'ms '+EASE+', opacity '+(DUR*0.6|0)+'ms '+EASE; e.style.transform=''; e.style.opacity='1'; }
    else { e.style.transition='opacity '+(DUR*0.7|0)+'ms '+EASE; e.style.opacity='1'; }
  }
  window.setTimeout(function(){
    for(var i=0;i<POS.length;i++){ var e=cardEl[POS[i].id]; e.style.transition=''; e.style.transform=''; e.style.transformOrigin=''; e.style.opacity=''; }
    redraw();   // final safety redraw once transforms are cleared
  }, DUR+60);

  /* --- fade/stagger the detail in after the geometry settles --- */
  if(level==='position'){ window.setTimeout(function(){ addReveal(focus); }, Math.round(DUR*0.38)); }
}

function ivForK(S,K){var m=(K-S)/S;return Math.max(0.28,Math.min(0.95,0.44-m*0.55+Math.abs(m)*0.25));}
function bsPrice(S,K,T,sig,type){
  if(T<=0)T=1/365; if(sig<=0)sig=0.01;
  var sq=Math.sqrt(T), d1=(Math.log(S/K)+(sig*sig/2)*T)/(sig*sq), d2=d1-sig*sq;
  var Nd1=ncdf(d1,0,1), pdf=Math.exp(-d1*d1/2)/Math.sqrt(2*Math.PI), price, delta;
  if(type==='c'){price=S*Nd1-K*ncdf(d2,0,1);delta=Nd1;} else {price=K*ncdf(-d2,0,1)-S*ncdf(-d1,0,1);delta=Nd1-1;}
  return {price:Math.max(0.02,price),delta:delta,gamma:pdf/(S*sig*sq),vega:S*pdf*sq/100,theta:(-(S*pdf*sig)/(2*sq))/365};
}

  for(var i=0;i<=n;i++){var v=payFor(c,lo+(hi-lo)*i/n); if(v<mn)mn=v; if(v>mx)mx=v;}
  /* extend to the TRUE tails so downside isn't understated: S→0 (a short put / long stock
     bottoms out there) and a far up-move (an uncovered short call blows up). The domain alone
     only spans ~±1.7 expected moves, which badly understated CSP/short-put max loss. */
  var v0=payFor(c,0.01), vUp=payFor(c,c.spot*5);

  c.maxProfit=Math.max(0,mx); c.maxLoss=Math.max(0,-mn); return c;
}

/* an uncovered short CALL = genuinely unlimited risk (a short put/CSP is bounded to strike→0) */
function calcUndef(legs){
  var shortC=legs.some(function(l){return l.t==='c'&&l.q<0;}), longC=legs.some(function(l){return l.t==='c'&&l.q>0;}),
      longStk=legs.some(function(l){return l.t==='s'&&l.q>0;});
  return shortC&&!longC&&!longStk;

/* fill net/greeks/pop/cap/edge/assign/risk on a {sym,spot,em,legs,...meta} object from the leg engine.
   Shared by buildCandidate, genCands and imports so numbers are consistent everywhere. */
function finishCand(c){
  var spot=c.spot, T=DEC_T, net=0,dl=0,th=0,vg=0,gm=0,coll=0,hasStock=false,shortOpt=0;
  c.legs.forEach(function(l){
    if(l.t==='s'){dl+=l.q/100;hasStock=true;coll+=Math.abs(l.q)*spot;return;}
    if(l.q<0)shortOpt+=Math.abs(l.q);
    var pr=bsPrice(spot,l.k,T,ivForK(spot,l.k),l.t);
    net+=-l.q*pr.price*100; dl+=l.q*pr.delta; th+=l.q*pr.theta*100; vg+=l.q*pr.vega*100; gm+=l.q*pr.gamma*100;
    if(l.q<0&&l.t==='p')coll+=l.k*100*Math.abs(l.q);
  });
  c.net=Math.round(net); c.credit=c.net;
  c.delta=Math.round(dl*100)/100; c.theta=Math.round(th); c.vega=Math.round(vg); c.gamma=Math.round(gm*100)/100;
  if(c.undef==null)c.undef=calcUndef(c.legs);
  candStats(c); c.pop=popCalc(c);
  /* capital committed: a DEFINED spread ties up only its max loss (the long leg caps it);
     a collateralized short (CSP / covered) ties up the collateral / stock value; an uncovered
     short ties up margin. (Previously spreads wrongly used the naked short-leg collateral.) */
  c.cap=Math.round(c.undef ? spot*100*shortOpt*0.20 : ((isCollat(c)||hasStock) ? Math.max(coll,c.maxLoss) : c.maxLoss));
  c.edge=Math.round(c.credit*0.06);
  if(c.assign==null)c.assign=Math.max(4,Math.round((100-c.pop)*0.5));
  if(!c.risk)c.risk=c.undef?'high':c.maxLoss<2500?'low':c.maxLoss<9000?'mid':'high';
  return c;
}
/* net greeks under a scenario's assumptions — arbitrary price px, IV-point shift, days elapsed.
   Same leg engine as finishCand; drives the mechanics panel as a scenario scrubs (see liveGreeks). */
function greeksAt(c, px, ivShift, daysFwd){
  var T=Math.max(1/365, DEC_T-(daysFwd||0)/365), dl=0,th=0,vg=0,gm=0, shortITM=0;
  c.legs.forEach(function(l){
    if(l.t==='s'){ dl+=l.q/100; return; }
    var pr=bsPrice(px,l.k,T,Math.max(0.05,ivForK(px,l.k)+(ivShift||0)/100),l.t);
    dl+=l.q*pr.delta; th+=l.q*pr.theta*100; vg+=l.q*pr.vega*100; gm+=l.q*pr.gamma*100;
    if(l.q<0) shortITM=Math.max(shortITM, Math.abs(pr.delta));   /* P(ITM)≈|Δ| of the nearest short */
  });

}
/* the DISPLAYED greeks: the position's shown baseline + the modelled CHANGE from now→(px,iv,days),
   so t=0 lands exactly on the baseline numbers and the move is what animates (no jump on play). */
function liveGreeks(c, px, ivShift, daysFwd){
  var g0=greeksAt(c,c.spot,0,0), g=greeksAt(c,px,ivShift,daysFwd);
  return {
    delta:(+c.delta||0)+(g.delta-g0.delta),
    theta:(+c.theta||0)+(g.theta-g0.theta),
    vega:(+c.vega||0)+(g.vega-g0.vega),
    gamma:(+c.gamma||0)+(g.gamma-g0.gamma),
    assign:Math.max(0,Math.min(100,(+c.assign||0)+(g.assign-g0.assign)))
  };
}

   number — the at-expiry payoff can't show either). Anchored at the line's real open P/L so t=0
   shows today's number and you watch it change. */
function scenMarkRaw(c, px, ivShift, daysFwd){
  var T=Math.max(1/365, DEC_T-(daysFwd||0)/365), t=(c.net||0);
  c.legs.forEach(function(l){

    t+=l.q*pr.price*100;

   calibrated from IV (expected move), IV-rank, sector and known events — no AI.
   The jump variance is CARVED OUT of the IV-implied total so we don't double-count
   the fear already priced into IV. Feeds popCalc, the Monte-Carlo, the bell and

  Software:{lam:0.04,gap:0.10}, Index:{lam:0.025,gap:0.07}, Health:{lam:0.045,gap:0.10}, default:{lam:0.05,gap:0.11} };
function tailParams(c){

  var ivr=(typeof u.ivRank==='number'?u.ivRank:55), dial=GAP_DIAL[GAP_STANCE]||1;

  var gap=Math.max(0.05,Math.min(0.30, sec.gap*(1+(ivr-50)/100*0.3)*(evSoon?1.1:1)));  /* characteristic down-gap size (a touch wider through an event) */

  var drift=-0.5*vBody;                        /* martingale BODY only — the down-jumps are left UNCOMPENSATED, so the distribution

/* Fast terminal expected shortfall for the always-visible brief. It integrates the same tail

var TAIL_ES_CACHE={};

function bookGapFrac(){ var secR={}; POS.forEach(function(p){ var s=(univBy[p.sym]||{}).sector||'—'; secR[s]=(secR[s]||0)+p.riskPct; });
  var d=Object.keys(secR).sort(function(a,b){return secR[b]-secR[a];})[0]||'default';
  return {sector:d, gap:(SECTOR_GAP[d]||SECTOR_GAP.default).gap}; }

  var gapPL=0; positions.forEach(function(p,i){ gapPL+=payFor(p, p.spot*(1-betas[i]*TP[i].gap)); });

function renderAfterDecisionChange(){
  if(!decide)return;
  markDecisionValuationStale();
  if(decide.mcOn)queueDecisionSimulation(); else { decide.mcRunning=false; renderDecide(); }
}
function legAction(act,i,d){
  /* editing any leg (a stepper here, or a strike drag on the chart) forks the engine pick
     into your own build — the structure IS the editor, no separate mode to hunt for */
  if(decide.mode!=='build'){ var eng=activeCand(); decide.buildLegs=eng.legs.map(function(l){return {t:l.t,k:l.k,q:l.q};}); decide.mode='build'; }
  var L=decide.buildLegs; if(!L)return;
  var inc=strikeInc(decide.spot||DEC_SPOT);
  if(act==='rm'){ if(L[i]&&L[i].t!=='s')L.splice(i,1); }
  else { var l=L[i]; if(!l)return;
    if(act==='side') l.q=-l.q;
    else if(act==='type') l.t=(l.t==='c'?'p':(l.t==='p'?'c':'s'));
    else if(act==='strike') l.k=Math.max(inc,l.k+d*inc);
    else if(act==='qty'){ var s=l.q<0?-1:1; if(l.t==='s') l.q=s*Math.max(100,Math.abs(l.q)+d*100); else l.q=s*Math.max(1,Math.abs(l.q)+d); }
  }
  renderAfterDecisionChange();
}
function decAction(a,el){
  if(a==='back'){ exitDecide(); return; }
  if(a==='intent'){ decide.intentOpen=!decide.intentOpen; if(!decide.intentOpen)decide.pickOpen=false; renderDecide(); return; }
  if(a==='lefttool'){ var tool=el&&el.getAttribute('data-tool'); decide.leftTool=decide.leftTool===tool?null:tool; renderDecide(); return; }
  if(a==='inspect'){ var pane=el&&el.getAttribute('data-inspect'); if(pane)decide.inspect=pane; renderDecide();
    var selected=decideEl.querySelector('[data-inspect="'+decide.inspect+'"]'); if(selected)selected.focus(); return; }
  if(a==='ticket'){ decide.orderOpen=!decide.orderOpen; renderDecide(); return; }
  if(a==='pick'){ decide.pickOpen=!decide.pickOpen; renderDecide();
    if(decide.pickOpen){ var q=document.getElementById('univq'); if(q){ q.focus(); q.setSelectionRange(q.value.length,q.value.length); } } return; }
  if(a==='userec'){ stopDecScen(); decide.mode='engine'; decide.candId=recCand().id; renderAfterDecisionChange(); return; }
  if(a==='editlegs'){
    /* Edit always forks the exact engine idea on screen. A prior hidden draft must never
       reopen behind a newly selected candidate. */
    var eng=activeCand(); decide.buildLegs=eng.legs.map(function(l){return {t:l.t,k:l.k,q:l.q};});
    decide.buildSourceId=eng.id; decide.mode='build'; renderAfterDecisionChange(); return;
  }
  if(a==='montecarlo'){
    if(decide.mcOn||decide.mcRunning){ decide.mcOn=false; decide.mcRunning=false; decide._mcRunKey=++MC_RUN_SEQ; renderDecide(); return; }
    queueDecisionSimulation(); return;
  }
  if(a==='pickcand'){ var cid=el&&el.getAttribute('data-cid'); if(cid){ stopDecScen(); decide.candId=cid; decide.mode='engine'; renderAfterDecisionChange(); } return; }
  if(a==='review'){ decide.order.review=true; renderDecide(); return; }
  if(a==='cancel'){ decide.order.review=false; renderDecide(); return; }
  if(a==='confirm'){
    decide.order.placed=true;
    toast(decide.kind==='close'?('Position closed — '+decide.sym):('Order placed — resting in the '+decide.order.lane+' lane'));
    window.setTimeout(function(){ exitDecide(); go('book'); }, 460);
  }
}
function loadCand(id){ stopDecScen(); decide.mode='engine'; decide.candId=id; DEC_HOT=id; renderAfterDecisionChange(); }
function wireDecide(){
  if(decideEl._wired) return; decideEl._wired=1;
  decideEl.addEventListener('pointerdown',function(e){ var h=e.target.closest&&e.target.closest('[data-legk]'); if(!h)return;
    e.preventDefault(); e.stopPropagation(); startDecStrikeDrag(+h.getAttribute('data-legk'), e); });
  decideEl.addEventListener('mouseover',function(e){ var r=e.target.closest&&e.target.closest('.scenpanel .srow[data-si]');
    if(!r||(e.relatedTarget&&r.contains(e.relatedTarget)))return; r.classList.add('hot'); hlScenMark(decideEl.querySelector('#decPay'),r.getAttribute('data-si'),true); });
  decideEl.addEventListener('mouseout',function(e){ var r=e.target.closest&&e.target.closest('.scenpanel .srow[data-si]');
    if(!r||(e.relatedTarget&&r.contains(e.relatedTarget)))return; r.classList.remove('hot'); hlScenMark(decideEl.querySelector('#decPay'),r.getAttribute('data-si'),false); });
  decideEl.addEventListener('click',function(e){var t=e.target;
    var srw=t.closest&&t.closest('.srow[data-si]'); if(srw&&!t.closest('.srow-ctl')){ e.stopPropagation(); pinScen(decSurf(), srw.getAttribute('data-si')); return; }   /* inline controls must not unpin */
    var swf=t.closest&&t.closest('.scenpanel [data-wf]'); if(swf){ e.stopPropagation(); var swa=swf.getAttribute('data-wf'), ss=decSurf();
      if(swa==='magdn') adjustAsm(ss,'mag',-1); else if(swa==='magup') adjustAsm(ss,'mag',1);
      else if(swa==='ivdn') adjustAsm(ss,'iv',-2); else if(swa==='ivup') adjustAsm(ss,'iv',2);
      else if(swa==='daysdn') adjustAsm(ss,'days',-1); else if(swa==='daysup') adjustAsm(ss,'days',1);
      else if(swa.indexOf('tu-')===0) setTUnit(ss, swa.slice(3));
      else if(swa==='playtoggle') toggleScenPlay(ss); else if(swa==='spd') setScenSpeed(ss,+swf.getAttribute('data-s')); else if(swa==='scrub'){} else pinScen(ss,null); return; }
    var gd=t.closest('[data-gapdial]'); if(gd){ GAP_STANCE=gd.getAttribute('data-gapdial');
      decide.cands.forEach(function(c){ c.pop=popCalc(c); }); POS.forEach(function(p){ p.pop=popCalc(p); }); _bookTailCache=null; renderAfterDecisionChange(); return; }
    var b=t.closest('[data-dec]'); if(b){ decAction(b.getAttribute('data-dec'), b); return; }
    var mo=t.closest('[data-mode]'); if(mo){ var nm=mo.getAttribute('data-mode');
      if(nm==='build'&&!decide.buildLegs){ var eng=decide.cands.filter(function(c){return c.id===decide.candId;})[0]||decide.cands[0];
        decide.buildLegs=eng.legs.map(function(l){return {t:l.t,k:l.k,q:l.q};}); }
      decide.mode=nm; renderAfterDecisionChange(); return; }
    var ob=t.closest('[data-obj]'); if(ob){ decide[ob.getAttribute('data-obj')]=ob.getAttribute('data-val'); renderDecide(); return; }
    var pk=t.closest('[data-pick]'); if(pk){ setUnderlying(pk.getAttribute('data-pick')); return; }
    var cd=t.closest('[data-cand]'); if(cd){ loadCand(cd.getAttribute('data-cand')); return; }
    var mi=t.closest('[data-mapi]'); if(mi){ if(mi.getAttribute('data-mapi')!=='build')loadCand(mi.getAttribute('data-mapi')); return; }
    var ot=t.closest('[data-otype]'); if(ot){ decide.order.type=ot.getAttribute('data-otype'); renderDecide(); return; }
    var ln=t.closest('[data-lane]'); if(ln){ decide.order.lane=ln.getAttribute('data-lane'); renderDecide(); return; }
    var st=t.closest('[data-step]'); if(st){ decStep(st.getAttribute('data-step'), +st.getAttribute('data-d')); return; }
    var lg=t.closest('[data-leg]'); if(lg){ legAction(lg.getAttribute('data-leg'), +lg.getAttribute('data-li'), +(lg.getAttribute('data-d')||0)); return; }
    var al=t.closest('[data-addleg]'); if(al){
      if(decide.mode!=='build'||!decide.buildLegs){ decide.buildLegs=activeCand().legs.map(function(l){return {t:l.t,k:l.k,q:l.q};}); decide.mode='build'; }
      pushNewLeg(decide.buildLegs, decide.spot||DEC_SPOT); renderAfterDecisionChange(); return; }
    var tp=t.closest('[data-tmpl]'); if(tp){ var tpl=STRAT_TEMPLATES.filter(function(x){return x.k===tp.getAttribute('data-tmpl');})[0];
      if(tpl){ decide.buildLegs=tpl.f(decide.spot||DEC_SPOT); decide.mode='build'; renderAfterDecisionChange(); } return; }
  });
  /* LINK the two views: hover a map dot OR a list row highlights both + shows the card */
  decideEl.addEventListener('mousemove',function(e){ if(!decide)return;
    var dot=e.target.closest&&e.target.closest('[data-mapi]'); if(dot){ setDecHot(dot.getAttribute('data-mapi')); return; }
    if(e.target.closest&&e.target.closest('#decMap')){ setDecHot(-1); } });
  decideEl.addEventListener('mouseover',function(e){ if(!decide)return;
    var r=e.target.closest&&e.target.closest('.fanr[data-cand]'); if(r){ setDecHot(r.getAttribute('data-cand')); } });
  decideEl.addEventListener('mouseout',function(e){ if(!decide)return;
    var r=e.target.closest&&e.target.closest('.fanr[data-cand]'); if(!r)return;
    var to=e.relatedTarget&&e.relatedTarget.closest?e.relatedTarget.closest('.fanr[data-cand],[data-mapi]'):null;
    if(!to) setDecHot(-1); });
  decideEl.addEventListener('input',function(e){
    if(e.target.id==='univq'){ decide.pickq=e.target.value; var caret=e.target.selectionStart; renderDecide();
      var q=document.getElementById('univq'); if(q){ q.focus(); try{q.setSelectionRange(caret,caret);}catch(_){} } return; }
    var scr=e.target.closest&&e.target.closest('.scenpanel .scrub[data-wf="scrub"]'); if(scr){ scenScrub(decSurf(), +scr.value/100); return; }
    var g=e.target.closest('[data-gov]'); if(!g)return;
    var k=g.getAttribute('data-gov'), lab=document.getElementById('gv-'+k); if(lab)lab.textContent=govFmt(k,+g.value); });
  decideEl.addEventListener('change',function(e){ var g=e.target.closest('[data-gov]'); if(!g)return;
    decide.govs[g.getAttribute('data-gov')]=+g.value; renderDecide(); });
}

/* ======================================================================
   SHARED OVERLAY (Import + Book-risk) — reuses the .decstage surface + the
   breathing FLIP entry (flipBreath) so these lenses feel like the same canvas.
   ====================================================================== */
var importEl, importOpen=false;
function overlayShow(el, origin){
  el.style.display='block'; el.classList.remove('on'); void el.offsetWidth; el.classList.add('on'); el.setAttribute('aria-hidden','false');
  el.scrollTop=0;
  var wrap=el.querySelector('.ovwrap');
  if(reduce||!wrap||!origin)return;
  flipBreath(wrap, origin, true, function(){});
}
function overlayHide(el, origin, after){
  el.setAttribute('aria-hidden','true');
  var wrap=el.querySelector('.ovwrap');
  if(reduce||!wrap||!origin){ el.classList.remove('on'); window.setTimeout(function(){ el.style.display='none'; if(after)after(); },160); return; }
  flipBreath(wrap, origin, false); el.classList.remove('on');
  window.setTimeout(function(){ el.style.display='none'; if(after)after(); }, DUR);
}

   contradiction · exposure map). Every row drills into the causing positions. ---- */
/* expiry calendar — used by the folded book-risk band (renderBookBand). */
function expCalHTML(){
  var byExp={}; POS.forEach(function(p){ var m=(p.legStr.match(/exp ([0-9]{2}-[A-Za-z]{3})/)||p.legStr.match(/([0-9]{2}-[A-Za-z]{3})/)); var k=m?m[1]:'—'; (byExp[k]=byExp[k]||[]).push(p); });
  var MON={Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};
  function expOrd(k){ var m=k.match(/([0-9]{2})-([A-Za-z]{3})/); return m?(MON[m[2]]||13)*100+(+m[1]):9999; }
  var expKeys=Object.keys(byExp).sort(function(a,b){return expOrd(a)-expOrd(b);}), maxExpAmt=Math.max.apply(0,expKeys.map(function(k){return byExp[k].reduce(function(a,p){return a+p.cap;},0);}))||1;
  return expKeys.map(function(k){ var arr=byExp[k], amt=arr.reduce(function(a,p){return a+p.cap;},0), hot=arr.length>=2;
    return '<button class="expcol'+(hot?' hot':'')+'" data-goto="'+arr[0].id+'"><span class="expamt">'+fmtK(amt)+'</span>'+
      '<span class="expbarwrap"><i class="expbar" style="height:'+Math.max(10,Math.round(amt/maxExpAmt*100))+'%"></i></span>'+
      '<span class="expdt">'+k+'</span><span class="expn">'+arr.length+' lot'+(arr.length>1?'s':'')+'</span></button>';
  }).join('');
}

/* continuous risk-temperature: green(profit) -> amber(caution) -> red(loss) */
function tempColor(t){ t=Math.max(0,Math.min(1,t));
  var a=[0x41,0xC8,0x92], b=[0xE7,0xAC,0x44], c=[0xF3,0x5D,0x64], lo,hi,f;
  if(t<0.5){lo=a;hi=b;f=t/0.5;} else {lo=b;hi=c;f=(t-0.5)/0.5;}
  return 'rgb('+Math.round(lo[0]+(hi[0]-lo[0])*f)+','+Math.round(lo[1]+(hi[1]-lo[1])*f)+','+Math.round(lo[2]+(hi[2]-lo[2])*f)+')';
}

function drawExposureMap(cfg){
  cfg=cfg||{svg:'rkExpMap', info:'rkSelInfo'};
  var svg=document.getElementById(cfg.svg); if(!svg)return;
  var W=Math.max(320,Math.round(svg.clientWidth||600)), H=Math.max(150,Math.round(svg.clientHeight||220));
  svg.setAttribute('viewBox','0 0 '+W+' '+H);
  var padL=44,padB=26,padT=14,padR=16;
  var caps=POS.map(function(p){return p.cap;}), dl=POS.map(function(p){return +p.delta||0;});
  var cHi=Math.max.apply(0,caps)*1.08, cLo=0;
  var dMax=Math.max(0.8,Math.max.apply(0,dl.map(Math.abs))*1.15);
  var X=function(d){return padL+(W-padL-padR)*(d+dMax)/(2*dMax);};
  var Y=function(v){return H-padB-(H-padB-padT)*(v-cLo)/((cHi-cLo)||1);};
  /* stress = loss on the characteristic sector gap; drives temperature (honest — a collateralised CSP that only dips stays cool, not scary-red) */
  var gapF=1-bookGapFrac().gap, stress=POS.map(function(p){var v=payFor(p,p.spot*gapF);return v<0?-v:0;});
  var maxStress=Math.max.apply(0,stress)||1;
  var g='';
  var xz=X(0);
  g+='<line x1="'+xz.toFixed(1)+'" y1="'+padT+'" x2="'+xz.toFixed(1)+'" y2="'+(H-padB)+'" stroke="var(--line)" stroke-dasharray="3 3"/>';
  g+='<text x="'+(padL+2)+'" y="'+(padT+11)+'" fill="var(--faint)" font-size="12">short Δ</text>';
  g+='<text x="'+(W-padR-2)+'" y="'+(padT+11)+'" fill="var(--faint)" font-size="12" text-anchor="end">long Δ</text>';
  [0.25,0.5,0.75,1].forEach(function(f){var v=cHi*f,yy=Y(v);g+='<line x1="'+padL+'" y1="'+yy.toFixed(1)+'" x2="'+(W-padR)+'" y2="'+yy.toFixed(1)+'" stroke="var(--line-soft)"/>';g+='<text x="'+(padL-5)+'" y="'+(yy+3).toFixed(1)+'" fill="var(--faint)" font-size="12" text-anchor="end" font-family="ui-monospace">'+(v>=1000?'$'+Math.round(v/1000)+'k':'$'+Math.round(v))+'</text>';});
  g+='<rect class="rkSelRect" x="0" y="0" width="0" height="0" fill="var(--accent)" fill-opacity=".08" stroke="var(--accent)" stroke-dasharray="4 3" style="display:none;pointer-events:none"/>';
  var pts=[];
  POS.forEach(function(p,i){var x=X(+p.delta||0),y=Y(p.cap),r=6+Math.min(11,p.riskPct/3);
    var col=tempColor(stress[i]/maxStress);
    pts.push({id:p.id,x:x,y:y,r:r,sym:p.sym,col:col});
    g+='<circle class="rkdot" data-id="'+p.id+'" cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="'+r.toFixed(1)+'" fill="'+col+'" fill-opacity=".22" stroke="'+col+'" stroke-width="1.4" data-goto="'+p.id+'" style="cursor:pointer"/>';
  });
  /* ticker labels: score each candidate slot (below/above/right/left/diagonals) by out-of-bounds,
     clash with already-placed labels, and overlap with ANY dot (incl. its own) — pick the lowest
     score, so a label near an edge FLIPS to a side that fits instead of being clamped onto its dot
     (the NVDA-on-the-floor bug). Owner: move the ticker wherever it fits, never overwrite. */
  var lboxes=[];
  pts.forEach(function(pt){ var lw=pt.sym.length*6.4+3, lh=12;
    var cands=[[pt.x,pt.y+pt.r+11],[pt.x,pt.y-pt.r-5],[pt.x+pt.r+4+lw/2,pt.y+3.4],[pt.x-pt.r-4-lw/2,pt.y+3.4],
               [pt.x+pt.r*0.7+lw/2,pt.y+pt.r+11],[pt.x-pt.r*0.7-lw/2,pt.y-pt.r-5]];
    var best=cands[0], bestScore=1e9;
    for(var ci=0;ci<cands.length;ci++){ var cx=cands[ci][0],cy=cands[ci][1], box={x0:cx-lw/2,x1:cx+lw/2,y0:cy-lh+2,y1:cy+2};
      var sc=ci*0.6;                                                          /* mild preference for earlier (below-first) slots */
      sc+=(Math.max(0,padT+2-box.y0)+Math.max(0,box.y1-(H-padB))+Math.max(0,padL-box.x0)+Math.max(0,box.x1-(W-padR)))*50; /* out-of-bounds */
      lboxes.forEach(function(b){ var ox=Math.min(box.x1,b.x1)-Math.max(box.x0,b.x0), oy=Math.min(box.y1,b.y1)-Math.max(box.y0,b.y0); if(ox>0&&oy>0)sc+=ox*oy*0.5; }); /* label clash */
      pts.forEach(function(o){ if((o.r+lw/2-Math.abs(o.x-cx))>0 && (o.r+7-Math.abs(o.y-(cy-4)))>0) sc+=(o===pt?70:130); }); /* on a dot (own or other) */
      if(sc<bestScore){bestScore=sc;best=cands[ci];} }
    var lx=Math.max(padL+lw/2, Math.min(W-padR-lw/2, best[0])), ly=Math.max(padT+9,Math.min(H-padB-2,best[1]));
    lboxes.push({x0:lx-lw/2,x1:lx+lw/2,y0:ly-lh,y1:ly+2});
    g+='<text x="'+lx.toFixed(1)+'" y="'+ly.toFixed(1)+'" fill="var(--text)" font-size="9.5" font-weight="700" text-anchor="middle" style="pointer-events:none;font-family:ui-monospace">'+pt.sym+'</text>';
  });
  svg.innerHTML=g;
  svg._pts=pts;                          /* per-svg geometry — two maps can coexist without clobbering hit-tests */
  wireExpMapSelect(svg, document.getElementById(cfg.info), cfg);

/* box-select-to-aggregate: drag a rect, pool the enclosed lines into one combined readout.
   + optional hover-link (dot⇄roster card + floating readout) and click-to-zoom, driven by cfg. */
function wireExpMapSelect(svg, info, cfg){
  cfg=cfg||{};
  if(svg._selWired)return; svg._selWired=1;
  var rect=null, start=null, moved=false, downId=null;
  function pt(ev){var b=svg.getBoundingClientRect(),vb=svg.viewBox.baseVal;return {x:(ev.clientX-b.left)/b.width*vb.width, y:(ev.clientY-b.top)/b.height*vb.height};}
  svg.addEventListener('mousedown',function(ev){ start=pt(ev); moved=false; rect=svg.querySelector('.rkSelRect'); downId=(ev.target&&ev.target.getAttribute&&ev.target.getAttribute('data-id'))||null; });
  svg.addEventListener('mousemove',function(ev){ if(!start||!rect)return; var q=pt(ev);
    var x=Math.min(start.x,q.x),y=Math.min(start.y,q.y),w=Math.abs(q.x-start.x),h=Math.abs(q.y-start.y);
    if(w>4||h>4)moved=true;
    rect.setAttribute('x',x);rect.setAttribute('y',y);rect.setAttribute('width',w);rect.setAttribute('height',h);rect.style.display='';
  });
  /* hover-link + click-zoom (Home only — cfg.hover / cfg.zoom) */
  if(cfg.hover){
    svg.addEventListener('mouseover',function(ev){ var d=ev.target.closest&&ev.target.closest('.rkdot'); if(d){ var id=d.getAttribute('data-id'); if(cfg.onHover)cfg.onHover(id,true); } });
    svg.addEventListener('mouseout',function(ev){ var d=ev.target.closest&&ev.target.closest('.rkdot'); if(d){ var id=d.getAttribute('data-id'); if(cfg.onHover)cfg.onHover(id,false); } });
  }
  window.addEventListener('mouseup',function(ev){ if(!start){return;} var s=start; start=null;
    if(!moved){ if(rect)rect.style.display='none'; if(cfg.zoom&&downId){ go('position',downId); } return; } /* click on a dot → zoom into its bloom */
    var q=pt(ev), x0=Math.min(s.x,q.x),x1=Math.max(s.x,q.x),y0=Math.min(s.y,q.y),y1=Math.max(s.y,q.y);
    var sel=(svg._pts||[]).filter(function(d){return d.x>=x0&&d.x<=x1&&d.y>=y0&&d.y<=y1;}).map(function(d){return d.id;});
    var lines=POS.filter(function(p){return sel.indexOf(p.id)>=0;});
    svg.querySelectorAll('.rkdot').forEach(function(c){c.classList.toggle('selon',sel.indexOf(c.getAttribute('data-id'))>=0);});
    if(!lines.length){ if(info)info.innerHTML='<b>Nothing enclosed.</b> Drag a box around two or more dots to pool them.'; return; }
    var gapF2=1-bookGapFrac().gap, cap=0,nd=0,st=0,risk=0; lines.forEach(function(p){cap+=p.cap;nd+=(+p.delta||0);st+=Math.max(0,-payFor(p,p.spot*gapF2));risk+=p.riskPct;});
    if(info)info.innerHTML='<div class="rkselttl">'+lines.length+' lines pooled — '+lines.map(function(p){return p.sym;}).join(' · ')+'</div>'+
      '<div class="rkselstats"><span><i>Capital</i>'+money(cap)+'</span><span><i>Net Δ</i>'+(nd>=0?'+':'')+nd.toFixed(2)+'</span>'+
      '<span><i>Book risk</i>'+Math.round(risk)+'%</span><span class="'+(st>0?'warnv':'')+'"><i>If −10%</i>'+money(-st)+'</span></div>'+
      '<div class="rkselnote">These '+lines.length+' move together — one SMH/SMH-put hedge would cap the pool at once.</div>';
  });
}
