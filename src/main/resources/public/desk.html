    '<p class="lexpl-beg">'+glossWrap(s.beg||'')+'</p>'+
    (s.more?'<div class="callout bare"><span class="xt">The mechanics</span>'+glossWrap(s.more)+'</div>':'')+'</div>'; }
function conceptCardHTML(c,big){ if(!c)return ''; return '<div class="lconcept'+(big?' big':'')+'" data-concept="'+c.h.toLowerCase()+'"><div class="lc-h"><span class="lci"><svg viewBox="0 0 24 24">'+c.icon+'</svg></span><b>'+c.h+'</b></div><p>'+glossWrap(c.p)+'</p>'+(big?'<div class="callout bare"><span class="xt">The mechanics</span>'+glossWrap(c.x)+'</div>':'')+'</div>'; }
function glossItemHTML(t){ return '<div class="lgi" data-k="'+(t.t+' '+(t.alias||'')+' '+(t.k||'')).toLowerCase().replace(/"/g,'')+'"><div class="lgi-h"><b>'+t.t+'</b>'+(t.alias?'<span class="ga">'+t.alias+'</span>':'')+'<span class="lgi-cat">'+t.cat+'</span></div><div class="lgi-def">'+glossWrap(t.def)+'</div></div>'; }
function renderLearn(seed){
  var lead='';
  if(seed&&seed.type==='strat'){ lead=strategyExplainerHTML(seed.s); }
  else if(seed&&seed.type==='term'){ var t=seed.t; lead='<div class="lexpl"><div class="lexpl-h"><b>'+t.t+'</b>'+(t.alias?'<span class="ga">'+t.alias+'</span>':'')+'<span class="badge">'+t.cat+'</span></div><div class="lexpl-tag">'+t.def+'</div><div class="callout bare"><span class="xt">Under the hood</span>'+glossWrap(t.x)+'</div></div>'; }
  else if(seed&&seed.type==='concept'){ lead=conceptCardHTML(seed.c,true); }
  return '<div class="ovwrap lrn"><div class="dectop"><button class="dback" data-learn-act="back">← Back</button>'+
      '<div class="decttl">Learn<span class="dctx"> · concepts · strategies · terms</span></div>'+
      '<div class="lsearch"><input id="learnq" placeholder="what to understand? — theta · iron condor · gap risk" autocomplete="off" spellcheck="false"></div></div>'+
    '<div class="lrn-body">'+
      (lead?'<div class="lsec lead">'+lead+'</div>':'')+
      '<div class="lsec"><div class="lsec-h"><span class="eyebrow">Concepts</span></div><div class="lconcepts">'+LEARN_C.map(function(c){return conceptCardHTML(c,false);}).join('')+'</div></div>'+
      '<div class="lsec"><div class="lsec-h"><span class="eyebrow">Glossary</span><span class="hint">'+LEARN_G.length+' terms · type above to filter</span></div><div class="lgloss" id="lglossList">'+LEARN_G.map(glossItemHTML).join('')+'</div></div>'+
    '</div></div>'; }
function openLearn(seed,origin){ learnEl=learnEl||document.getElementById('learnStage'); if(!learnEl)return;
  learnEl.innerHTML=renderLearn(seed); learnOpen=true; learnO._origin=origin||null; overlayShow(learnEl,origin);
  if(seed&&seed.type==='strat'){ var sv=learnEl.querySelector('.lexpl-pay'); if(sv)drawLearnPay(sv,seed.s.def); }
  var q=document.getElementById('learnq'); if(q){ q.oninput=function(){ filterLearn(q.value); }; if(!reduce)window.setTimeout(function(){q.focus();},80); }
  learnEl.onclick=function(e){ var b=e.target.closest('[data-learn-act]'); if(b&&b.getAttribute('data-learn-act')==='back'){ closeLearn(); return; }
    var g=e.target.closest('.gloss[data-term]'); if(g){ var gt=GBY[g.getAttribute('data-term').toLowerCase()]; if(gt)openLearn({type:'term',t:gt}, g.getBoundingClientRect()); return; }
    var cc=e.target.closest('[data-concept]'); if(cc){ var c=CBY[cc.getAttribute('data-concept')]; if(c&&!e.target.closest('.big'))openLearn({type:'concept',c:c}, cc.getBoundingClientRect()); return; } };
}
function closeLearn(){ if(!learnOpen)return; learnOpen=false; overlayHide(learnEl, learnO._origin); }
function filterLearn(q){ q=(q||'').trim().toLowerCase(); if(!learnEl)return;
  var items=learnEl.querySelectorAll('#lglossList .lgi'); for(var i=0;i<items.length;i++){ items[i].style.display=(!q||items[i].getAttribute('data-k').indexOf(q)>=0)?'':'none'; } }
/* command-bar learn entry: 'learn X' / a bare term / strategy / concept → the lens seeded on it */
function learnResolve(q){ q=(q||'').trim().toLowerCase().replace(/^(learn|what ?is|explain|define|teach me)\s+/,''); if(!q){ openLearn(null,null); return true; }
  var s=SBY[q]||learnStrat(q); if(s){ openLearn({type:'strat',s:s},null); return true; }
  if(GBY[q]){ openLearn({type:'term',t:GBY[q]},null); return true; }
  if(CBY[q]){ openLearn({type:'concept',c:CBY[q]},null); return true; }
  var k=glossKeys().filter(function(x){return x.indexOf(q)>=0;})[0]; if(k){ openLearn({type:'term',t:GBY[k]},null); return true; }
  /* multi-word: every word must appear in the term's/concept's searchable text */
  var words=q.split(/\s+/).filter(Boolean);
  var gt=LEARN_G.filter(function(t){ var hay=(t.t+' '+(t.alias||'')+' '+(t.k||'')).toLowerCase(); return words.every(function(w){return hay.indexOf(w)>=0;}); })[0];
  if(gt){ openLearn({type:'term',t:gt},null); return true; }
  var sf=STRATS.filter(function(x){return (x.nm||'').toLowerCase().indexOf(q)>=0;})[0]; if(sf){ openLearn({type:'strat',s:sf},null); return true; }
  var cf=LEARN_C.filter(function(c){ var hay=((c.k||'')+' '+c.h).toLowerCase(); return words.every(function(w){return hay.indexOf(w)>=0;}); })[0]; if(cf){ openLearn({type:'concept',c:cf},null); return true; }
  return false; }
/* the glossary hover popover — one singleton, reads GBY, never a route */
function wireGloss(){ var pop=document.getElementById('glossPop'); if(!pop||pop._wired)return; pop._wired=1;
  document.addEventListener('mouseover',function(e){ var g=e.target.closest&&e.target.closest('.gloss[data-term]'); if(!g)return;
    var t=GBY[g.getAttribute('data-term').toLowerCase()]; if(!t)return;
    pop.innerHTML='<b>'+t.t+'</b>'+(t.alias?' <span class="ga">'+t.alias+'</span>':'')+'<div class="gpd">'+t.def+'</div><div class="gph">click to open in Learn</div>';
    var r=g.getBoundingClientRect(); pop.style.display='block';
    var pw=pop.offsetWidth,ph=pop.offsetHeight,left=Math.max(6,Math.min(window.innerWidth-pw-6,r.left));
    var top=r.bottom+7; if(top+ph>window.innerHeight-6)top=Math.max(6,r.top-ph-7);
    pop.style.left=left+'px'; pop.style.top=top+'px'; void pop.offsetWidth; pop.classList.add('on'); });
  document.addEventListener('mouseout',function(e){ var g=e.target.closest&&e.target.closest('.gloss[data-term]'); if(g){ pop.classList.remove('on'); pop.style.display='none'; } }); }

function boot(){
  /* one POP definition everywhere: run held positions through the SAME tail-aware model as
     candidates, so a card's 'Chance' matches its own bell + scenario bars (no stale literals).
     Parse each line's expiry so the event-calendar check knows whether a catalyst lands in-window. */
  POS.forEach(function(p){ if(!p.exp){ var m=(p.legStr||'').match(/exp ([0-9]{2}-[A-Za-z]{3})/); if(m)p.exp=m[1]; } p.pop=popCalc(p); });
  stageEl=document.getElementById('stage');
  boardEl=document.getElementById('board');
  bookEl=document.getElementById('book');
  recedeEl=document.getElementById('recede');
  focusEl=document.getElementById('focus');
  summaryEl=document.getElementById('summary');
  crumbsEl=document.getElementById('crumbs');
  cmdEl=document.getElementById('cmd');
  toastEl=document.getElementById('toast');
  decideEl=document.getElementById('decideStage');
  importEl=document.getElementById('importStage');
  learnEl=document.getElementById('learnStage');
  wireGloss();

  /* Escape closes any open overlay first (capture phase, before the zoom-out handler) */
  document.addEventListener('keydown',function(e){
    if(e.key!=='Escape')return;
    if(learnOpen){ closeLearn(); e.stopPropagation(); e.preventDefault(); return; }
    if(importOpen){ closeImport(); e.stopPropagation(); e.preventDefault(); return; }
    if(decide){ exitDecide(); e.stopPropagation(); e.preventDefault(); }
  },true);

  for(var i=0;i<POS.length;i++){ cardEl[POS[i].id]=makeCard(POS[i]); }

  layoutForLevel('book',state.focus);
  updateThread();

  cmdEl.addEventListener('keydown',function(e){ if(e.key==='Enter'){ handleCmd(cmdEl.value); } });
  cmdEl.addEventListener('focus',function(){ cmdEl.placeholder='symbol · sector · or learn — AMD · semis · iron condor · theta'; });
  /* brand mark = the home anchor (was a lone 'Your book' crumb); click zooms all the way out */
  var bh=document.getElementById('brandHome'); if(bh) bh.onclick=function(){ if(decide)exitDecide(); go('book'); };
  /* the symbol pill echoes what the chain/sector lenses point at — click to retarget via the command bar */
  var cs=document.getElementById('cmdSym'); if(cs) cs.onclick=function(){ cmdEl.focus(); if(cmdEl.select)cmdEl.select(); };
  /* persistent New idea — reachable from ANY view (not just the landing) */
  var tni=document.getElementById('threadNewIdea');
  if(tni) tni.onclick=function(){
    /* already composing a fresh idea? don't re-animate the same screen — open the underlying picker so
       'New idea' means start over on a new symbol (or Esc to keep this one). */
    if(decide && decide.kind==='idea' && !decide.posId){
      decide.pickOpen=true; renderDecide();
      var q=document.getElementById('univq'); if(q){ q.focus(); if(q.select)q.select(); }
      toast('Pick an underlying to start a fresh idea'); return; }
    var wasOpen=!!(decide||importOpen), ctx=currentContextSym();
    if(importOpen)closeImport(); if(decide)exitDecide();
    var open=function(){ enterDecide('idea',null,'New idea', tni.getBoundingClientRect(), ctx); };
    if(wasOpen) window.setTimeout(open, 200); else open(); };

  /* ---- market mode (Observed = live Cboe data · Simulated = synthetic/demo). Replaces the old
     Beginner/Expert lens (level content is unified now). Conditions chains/candles + the sim controls. ---- */
  var msegs=document.querySelectorAll('#mktMode .mmseg button');
  for(var li=0;li<msegs.length;li++){ (function(b){ b.addEventListener('click',function(){
    setMktMode(b.getAttribute('data-mkt')); }); })(msegs[li]); }

  document.addEventListener('keydown',function(e){
    if(e.key==='Escape'){
      if(document.activeElement===cmdEl){ cmdEl.blur(); return; }
      var i=LEVELS.indexOf(state.level);
      if(i>0) go(LEVELS[i-1]);
    }
  });

  window.addEventListener('resize',function(){ window.cancelAnimationFrame(rzTimer); rzTimer=window.requestAnimationFrame(redraw); });
}

if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',boot);
else boot();
</script>
</body>
