name: Verify

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: dom-tests/package-lock.json

      - name: Start isolated PostgreSQL
        run: |
          docker compose up -d db
          for attempt in {1..30}; do
            docker compose exec -T db pg_isready -U strikebench -d strikebench_dev && exit 0
            sleep 2
          done
          docker compose logs db
          exit 1

      - name: Backend matrix and release jar
        run: mvn -q clean package

      - name: Install browser runtime
        working-directory: dom-tests
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Fixture, grown-state, responsive, and auth-on browser matrix
        working-directory: dom-tests
        run: npm run test:ci

      - name: Preserve failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: strikebench-failure-evidence
          path: |
            target/surefire-reports
            dom-tests/shots
          retention-days: 14

