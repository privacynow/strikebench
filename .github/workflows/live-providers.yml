name: Live Provider Verification

on:
  workflow_dispatch:
  schedule:
    # 11:30 ET during daylight time / 10:30 ET during standard time, weekdays.
    - cron: '30 15 * * 1-5'

permissions:
  contents: read

concurrency:
  group: live-provider-verification
  cancel-in-progress: false

jobs:
  observed-lane:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: dom-tests/package-lock.json

      - name: Start isolated PostgreSQL
        run: |
          docker compose up -d db
          for attempt in {1..30}; do
            docker compose exec -T db pg_isready -U strikebench -d strikebench_dev && exit 0
            sleep 2
          done
          docker compose logs db
          exit 1

      - name: Build the current jar
        run: mvn -q -DskipTests package

      - name: Install browser runtime
        working-directory: dom-tests
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Exercise real keyless providers and observed fail-closed states
        working-directory: dom-tests
        run: npm run test:live

      - name: Preserve live-provider evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-provider-evidence-${{ github.run_id }}
          path: dom-tests/shots
          retention-days: 14
